<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribute — Caregiver Intelligence</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8541A;--orange-pale:#FDF2ED;--orange-50:#FEF8F5;
  --charcoal:#2C2C2C;--text2:#4A4A4A;--text3:#6B6B6B;--text4:#9B9B9B;
  --gray100:#F5F5F5;--gray200:#EBEBEB;--gray300:#D8D8D8;
  --white:#FFFFFF;--cream:#FAFAF8;
  --green:#3DAA7A;--green-bg:#EAF6F0;--green-text:#1A7A52;
  --red:#E05252;--red-bg:#FDEEEE;--red-text:#8B1F1F;
  --amber:#F59E0B;--amber-bg:#FEF3C7;--amber-text:#7C3E00;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-text:#1E3A8A;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-text:#4C1D95;
  --shadow:0 1px 4px rgba(44,44,44,0.07),0 1px 2px rgba(44,44,44,0.04);
  --shadow-md:0 4px 16px rgba(44,44,44,0.09),0 2px 6px rgba(44,44,44,0.04);
  --r:8px;--rl:12px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--charcoal);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--gray200);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-brand{display:flex;align-items:baseline;gap:6px}
.hdr-title{font-size:16px;font-weight:600;color:var(--orange)}
.hdr-sub{font-size:11px;color:var(--text3)}
.hdr-right{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--text4)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading{text-align:center;padding:60px;color:var(--text4);font-size:13px}
.spin{width:22px;height:22px;border:2px solid var(--gray200);border-top-color:var(--orange);border-radius:50%;animation:sp .75s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.period-bar{background:var(--white);border-bottom:1px solid var(--gray200);padding:10px 32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pbtn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:.5px solid var(--gray300);color:var(--text3);background:var(--gray100);user-select:none}
.pbtn.on{background:var(--charcoal);color:var(--white);border-color:var(--charcoal)}
.nav-tabs{display:flex;border-bottom:1px solid var(--gray200);background:var(--white);padding:0 32px;overflow-x:auto}
.ntab{font-size:12px;font-weight:500;color:var(--text3);padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;user-select:none}
.ntab.on{color:var(--charcoal);border-bottom-color:var(--orange)}
.main{padding:24px 32px;max-width:1300px;margin:0 auto}
.kg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg6{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
@media(max-width:900px){.kg,.kg6,.kg4,.kg3{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kg,.kg6,.kg4,.kg3{grid-template-columns:1fr 1fr}}
.kpi{background:var(--white);border:.5px solid var(--gray200);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text4);margin-bottom:5px}
.kv{font-size:24px;font-weight:500;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kv.g{color:var(--green)}.kv.r{color:var(--red)}.kv.a{color:var(--amber)}.kv.o{color:var(--orange)}.kv.b{color:var(--blue)}
.ks{font-size:10px;color:var(--text4)}
.fc{background:var(--white);border:.5px solid var(--gray200);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.ct{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:800px){.two-col,.three-col{grid-template-columns:1fr}}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:6px 10px;border-bottom:.5px solid var(--gray200);text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th:hover{color:var(--orange)}
.tbl td{padding:8px 10px;border-bottom:.5px solid var(--gray100);vertical-align:middle}
.tbl tbody tr:hover td{background:var(--orange-50)}
.tbl tbody tr{cursor:pointer}
.tbl tbody tr:last-child td{border-bottom:none}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.bg{background:var(--green-bg);color:var(--green-text)}
.br{background:var(--red-bg);color:var(--red-text)}
.ba{background:var(--amber-bg);color:var(--amber-text)}
.bb{background:var(--blue-bg);color:var(--blue-text)}
.bp{background:var(--purple-bg);color:var(--purple-text)}
.bar-wrap{height:6px;background:var(--gray100);border-radius:3px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.mkt-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--gray100)}
.mkt-row:last-child{border-bottom:none}
.mkt-name{width:150px;font-size:12px;font-weight:500;flex-shrink:0}
.mkt-bar-wrap{flex:1;height:6px;background:var(--gray100);border-radius:3px}
.mkt-bar{height:6px;border-radius:3px;background:var(--orange);transition:width .4s ease}
.mkt-val{width:50px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0}
.mkt-sub{width:60px;text-align:right;font-size:10px;color:var(--text4);flex-shrink:0}
.hist{display:flex;align-items:flex-end;gap:3px;height:72px}
.hist-bar{flex:1;border-radius:2px 2px 0 0;min-width:8px;transition:opacity .2s}
.hist-bar:hover{opacity:.7}
.hist-labels{display:flex;gap:3px;margin-top:4px}
.hist-label{flex:1;font-size:9px;color:var(--text4);text-align:center}
.tenure-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.tenure-label{width:110px;font-size:11px;color:var(--text2);flex-shrink:0}
.tenure-bar-bg{flex:1;height:8px;background:var(--gray100);border-radius:4px}
.tenure-bar-fill{height:8px;border-radius:4px;background:var(--blue);transition:width .4s}
.tenure-n{width:28px;text-align:right;font-size:11px;color:var(--text3)}
.tenure-pct{width:32px;text-align:right;font-size:11px;font-weight:600;color:var(--text2)}
input[type=text],input[type=date],select{
  font-family:inherit;font-size:12px;padding:5px 10px;
  border:.5px solid var(--gray300);border-radius:var(--r);
  background:var(--gray100);color:var(--charcoal);outline:none
}
input[type=text]:focus,input[type=date]:focus,select:focus{border-color:var(--orange)}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);pointer-events:none}
.search-wrap input{width:100%;padding-left:30px}
.month-bar{display:flex;gap:2px;align-items:flex-end;height:56px}
.month-col{flex:1;display:flex;gap:1px;align-items:flex-end}
.month-h{flex:1;border-radius:2px 2px 0 0;min-width:3px}
.month-labels{display:flex;gap:2px;margin-top:4px}
.month-label{flex:1;font-size:8px;color:var(--text4);text-align:center}
.skill-tag{display:inline-block;background:var(--orange-pale);color:var(--orange);border-radius:4px;padding:2px 7px;font-size:10px;margin:1px;font-weight:500}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:min(720px,94vw);max-height:88vh;overflow-y:auto;padding:28px;box-shadow:var(--shadow-md)}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.modal-name{font-size:20px;font-weight:600;color:var(--charcoal)}
.modal-sub{font-size:11px;color:var(--text4);margin-top:2px}
.modal-close{background:var(--gray100);border:.5px solid var(--gray300);color:var(--text3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--gray200)}
.modal-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.modal-kpi{background:var(--gray100);border-radius:var(--r);padding:10px 12px}
.modal-kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text4);margin-bottom:4px}
.modal-kpi-v{font-size:18px;font-weight:500;letter-spacing:-.01em}
.modal-sec{margin-bottom:16px}
.modal-sec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:.5px solid var(--gray200)}
.week-chart{display:flex;gap:3px;align-items:flex-end;height:48px}
.week-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.week-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.week-lbl{font-size:8px;color:var(--text4)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.detail-item .dl{font-size:10px;color:var(--text4);margin-bottom:2px}
.detail-item .dv{font-size:12px;font-weight:500}
.ftr{border-top:1px solid var(--gray200);padding:14px 32px;display:flex;justify-content:space-between;font-size:10px;color:var(--text4);background:var(--white);margin-top:16px}
select.filter{font-size:11px;padding:4px 8px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <span class="hdr-title">Tribute</span>
    <span class="hdr-sub">Home Care · Caregiver Intelligence</span>
  </div>
  <div class="hdr-right">
    <span><span class="live-dot"></span>Live · Viv Technologies</span>
    <span id="clock">—</span>
  </div>
</div>

<div class="period-bar">
  <span style="font-size:11px;color:var(--text4);margin-right:4px">As of week:</span>
  <div class="pbtn on" id="pb0" onclick="setWeek(0,this)">This week</div>
  <div class="pbtn" onclick="setWeek(-1,this)">Last week</div>
  <div class="pbtn" onclick="setWeek(-2,this)">2 weeks ago</div>
  <div class="pbtn" onclick="setWeek(-3,this)">3 weeks ago</div>
  <div class="pbtn" onclick="setWeek(-4,this)">4 weeks ago</div>
  <span style="font-size:11px;color:var(--text4);margin-left:12px">Filter:</span>
  <select class="filter" id="mktFilter" onchange="applyFilter()">
    <option value="">All Markets</option>
    <option>Baltimore</option><option>Boston</option>
    <option>MetroWest Boston</option><option>North of Boston</option>
    <option>South of Boston</option><option>Chicago</option>
    <option>Annapolis</option><option>Bethesda</option>
  </select>
  <select class="filter" id="statusFilter" onchange="applyFilter()">
    <option value="">All Status</option>
    <option value="active">Active</option>
    <option value="terminated">Terminated</option>
  </select>
</div>

<div class="nav-tabs">
  <div class="ntab on" onclick="setTab('overview',this)">Overview</div>
  <div class="ntab" onclick="setTab('hours',this)">Hours Distribution</div>
  <div class="ntab" onclick="setTab('lifecycle',this)">Lifecycle</div>
  <div class="ntab" onclick="setTab('roster',this)">Roster</div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spin"></div>Loading caregiver data…</div>
</div>

<div class="ftr">
  <span>Tribute Home Care LLC · Caregiver Intelligence Dashboard</span>
  <span id="updated">—</span>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<script>
var API='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
var allCaregivers=[], cgHoursMap={}, curWeek=null, curTab='overview';
var rosterSort={col:'name',dir:1};

// ── TIME ──
setInterval(function(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
},1000);

function getSunday(offset){
  var d=new Date();d.setDate(d.getDate()-d.getDay()+(offset||0)*7);d.setHours(0,0,0,0);return d;
}
function fmtD(d){return d instanceof Date?d.toISOString().split('T')[0]:'';}
function fmtDate(s){if(!s)return '—';var d=new Date(s);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function tenure(hd,td){
  if(!hd)return '—';
  var end=td?new Date(td):new Date();
  var days=Math.floor((end-new Date(hd))/86400000);
  if(days<30)return days+'d';
  if(days<365)return Math.floor(days/30)+'mo';
  var y=Math.floor(days/365),m=Math.floor((days%365)/30);
  return y+'y'+(m?' '+m+'mo':'');
}
function tenureDays(hd,td){
  if(!hd)return 0;
  return Math.floor(((td?new Date(td):new Date())-new Date(hd))/86400000);
}
function normalizeMarket(cg){
  var c=cg.gcity||'Unknown';
  var known=['Baltimore','Boston','MetroWest Boston','North of Boston','South of Boston','Chicago','Annapolis','Bethesda','Northern Virginia'];
  return known.includes(c)?c:c;
}
function isActive(cg){return (cg.st||'').toLowerCase()==='hired';}
function isTerminated(cg){return (cg.st||'').toLowerCase()==='terminated';}
function isStaff(cg){
  var email=(cg.email||'').toLowerCase();
  var city=cg.gcity||'';
  var name=((cg.fn||'')+' '+(cg.ln||'')).toLowerCase();
  var adminName=((cg.queries&&cg.queries.adminName)||'').toLowerCase();
  var excluded=['jen kulig','jennifer kulig','andrew dobson','tom o brien'];
  if(excluded.some(function(n){return adminName.includes(n);}))return true;
  return city==='Tribute'||email.endsWith('@tributehomecare.com')||name.includes('office')||city==='';
}
function getWeeks(n){
  var w=[],d=new Date(curWeek);
  d.setUTCHours(0,0,0,0);
  for(var i=0;i<n;i++){w.unshift(fmtD(new Date(d)));d.setUTCDate(d.getUTCDate()-7);}
  return w;
}
function cgAvgHrs(cgid,weeks){
  // Try _id first, then id field
  var map=cgHoursMap[cgid];
  if(!map)return 0;
  var vals=weeks.map(function(w){return map[w]||0;});
  var nonZero=vals.filter(function(v){return v>0;});
  return nonZero.length?nonZero.reduce(function(s,v){return s+v;},0)/nonZero.length:0;
}
function getFiltered(){
  var mkt=document.getElementById('mktFilter').value;
  var st=document.getElementById('statusFilter').value;
  return allCaregivers.filter(function(cg){
    if(mkt&&normalizeMarket(cg)!==mkt)return false;
    if(st==='active'&&!isActive(cg))return false;
    if(st==='terminated'&&!isTerminated(cg))return false;
    return true;
  });
}

// ── LOAD ──
function setWeek(offset,el){
  curWeek=fmtD(getSunday(offset));
  document.querySelectorAll('.pbtn').forEach(function(x){x.classList.remove('on');});
  el.classList.add('on');
  load();
}
function applyFilter(){renderTab();}

async function load(){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spin"></div>Loading caregiver data…</div>';
  var weeks8=getWeeks(8);
  // Fetch caregivers
  var cgRes=await fetch(API+'?endpoint=caregivers&startDate='+weeks8[0]+'&endDate='+curWeek);
  var cgData=await cgRes.json();
  allCaregivers=(cgData.caregivers||[]).filter(function(cg){return !isStaff(cg);});
  // Also index hours by alternate id fields in case of mismatch
  // caregiver_hours returns 'id', caregivers endpoint returns '_id' — should be same value
  // Fetch hours for last 4 weeks
  cgHoursMap={};
  var weeks4=getWeeks(4);
  await Promise.all(weeks4.map(fetchHours));
  // Debug: check ID alignment between caregivers and hours
  var sampleCG=allCaregivers[0];
  if(sampleCG){
    var weeks4=getWeeks(4);
    var hasHoursById=!!cgHoursMap[sampleCG._id];
    var hasHoursByIdField=!!cgHoursMap[sampleCG.id];
    console.log('Sample CG _id:',sampleCG._id,'has hours:',hasHoursById);
    console.log('Sample CG .id:',sampleCG.id,'has hours:',hasHoursByIdField);
    console.log('Total CGs:',allCaregivers.length,'Hours map keys:',Object.keys(cgHoursMap).length);
    // If mismatch, try to remap
    if(!hasHoursById&&hasHoursByIdField){
      console.log('Remapping hours from .id to ._id');
      allCaregivers.forEach(function(cg){
        if(cg.id&&cgHoursMap[cg.id]&&!cgHoursMap[cg._id]){
          cgHoursMap[cg._id]=cgHoursMap[cg.id];
        }
      });
    }
  }
  document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString();
  renderTab();
}

async function fetchHours(wk){
  var end=new Date(wk);end.setUTCDate(end.getUTCDate()+6);
  var endStr=fmtD(end);
  try{
    var r=await fetch(API+'?endpoint=caregiver_hours&startDate='+wk+'&endDate='+endStr);
    var d=await r.json();
    var list=d.caregivers||[];
    list.forEach(function(cg){
      // caregiver_hours uses 'id' field, scheduledHrs for actual worked hours
      var id=cg.id||cg.cgid||cg._id;
      if(!id)return;
      if(!cgHoursMap[id])cgHoursMap[id]={};
      cgHoursMap[id][wk]=cg.scheduledHrs||cg.payableHours||0;
    });
  }catch(e){console.error('fetchHours error',wk,e);}
}

function renderTab(){
  if(curTab==='overview')renderOverview();
  else if(curTab==='hours')renderHours();
  else if(curTab==='lifecycle')renderLifecycle();
  else if(curTab==='roster')renderRoster();
}
function setTab(t,el){
  curTab=t;
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  el.classList.add('on');
  renderTab();
}

// ─────────────────────────────────────────────
// OVERVIEW
// ─────────────────────────────────────────────
function renderOverview(){
  var filtered=getFiltered();
  var active=filtered.filter(isActive);
  var weeks4=getWeeks(4);
  var otCount=0,zeroCount=0,totalHrs=0,cgWithHrs=0;
  active.forEach(function(cg){
    var a=cgAvgHrs(cg._id,weeks4);
    if(a>=40)otCount++;
    if(a===0)zeroCount++;
    else{totalHrs+=a;cgWithHrs++;}
  });
  var compAvg=cgWithHrs?totalHrs/cgWithHrs:0;
  var newHires=active.filter(function(cg){return cg.d&&cg.d.h&&(new Date()-new Date(cg.d.h))<30*86400000;}).length;

  // Market hours data
  var mktMap={};
  active.forEach(function(cg){
    var m=normalizeMarket(cg);
    if(!mktMap[m])mktMap[m]={sum:0,count:0,availSum:0};
    var a=cgAvgHrs(cg._id,weeks4);
    mktMap[m].sum+=a;mktMap[m].count++;
    mktMap[m].availSum+=(cg.availability&&cg.availability.hoursPerWeek)||40;
  });
  var mktArr=Object.entries(mktMap).filter(function(e){return e[1].count>0;}).sort(function(a,b){return b[1].sum/b[1].count-a[1].sum/a[1].count;});
  var maxAvg=Math.max.apply(null,mktArr.map(function(e){return e[1].sum/e[1].count;})||[1]);

  // Histogram buckets
  var buckets=[0,0,0,0,0,0,0];
  var bLabels=['0','1–10','11–20','21–30','31–40','41–55','55+'];
  var bColors=['var(--red)','var(--amber)','var(--blue)','var(--blue)','var(--green)','var(--amber)','var(--red)'];
  active.forEach(function(cg){
    var a=cgAvgHrs(cg._id,weeks4);
    if(a===0)buckets[0]++;
    else if(a<=10)buckets[1]++;
    else if(a<=20)buckets[2]++;
    else if(a<=30)buckets[3]++;
    else if(a<=40)buckets[4]++;
    else if(a<=55)buckets[5]++;
    else buckets[6]++;
  });
  var maxB=Math.max.apply(null,buckets)||1;

  // Zero hour breakdown
  var zeroCGs=active.filter(function(cg){return cgAvgHrs(cg._id,weeks4)===0;});
  var zRecent=zeroCGs.filter(function(cg){return cg.d&&cg.d.h&&(new Date()-new Date(cg.d.h))<30*86400000;}).length;
  var zNever=zeroCGs.filter(function(cg){return !(cg.queries&&cg.queries.lastBooking);}).length;
  var zDormant=zeroCGs.filter(function(cg){
    var lb=cg.queries&&cg.queries.lastBooking;
    return lb&&(new Date()-new Date(lb))>60*86400000;
  }).length;
  var zMaxZ=Math.max(zRecent,zNever,zDormant,1);

  var html='';
  // KPIs
  html+='<div class="kg6">';

  html+='<div class="kpi"><div class="kl">Avg Hrs / Week</div><div class="kv">'+compAvg.toFixed(1)+'</div><div class="ks">among working CGs</div></div>';

  html+='<div class="kpi"><div class="kl">Zero Hours</div><div class="kv r">'+zeroCount+'</div><div class="ks">active, no hrs 4wk avg</div></div>';
  html+='<div class="kpi"><div class="kl">Utilization</div><div class="kv">'+(active.length?Math.round(cgWithHrs/active.length*100):0)+'%</div><div class="ks">have hours this period</div></div>';
  html+='<div class="kpi"><div class="kl">New Hires (30d)</div><div class="kv g">'+newHires+'</div><div class="ks">hired last 30 days</div></div>';
  html+='</div>';

  // Two cols
  html+='<div class="two-col">';
  // Avg hrs by market
  html+='<div class="fc"><div class="ct">Avg Weekly Hours by Market</div>';
  html+=mktArr.map(function(e){
    var avg=e[1].sum/e[1].count;
    var pct=avg/maxAvg*100;
    var col=avg>=40?'var(--amber)':avg<20?'var(--red)':'var(--orange)';
    return '<div class="mkt-row"><div class="mkt-name">'+e[0]+'</div><div class="mkt-bar-wrap"><div class="mkt-bar" style="width:'+pct.toFixed(1)+'%;background:'+col+'"></div></div><div class="mkt-val">'+avg.toFixed(1)+'h</div><div class="mkt-sub">'+e[1].count+' CGs</div></div>';
  }).join('')+'</div>';
  // Utilization vs availability
  html+='<div class="fc"><div class="ct">Utilization vs Stated Availability</div>';
  html+=mktArr.map(function(e){
    var actual=e[1].sum/e[1].count;
    var avail=e[1].availSum/e[1].count;
    var util=avail>0?Math.min(actual/avail*100,100):0;
    var col=util>=85?'var(--amber)':util<50?'var(--red)':'var(--green)';
    return '<div class="mkt-row"><div class="mkt-name">'+e[0]+'</div><div class="mkt-bar-wrap"><div class="mkt-bar" style="width:'+util.toFixed(1)+'%;background:'+col+'"></div></div><div class="mkt-val">'+util.toFixed(0)+'%</div><div class="mkt-sub">'+actual.toFixed(0)+'/'+avail.toFixed(0)+'h</div></div>';
  }).join('')+'</div>';
  html+='</div>';

  // Two cols
  html+='<div class="two-col">';
  // Histogram
  html+='<div class="fc"><div class="ct">Hours Distribution (Active, 4wk avg)</div>';
  html+='<div class="hist">';
  html+=buckets.map(function(b,i){return '<div class="hist-bar" style="height:'+(b/maxB*100).toFixed(0)+'%;background:'+bColors[i]+';opacity:.75" title="'+bLabels[i]+' hrs: '+b+' caregivers"></div>';}).join('');
  html+='</div><div class="hist-labels">';
  html+=bLabels.map(function(l){return '<div class="hist-label">'+l+'</div>';}).join('');
  html+='</div></div>';
  // Zero breakdown
  html+='<div class="fc"><div class="ct">Zero-Hour Breakdown <span style="font-size:11px;text-transform:none;letter-spacing:0;color:var(--text3)">'+zeroCGs.length+' active caregivers</span></div>';
  html+=makeZeroRow('Recently hired (<30d)',zRecent,zMaxZ,'var(--blue)');
  html+=makeZeroRow('Dormant (60+ days)',zDormant,zMaxZ,'var(--red)');
  html+=makeZeroRow('Never booked',zNever,zMaxZ,'var(--amber)');
  html+='</div>';
  html+='</div>';

  document.getElementById('main').innerHTML=html;
}
function makeZeroRow(label,n,max,col){
  return '<div class="mkt-row"><div class="mkt-name" style="color:var(--text2)">'+label+'</div><div class="mkt-bar-wrap"><div class="mkt-bar" style="width:'+(n/max*100).toFixed(0)+'%;background:'+col+'"></div></div><div class="mkt-val">'+n+'</div></div>';
}

// HOURS DISTRIBUTION
// ─────────────────────────────────────────────
function renderHours(){
  var filtered=getFiltered();
  var active=filtered.filter(isActive);
  var weeks4=getWeeks(4);

  var otCGs=active.filter(function(cg){return cgAvgHrs(cg._id,weeks4)>=40;}).sort(function(a,b){return cgAvgHrs(b._id,weeks4)-cgAvgHrs(a._id,weeks4);}).slice(0,12);
  var underCGs=active.filter(function(cg){var a=cgAvgHrs(cg._id,weeks4);return a>0&&a<20;}).sort(function(a,b){return cgAvgHrs(a._id,weeks4)-cgAvgHrs(b._id,weeks4);}).slice(0,12);
  var zeroCGs=active.filter(function(cg){return cgAvgHrs(cg._id,weeks4)===0;}).slice(0,12);

  // Market weekly trend
  var mktMap={};
  active.forEach(function(cg){
    var m=normalizeMarket(cg);
    if(!mktMap[m])mktMap[m]=[];
    mktMap[m].push(cg._id);
  });

  var html='<div class="fc"><div class="ct">Weekly Hours Trend by Market — Last 4 Weeks</div>';

  Object.entries(mktMap).forEach(function(e){
    var mkt=e[0],ids=e[1];

      var vals=ids.map(function(id){return cgHoursMap[id]&&cgHoursMap[id][w]||0;}).filter(function(v){return v>0;});
      return vals.length?vals.reduce(function(s,v){return s+v;},0)/vals.length:0;
    });
    var maxW=Math.max.apply(null,wkAvgs)||1;
    html+='<div><div style="font-size:11px;font-weight:600;margin-bottom:6px">'+mkt+'</div>';
    html+='<div style="display:flex;gap:4px;align-items:flex-end;height:36px">';
    html+=wkAvgs.map(function(v,i){return '<div style="flex:1;height:'+(v/maxW*100).toFixed(0)+'%;background:'+(v>=40?'var(--amber)':v>0?'var(--orange)':'var(--gray200)')+';border-radius:2px 2px 0 0;opacity:.8" title="'+weeks4[i]+': '+v.toFixed(1)+'h"></div>';}).join('');
    html+='</div><div style="display:flex;gap:4px;margin-top:3px">';
    html+=weeks4.map(function(w){return '<div style="flex:1;font-size:8px;color:var(--text4);text-align:center">'+w.slice(5)+'</div>';}).join('');
    html+='</div></div>';
  });
  html+='</div></div>';

  html+='<div class="three-col">';
  // OT
  html+='<div class="fc"><div class="ct">OT Caregivers (40+ hrs avg)</div>';
  html+=otCGs.length?'<table class="tbl"><thead><tr><th>Name</th><th>Market</th><th>Avg Hrs</th></tr></thead><tbody>';
  html+=otCGs.map(function(cg){var a=cgAvgHrs(cg._id,weeks4);return '<tr onclick="openModal(\''+cg._id+'\')"><td>'+cg.fn+' '+cg.ln+'</td><td style="color:var(--text3)">'+normalizeMarket(cg)+'</td><td><span class="bdg ba">'+a.toFixed(0)+'h</span></td></tr>';}).join('');
  html+='</tbody></table>':'<div style="color:var(--text4);padding:8px">None in selection</div>';
  html+='</div>';
  // Under
  html+='<div class="fc"><div class="ct">Underutilized (&lt;20 hrs avg)</div>';
  html+=underCGs.length?'<table class="tbl"><thead><tr><th>Name</th><th>Market</th><th>Avg Hrs</th></tr></thead><tbody>';
  html+=underCGs.map(function(cg){var a=cgAvgHrs(cg._id,weeks4);return '<tr onclick="openModal(\''+cg._id+'\')"><td>'+cg.fn+' '+cg.ln+'</td><td style="color:var(--text3)">'+normalizeMarket(cg)+'</td><td style="color:var(--red)">'+a.toFixed(0)+'h</td></tr>';}).join('');
  html+='</tbody></table>':'<div style="color:var(--text4);padding:8px">None in selection</div>';
  html+='</div>';
  // Zero
  html+='<div class="fc"><div class="ct">Zero Hours This Period</div>';
  html+=zeroCGs.length?'<table class="tbl"><thead><tr><th>Name</th><th>Market</th><th>Last Visit</th></tr></thead><tbody>';
  html+=zeroCGs.map(function(cg){var lb=cg.queries&&cg.queries.lastBooking;return '<tr onclick="openModal(\''+cg._id+'\')"><td>'+cg.fn+' '+cg.ln+'</td><td style="color:var(--text3)">'+normalizeMarket(cg)+'</td><td style="color:var(--text4)">'+fmtDate(lb)+'</td></tr>';}).join('');
  html+='</tbody></table>':'<div style="color:var(--text4);padding:8px">None in selection</div>';
  html+='</div>';
  html+='</div>';

  document.getElementById('main').innerHTML=html;
}

// ─────────────────────────────────────────────
// LIFECYCLE
// ─────────────────────────────────────────────
function renderLifecycle(){
  var all=allCaregivers;
  var filt=getFiltered();
  var active=filt.filter(isActive);
  var terminated=filt.filter(isTerminated);
  var now=new Date();
  var d30=new Date(now-30*86400000);
  var d90=new Date(now-90*86400000);
  var d365=new Date(now-365*86400000);

  var nh30=active.filter(function(cg){return cg.d&&cg.d.h&&new Date(cg.d.h)>=d30;}).length;
  var t30=terminated.filter(function(cg){return cg.d&&cg.d.terminated&&new Date(cg.d.terminated)>=d30;}).length;
  var tenures=active.filter(function(cg){return cg.d&&cg.d.h;}).map(function(cg){return tenureDays(cg.d.h);});
  var avgTen=tenures.length?Math.round(tenures.reduce(function(s,v){return s+v;},0)/tenures.length/30):0;
  var retRate=all.length?Math.round(active.length/all.length*100):0;

  var html='<div class="kg">';
  html+='<div class="kpi"><div class="kl">Total Roster</div><div class="kv">'+all.length+'</div><div class="ks">all time</div></div>';
  html+='<div class="kpi"><div class="kl">Active</div><div class="kv g">'+active.length+'</div><div class="ks">'+retRate+'% retention</div></div>';
  html+='<div class="kpi"><div class="kl">Terminated</div><div class="kv r">'+terminated.length+'</div><div class="ks">in filtered view</div></div>';
  html+='<div class="kpi"><div class="kl">New Hires (30d)</div><div class="kv o">'+nh30+'</div><div class="ks">hired last 30 days</div></div>';
  html+='<div class="kpi"><div class="kl">Terms (30d)</div><div class="kv '+(t30>nh30?'r':'a')+'">'+t30+'</div><div class="ks">last 30 days</div></div>';
  html+='</div>';

  // Tenure + hire/term trend
  html+='<div class="two-col">';
  // Tenure distribution
  var tBuckets={'<3 months':0,'3–6 months':0,'6–12 months':0,'1–2 years':0,'2–3 years':0,'3+ years':0};
  active.forEach(function(cg){
    if(!cg.d||!cg.d.h)return;
    var d=tenureDays(cg.d.h);
    if(d<90)tBuckets['<3 months']++;
    else if(d<180)tBuckets['3–6 months']++;
    else if(d<365)tBuckets['6–12 months']++;
    else if(d<730)tBuckets['1–2 years']++;
    else if(d<1095)tBuckets['2–3 years']++;
    else tBuckets['3+ years']++;
  });
  var maxT=Math.max.apply(null,Object.values(tBuckets))||1;
  html+='<div class="fc"><div class="ct">Tenure Distribution (Active)</div>';
  html+=Object.entries(tBuckets).map(function(e){
    return '<div class="tenure-row"><div class="tenure-label">'+e[0]+'</div><div class="tenure-bar-bg"><div class="tenure-bar-fill" style="width:'+(e[1]/maxT*100).toFixed(0)+'%"></div></div><div class="tenure-n">'+e[1]+'</div><div class="tenure-pct">'+(active.length?Math.round(e[1]/active.length*100):0)+'%</div></div>';
  }).join('')+'</div>';

  // Hire/term trend 12 months
  var months={};
  for(var i=11;i>=0;i--){
    var mo=new Date(now);mo.setMonth(mo.getMonth()-i);
    months[mo.toISOString().slice(0,7)]={h:0,t:0};
  }
  all.forEach(function(cg){
    if(cg.d&&cg.d.h){var k=cg.d.h.slice(0,7);if(months[k])months[k].h++;}
    if(cg.d&&cg.d.terminated){var k=cg.d.terminated.slice(0,7);if(months[k])months[k].t++;}
  });
  var mArr=Object.entries(months);
  var maxM=Math.max.apply(null,mArr.map(function(e){return Math.max(e[1].h,e[1].t);}));maxM=maxM||1;
  html+='<div class="fc"><div class="ct">Hire vs Termination Trend</div>';
  html+='<div class="month-bar">';
  html+=mArr.map(function(e){
    return '<div class="month-col"><div class="month-h" style="height:'+(e[1].h/maxM*100).toFixed(0)+'%;background:var(--green);opacity:.75;min-height:'+(e[1].h?2:0)+'px" title="'+e[0]+': '+e[1].h+' hires"></div><div class="month-h" style="height:'+(e[1].t/maxM*100).toFixed(0)+'%;background:var(--red);opacity:.75;min-height:'+(e[1].t?2:0)+'px" title="'+e[0]+': '+e[1].t+' terms"></div></div>';
  }).join('');
  html+='</div><div class="month-labels">';
  html+=mArr.map(function(e){return '<div class="month-label">'+e[0].slice(5)+'</div>';}).join('');
  html+='</div>';
  html+='<div style="display:flex;gap:12px;margin-top:8px">';
  html+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><div style="width:10px;height:10px;background:var(--green);border-radius:2px;opacity:.75"></div>Hires</div>';
  html+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><div style="width:10px;height:10px;background:var(--red);border-radius:2px;opacity:.75"></div>Terms</div>';
  html+='</div></div>';
  html+='</div>';

  // Terms + hires by market
  html+='<div class="two-col">';
  var termMkt={},hireMkt={};
  filt.filter(isTerminated).forEach(function(cg){
    if(!cg.d||!cg.d.terminated||new Date(cg.d.terminated)<d365)return;
    var m=normalizeMarket(cg);termMkt[m]=(termMkt[m]||0)+1;
  });
  active.forEach(function(cg){
    if(!cg.d||!cg.d.h||new Date(cg.d.h)<d90)return;
    var m=normalizeMarket(cg);hireMkt[m]=(hireMkt[m]||0)+1;
  });
  var maxTM=Math.max.apply(null,Object.values(termMkt))||1;
  var maxHM=Math.max.apply(null,Object.values(hireMkt))||1;
  html+='<div class="fc"><div class="ct">Terminations by Market (12mo)</div>';
  html+=Object.entries(termMkt).sort(function(a,b){return b[1]-a[1];}).map(function(e){
    return '<div class="mkt-row"><div class="mkt-name">'+e[0]+'</div><div class="mkt-bar-wrap"><div class="mkt-bar" style="width:'+(e[1]/maxTM*100).toFixed(0)+'%;background:var(--red)"></div></div><div class="mkt-val">'+e[1]+'</div></div>';
  }).join('')||'<div style="color:var(--text4);padding:8px">No data</div>';
  html+='</div>';
  html+='<div class="fc"><div class="ct">New Hires by Market (90d)</div>';
  html+=Object.entries(hireMkt).sort(function(a,b){return b[1]-a[1];}).map(function(e){
    return '<div class="mkt-row"><div class="mkt-name">'+e[0]+'</div><div class="mkt-bar-wrap"><div class="mkt-bar" style="width:'+(e[1]/maxHM*100).toFixed(0)+'%;background:var(--green)"></div></div><div class="mkt-val">'+e[1]+'</div></div>';
  }).join('')||'<div style="color:var(--text4);padding:8px">No hires in last 90 days</div>';
  html+='</div>';
  html+='</div>';

  document.getElementById('main').innerHTML=html;
}

// ─────────────────────────────────────────────
// ROSTER
// ─────────────────────────────────────────────
function renderRoster(){
  var filtered=getFiltered();
  var weeks4=getWeeks(4);
  var q=(document.getElementById('rosterSearch')||{value:''}).value||'';
  var list=filtered;
  if(q){
    var ql=q.toLowerCase();
    list=list.filter(function(cg){
      return (cg.fn+' '+cg.ln).toLowerCase().includes(ql)||normalizeMarket(cg).toLowerCase().includes(ql)||(cg.designation||'').toLowerCase().includes(ql);
    });
  }
  list=list.slice().sort(function(a,b){
    var va,vb,col=rosterSort.col;
    if(col==='name'){va=a.fn+' '+a.ln;vb=b.fn+' '+b.ln;}
    else if(col==='market'){va=normalizeMarket(a);vb=normalizeMarket(b);}
    else if(col==='status'){va=a.st||'';vb=b.st||'';}
    else if(col==='tenure'){va=tenureDays(a.d&&a.d.h,a.d&&a.d.terminated);vb=tenureDays(b.d&&b.d.h,b.d&&b.d.terminated);}
    else if(col==='hireDate'){va=a.d&&a.d.h||'';vb=b.d&&b.d.h||'';}
    else if(col==='avgHrs'){va=cgAvgHrs(a._id,weeks4);vb=cgAvgHrs(b._id,weeks4);}
    else if(col==='avail'){va=a.availability&&a.availability.hoursPerWeek||0;vb=b.availability&&b.availability.hoursPerWeek||0;}
    else{va=0;vb=0;}
    if(typeof va==='string')return rosterSort.dir*va.localeCompare(vb);
    return rosterSort.dir*(va-vb);
  });

  var show=list.slice(0,200);
  function th(label,col){return '<th onclick="sortRoster(\''+col+'\')">'+label+(rosterSort.col===col?(rosterSort.dir===1?' ↓':' ↑'):'')+'</th>';}
  var html='<div class="fc">';
  html+='<div class="search-wrap"><span class="search-icon">⌕</span><input type="text" id="rosterSearch" placeholder="Search name, market, designation…" oninput="renderRoster()" value="'+q+'" style="width:100%"></div>';
  html+='<div style="overflow-x:auto"><table class="tbl"><thead><tr>';
  html+=th('Name','name')+th('Market','market')+th('Status','status')+th('Hired','hireDate')+th('Tenure','tenure')+th('Avg Hrs/Wk','avgHrs')+th('Availability','avail')+'<th>Last Visit</th><th>Skills</th>';
  html+='</tr></thead><tbody>';
  html+=show.map(function(cg){
    var a=cgAvgHrs(cg._id,weeks4);
    var avail=cg.availability&&cg.availability.hoursPerWeek||'—';
    var st=isActive(cg)?'active':isTerminated(cg)?'terminated':'inactive';
    var stBdg=isActive(cg)?'bg':isTerminated(cg)?'br':'ba';
    var skills=(cg.attrs||[]).filter(function(a){return a.type==='experience'||a.type==='certification';}).slice(0,3);
    var lb=cg.queries&&cg.queries.lastBooking;
    return '<tr onclick="openModal(\''+cg._id+'\')">'+
      '<td><strong>'+cg.fn+' '+cg.ln+'</strong></td>'+
      '<td>'+normalizeMarket(cg)+'</td>'+
      '<td><span class="bdg '+stBdg+'">'+st+'</span></td>'+
      '<td style="color:var(--text3)">'+fmtDate(cg.d&&cg.d.h)+'</td>'+
      '<td>'+tenure(cg.d&&cg.d.h,cg.d&&cg.d.terminated)+'</td>'+
      '<td style="font-weight:600;color:'+(a>=40?'var(--amber)':a===0?'var(--red)':'var(--charcoal)')+'">'+a.toFixed(1)+'h</td>'+
      '<td style="color:var(--text3)">'+avail+(avail!=='—'?'h':'')+'</td>'+
      '<td style="color:var(--text4)">'+fmtDate(lb)+'</td>'+
      '<td>'+skills.map(function(s){return '<span class="skill-tag">'+s.text+'</span>';}).join('')+'</td>'+
      '</tr>';
  }).join('');
  html+='</tbody></table></div>';
  html+='<div style="margin-top:8px;font-size:10px;color:var(--text4)">Showing '+show.length+' of '+list.length+' caregivers</div>';
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}
function sortRoster(col){
  if(rosterSort.col===col)rosterSort.dir*=-1;else{rosterSort.col=col;rosterSort.dir=1;}
  renderRoster();
}

// ─────────────────────────────────────────────
function openModal(cgId){
  var cg=allCaregivers.find(function(c){return c._id===cgId;});
  if(!cg)return;
  var weeks8=getWeeks(8);
  var weeks4=getWeeks(4);
  var avg=cgAvgHrs(cg._id,weeks4);
  var avail=cg.availability&&cg.availability.hoursPerWeek||40;
  var weekHrs=weeks8.map(function(w){return cgHoursMap[cgId]&&cgHoursMap[cgId][w]||0;});
  var maxWH=Math.max.apply(null,weekHrs)||1;
  var skills=(cg.attrs||[]).filter(function(a){return a.type==='experience'||a.type==='certification';});
  var st=isActive(cg);

  var html='<div class="modal-hdr">';
  html+='<div><div class="modal-name">'+cg.fn+' '+cg.ln+'</div>';
  html+='<div class="modal-sub">'+normalizeMarket(cg)+' · '+(cg.designation||'Caregiver')+' · <span class="bdg '+(st?'bg':'br')+'">'+cg.st+'</span></div></div>';
  html+='<button class="modal-close" onclick="closeModal()">✕</button></div>';

  html+='<div class="modal-kpis">';
  html+='<div class="modal-kpi"><div class="modal-kpi-l">Hire Date</div><div class="modal-kpi-v" style="font-size:13px">'+fmtDate(cg.d&&cg.d.h)+'</div></div>';
  html+='<div class="modal-kpi"><div class="modal-kpi-l">Tenure</div><div class="modal-kpi-v">'+tenure(cg.d&&cg.d.h,cg.d&&cg.d.terminated)+'</div></div>';
  html+='<div class="modal-kpi"><div class="modal-kpi-l">Avg Hrs/Wk</div><div class="modal-kpi-v" style="color:'+(avg>=40?'var(--amber)':avg===0?'var(--red)':'var(--green)')+'">'+avg.toFixed(1)+'h</div></div>';
  html+='<div class="modal-kpi"><div class="modal-kpi-l">Availability</div><div class="modal-kpi-v">'+avail+'h</div></div>';
  html+='</div>';

  html+='<div class="modal-sec"><div class="modal-sec-title">Weekly Hours — Last 8 Weeks</div>';
  html+='<div class="week-chart">';
  html+=weekHrs.map(function(h,i){return '<div class="week-col"><div class="week-bar" style="height:'+(h/maxWH*100).toFixed(0)+'%;background:'+(h>=40?'var(--amber)':h>0?'var(--orange)':'var(--gray200)')+'" title="'+weeks8[i]+': '+h.toFixed(1)+'h"></div><div class="week-lbl">'+weeks8[i].slice(5)+'</div></div>';}).join('');
  html+='</div></div>';

  if(skills.length){
    html+='<div class="modal-sec"><div class="modal-sec-title">Skills & Certifications</div>';
    html+=skills.map(function(s){return '<span class="skill-tag">'+s.text+'</span>';}).join('');
    html+='</div>';
  }

  html+='<div class="modal-sec"><div class="modal-sec-title">Profile</div>';
  html+='<div class="detail-grid">';
  html+='<div class="detail-item"><div class="dl">Designation</div><div class="dv">'+(cg.designation||'—')+'</div></div>';
  html+='<div class="detail-item"><div class="dl">Gender</div><div class="dv">'+(cg.gender||'—')+'</div></div>';
  html+='<div class="detail-item"><div class="dl">Drives</div><div class="dv">'+(cg.drive||'—')+'</div></div>';
  html+='<div class="detail-item"><div class="dl">Last App Login</div><div class="dv">'+fmtDate(cg.queries&&cg.queries.lastAppLogin)+'</div></div>';
  html+='<div class="detail-item"><div class="dl">Last Booking</div><div class="dv">'+fmtDate(cg.queries&&cg.queries.lastBooking)+'</div></div>';
  html+='<div class="detail-item"><div class="dl">iSolved #</div><div class="dv">'+(cg.integrations&&cg.integrations.iSolved&&cg.integrations.iSolved.employeeNumber||'—')+'</div></div>';
  if(!st)html+='<div class="detail-item"><div class="dl">Terminated</div><div class="dv" style="color:var(--red)">'+fmtDate(cg.d&&cg.d.terminated)+'</div></div>';
  html+='</div></div>';

  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

// Auto-load
(function(){
  curWeek=fmtD(getSunday(0));
  load();
})();
</script>
