<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caregiver Utilization — Tribute OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B1120;--bg2:#111827;--bg3:#1E293B;--bg4:#334155;
  --border:#1E293B;--border2:#334155;
  --text:#E2E8F0;--text2:#94A3B8;--text3:#64748B;
  --orange:#E8541A;--orange-light:#F47A4A;
  --green:#22C55E;--green-bg:rgba(34,197,94,.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,.12);
  --yellow:#EAB308;--yellow-bg:rgba(234,179,8,.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.12);
  --purple:#A855F7;--purple-bg:rgba(168,85,247,.12);
  --navy:#0F2647;--slate:#44546A;
  --r:8px;--rl:12px;
  --shadow:0 4px 24px rgba(0,0,0,.3);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:baseline;gap:6px}
.topbar-tribute{font-family:'DM Serif Display',serif;font-size:20px;color:var(--orange);letter-spacing:-.01em}
.topbar-sub{font-size:11px;color:var(--text3)}
.topbar-back{color:var(--text2);text-decoration:none;font-size:12px;display:flex;align-items:center;gap:4px;transition:color .2s}
.topbar-back:hover{color:var(--orange)}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-bar{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;overflow-x:auto}
.tab-btn{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.content{padding:24px 32px;max-width:1600px;margin:0 auto}
.section{display:none}.section.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.kpi-value{font-size:22px;font-weight:600;color:var(--text)}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.yellow{color:var(--yellow)}.kpi-value.orange{color:var(--orange)}.kpi-value.blue{color:var(--blue)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.table-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);color:var(--text2);font-weight:500;padding:10px 12px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--border2);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th.sorted-asc::after{content:' \u25B2';color:var(--orange)}
thead th.sorted-desc::after{content:' \u25BC';color:var(--orange)}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tbody tr:hover{background:rgba(255,255,255,.03)}
.util-bar{display:flex;align-items:center;gap:6px}
.util-track{width:70px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;flex-shrink:0}
.util-fill{height:100%;border-radius:3px}
.util-pct{font-size:11px;font-weight:500;min-width:36px}
.u-green .util-fill{background:var(--green)}.u-green .util-pct{color:var(--green)}
.u-yellow .util-fill{background:var(--yellow)}.u-yellow .util-pct{color:var(--yellow)}
.u-red .util-fill{background:var(--red)}.u-red .util-pct{color:var(--red)}
.u-over .util-fill{background:var(--orange)}.u-over .util-pct{color:var(--orange)}
.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}
.type-long{background:var(--green-bg);color:var(--green)}
.type-overnight{background:rgba(249,115,22,.12);color:#F97316}
.type-short{background:var(--yellow-bg);color:var(--yellow)}
.type-livein{background:var(--blue-bg);color:var(--blue)}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:var(--r);font-size:12px;font-family:inherit}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--orange)}
.fl{font-size:11px;color:var(--text3);margin-right:-8px}
.ts{font-size:11px;color:var(--text3);margin-bottom:12px}
.sev-alert{color:var(--red);font-weight:600}.sev-warning{color:var(--orange)}.sev-info{color:var(--text2)}
.gap-low{color:var(--text2)}.gap-med{color:var(--yellow)}.gap-high{color:var(--orange);font-weight:600}
.payout-ok{color:var(--green)}.payout-warn{color:var(--yellow);font-weight:600}.payout-high{color:var(--orange);font-weight:700}
.hm-cell{padding:6px;text-align:center;border-radius:4px;font-weight:600;font-size:11px}
@media(max-width:900px){.content{padding:16px}.tab-bar,.topbar{padding:0 16px}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand"><span class="topbar-tribute">Tribute</span><span class="topbar-sub">Caregiver Utilization</span></div>
  <a href="index.html" class="topbar-back">&larr; Back to Dashboard</a>
</div>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="dash">Dashboard</button>
  <button class="tab-btn" data-tab="market">Market Summary</button>
  <button class="tab-btn" data-tab="state">State Summary</button>
  <button class="tab-btn" data-tab="detail">Caregiver Detail</button>
  <button class="tab-btn" data-tab="daybreak">Day Breakdown</button>
  <button class="tab-btn" data-tab="roster">Caregiver Roster</button>
  <button class="tab-btn" data-tab="ts">TS Admin Tracker</button>
  <button class="tab-btn" data-tab="travel">Travel Time</button>
  <button class="tab-btn" data-tab="lhon">Long Hrs &amp; Overnights</button>
  <button class="tab-btn" data-tab="shiftmix">Shift Mix</button>
  <button class="tab-btn" data-tab="newhires">New Hires 90 Days</button>
  <button class="tab-btn" data-tab="validation">Validation</button>
</div>
<div id="loading" class="loading-wrap"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">Loading utilization data...</div></div>
<div id="app" class="content" style="display:none">
  <div id="tab-dash" class="section active"></div>
  <div id="tab-market" class="section"></div>
  <div id="tab-state" class="section"></div>
  <div id="tab-detail" class="section"></div>
  <div id="tab-daybreak" class="section"></div>
  <div id="tab-roster" class="section"></div>
  <div id="tab-ts" class="section"></div>
  <div id="tab-travel" class="section"></div>
  <div id="tab-lhon" class="section"></div>
  <div id="tab-shiftmix" class="section"></div>
  <div id="tab-newhires" class="section"></div>
  <div id="tab-validation" class="section"></div>
</div>
<script>
(function(){
'use strict';
var API='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
var MKT_ORDER=['Boston','North of Boston','MetroWest Boston','South of Boston','Chicago','Annapolis','Baltimore','Bethesda'];
var D;  // full data object from proxy

// ── Helpers ──
function $(s,p){return(p||document).querySelector(s);}
function $$(s,p){return Array.from((p||document).querySelectorAll(s));}
function fmt(n,d){return n==null?'—':Number(n).toLocaleString(undefined,{minimumFractionDigits:d||0,maximumFractionDigits:d||0});}
function fmtPct(n){return n==null?'—':fmt(n,1)+'%';}
function fmtDol(n){return n==null?'—':'$'+fmt(n,0);}
function utilClass(p){return p>110?'u-over':p>=80?'u-green':p>=50?'u-yellow':'u-red';}
function utilBar(p){
  var cls=utilClass(p);
  return '<div class="util-bar '+cls+'"><div class="util-track"><div class="util-fill" style="width:'+Math.min(p,100)+'%"></div></div><span class="util-pct">'+fmtPct(p)+'</span></div>';
}
function typeBadge(t){
  var m={'Long Hours':'type-long','Overnight':'type-overnight','Short Hours':'type-short','Live-In':'type-livein','Hourly':'type-short'};
  return '<span class="type-badge '+(m[t]||'type-short')+'">'+t+'</span>';
}
function gapClass(h){return h>=1.5?'gap-high':h>=0.5?'gap-med':'gap-low';}
function payoutClass(h){return h>=15?'payout-high':h>=5?'payout-warn':'payout-ok';}

// ── Sortable Table Builder ──
function buildTable(container, columns, rows, opts){
  opts=opts||{};
  var sortCol=opts.defaultSort||0, sortAsc=opts.defaultAsc!==undefined?opts.defaultAsc:true;
  var wrapper=document.createElement('div');
  wrapper.className='table-wrap';
  if(opts.maxHeight) wrapper.style.cssText='max-height:'+opts.maxHeight+';overflow-y:auto';
  var tbl=document.createElement('table');
  var thead=document.createElement('thead');
  var tbody=document.createElement('tbody');
  tbl.appendChild(thead);tbl.appendChild(tbody);wrapper.appendChild(tbl);
  container.appendChild(wrapper);

  function render(){
    var sorted=rows.slice().sort(function(a,b){
      var av=columns[sortCol].val?columns[sortCol].val(a):a[columns[sortCol].key];
      var bv=columns[sortCol].val?columns[sortCol].val(b):b[columns[sortCol].key];
      if(av==null)av=sortAsc?Infinity:-Infinity;
      if(bv==null)bv=sortAsc?Infinity:-Infinity;
      if(typeof av==='string')av=av.toLowerCase();
      if(typeof bv==='string')bv=bv.toLowerCase();
      return sortAsc?(av>bv?1:av<bv?-1:0):(av<bv?1:av>bv?-1:0);
    });
    // Header
    thead.innerHTML='<tr>'+columns.map(function(c,i){
      var cls=i===sortCol?(sortAsc?'sorted-asc':'sorted-desc'):'';
      return '<th class="'+cls+'" data-ci="'+i+'">'+c.label+'</th>';
    }).join('')+'</tr>';
    // Body
    tbody.innerHTML=sorted.map(function(row){
      return '<tr>'+columns.map(function(c){
        var v=c.render?c.render(row):(row[c.key]!=null?row[c.key]:'—');
        return '<td>'+v+'</td>';
      }).join('')+'</tr>';
    }).join('');
    // Click handlers
    $$('th',thead).forEach(function(th){
      th.onclick=function(){
        var ci=parseInt(th.dataset.ci);
        if(ci===sortCol)sortAsc=!sortAsc;
        else{sortCol=ci;sortAsc=true;}
        render();
      };
    });
  }
  render();
  return {render:render,setRows:function(r){rows=r;render();}};
}

// ── KPI Card ──
function kpi(label,value,cls,sub){
  return '<div class="kpi"><div class="kpi-label">'+label+'</div><div class="kpi-value '+(cls||'')+'">'+value+'</div>'+(sub?'<div class="kpi-sub">'+sub+'</div>':'')+'</div>';
}

// ── Tab Switching ──
$$('.tab-btn').forEach(function(btn){
  btn.onclick=function(){
    $$('.tab-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    $$('.section').forEach(function(s){s.classList.remove('active');});
    var t=$('#tab-'+btn.dataset.tab);
    if(t)t.classList.add('active');
  };
});

// ── Fetch & Render ──
fetch(API+'?endpoint=utilization_report').then(function(r){return r.json();}).then(function(data){
  D=data;
  $('#loading').style.display='none';
  $('#app').style.display='block';
  renderDashboard();
  renderMarketSummary();
  renderStateSummary();
  renderCaregiverDetail();
  renderDayBreakdown();
  renderRoster();
  renderTSAdmin();
  renderTravelTime();
  renderLHON();
  renderShiftMix();
  renderNewHires();
  renderValidation();
}).catch(function(e){
  $('#loading').innerHTML='<div style="color:var(--red)">Error loading data: '+e.message+'</div>';
});

// ── DASHBOARD ──
function renderDashboard(){
  var el=$('#tab-dash');var s=D.summary;
  el.innerHTML='<div class="ts">Week of '+D.weekOf+' to '+D.weekEnd+' | Generated '+new Date(D.generatedAt).toLocaleString()+'</div>';
  el.innerHTML+='<div class="kpi-row">'+
    kpi('Active Caregivers',fmt(s.activeCaregivers)+' / '+fmt(s.totalCaregivers),'','of total')+
    kpi('Overall Utilization',fmtPct(s.overallUtilPct),s.overallUtilPct>=80?'green':s.overallUtilPct>=50?'yellow':'red')+
    kpi('Total Scheduled',fmt(s.totalScheduledHrs,1)+' hrs','')+
    kpi('Total Billed',fmt(s.totalBilledHrs,1)+' hrs','blue')+
    kpi('Total Payable',fmt(s.totalPayableHrs,1)+' hrs','')+
    kpi('Revenue',fmtDol(s.totalRevenue),'green')+
    kpi('Cost',fmtDol(s.totalCost),'red')+
    kpi('Gross Profit',fmtDol(s.grossProfit),'green',fmt(s.grossMarginPct,1)+'% margin')+
    kpi('Travel Gaps',fmt(s.travelGapCount),'orange')+
    kpi('TS Admin Payouts',fmt(s.tsAdminCount),'yellow')+
    kpi('New Hires (90d)',fmt(s.newHireCount),'blue')+
    kpi('Validation Flags',fmt(s.validationCount),s.validationCount>0?'orange':'green')+
  '</div>';
  // Market heatmap
  var h='<div class="table-wrap"><table><thead><tr><th>Market</th><th>Fill Rate</th><th>Billed Hrs</th><th>Payable Hrs</th><th>Revenue</th><th>Gross Margin</th></tr></thead><tbody>';
  D.marketSummary.sort(function(a,b){return MKT_ORDER.indexOf(a.market)-MKT_ORDER.indexOf(b.market);}).forEach(function(m){
    var gmCls=m.grossMarginPct>=0.4?'green':m.grossMarginPct>=0.3?'yellow':'red';
    h+='<tr><td><strong>'+m.market+'</strong></td><td>'+fmtPct(m.fillRate*100)+'</td><td>'+fmt(m.billedHrs,1)+'</td><td>'+fmt(m.payableHrs,1)+'</td><td>'+fmtDol(m.revenue)+'</td><td class="'+gmCls+'">'+fmtPct(m.grossMarginPct*100)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML+=h;
}

// ── MARKET SUMMARY ──
function renderMarketSummary(){
  var el=$('#tab-market');
  el.innerHTML='<div class="ts">Week of '+D.weekOf+'</div>';
  var cols=[
    {label:'Market',key:'market'},
    {label:'State',key:'state'},
    {label:'Visits',key:'totalVisits'},
    {label:'Filled',key:'filledVisits'},
    {label:'Open',key:'openVisits'},
    {label:'Cancelled',key:'cancelledVisits'},
    {label:'Fill Rate',key:'fillRate',render:function(r){return fmtPct(r.fillRate*100);}},
    {label:'Scheduled Hrs',key:'scheduledHrs',render:function(r){return fmt(r.scheduledHrs,1);}},
    {label:'Billed Hrs',key:'billedHrs',render:function(r){return fmt(r.billedHrs,1);}},
    {label:'Payable Hrs',key:'payableHrs',render:function(r){return fmt(r.payableHrs,1);}},
    {label:'Revenue',key:'revenue',render:function(r){return fmtDol(r.revenue);}},
    {label:'Cost',key:'cost',render:function(r){return fmtDol(r.cost);}},
    {label:'Gross Profit',key:'grossProfit',render:function(r){return fmtDol(r.grossProfit);}},
    {label:'Margin %',key:'grossMarginPct',render:function(r){return fmtPct(r.grossMarginPct*100);}},
    {label:'Avg Bill Rate',key:'avgBillRate',render:function(r){return '$'+fmt(r.avgBillRate,2);}},
    {label:'Avg Pay Rate',key:'avgPayRate',render:function(r){return '$'+fmt(r.avgPayRate,2);}}
  ];
  buildTable(el,cols,D.marketSummary,{defaultSort:0});
}

// ── STATE SUMMARY ──
function renderStateSummary(){
  var el=$('#tab-state');
  el.innerHTML='<div class="ts">Week of '+D.weekOf+'</div>';
  var cols=[
    {label:'State',key:'state'},
    {label:'Visits',key:'totalVisits'},
    {label:'Filled',key:'filledVisits'},
    {label:'Open',key:'openVisits'},
    {label:'Fill Rate',key:'fillRate',render:function(r){return fmtPct(r.fillRate*100);}},
    {label:'Scheduled Hrs',key:'scheduledHrs',render:function(r){return fmt(r.scheduledHrs,1);}},
    {label:'Billed Hrs',key:'billedHrs',render:function(r){return fmt(r.billedHrs,1);}},
    {label:'Payable Hrs',key:'payableHrs',render:function(r){return fmt(r.payableHrs,1);}},
    {label:'Revenue',key:'revenue',render:function(r){return fmtDol(r.revenue);}},
    {label:'Cost',key:'cost',render:function(r){return fmtDol(r.cost);}},
    {label:'Gross Profit',key:'grossProfit',render:function(r){return fmtDol(r.grossProfit);}},
    {label:'Margin %',key:'grossMarginPct',render:function(r){return fmtPct(r.grossMarginPct*100);}},
    {label:'Avg Bill Rate',key:'avgBillRate',render:function(r){return '$'+fmt(r.avgBillRate,2);}},
    {label:'Avg Pay Rate',key:'avgPayRate',render:function(r){return '$'+fmt(r.avgPayRate,2);}}
  ];
  buildTable(el,cols,D.stateSummary,{defaultSort:0});
}

// ── CAREGIVER DETAIL ──
function renderCaregiverDetail(){
  var el=$('#tab-detail');
  el.innerHTML='<div class="ts" id="ts-detail">Week of '+D.weekOf+'</div>'+
    '<div class="filter-bar"><span class="fl">Market</span><select id="flt-mkt"><option value="">All</option></select>'+
    '<span class="fl">Type</span><select id="flt-type"><option value="">All</option><option value="Long Hours">Long Hrs</option><option value="Overnight">Overnight</option><option value="Short Hours">Short Hrs</option><option value="Live-In">Live-In</option></select>'+
    '<span class="fl">Search</span><input id="flt-search" placeholder="Name..." style="width:140px">'+
    '<span class="fl">Show</span><select id="flt-show"><option value="all">All</option><option value="zero">Zero Util</option><option value="over">Over 100%</option><option value="under50">Under 50%</option></select></div>';
  // Populate market filter
  var mkts={};D.caregiverDetail.forEach(function(c){mkts[c.market]=1;});
  var mktSel=$('#flt-mkt');
  MKT_ORDER.forEach(function(m){if(mkts[m])mktSel.innerHTML+='<option value="'+m+'">'+m+'</option>';});

  var cols=[
    {label:'Name',key:'name'},
    {label:'Market',key:'market'},
    {label:'Type',key:'cgType',render:function(r){return typeBadge(r.cgType);}},
    {label:'Desired',key:'desiredHrs',render:function(r){return fmt(r.desiredHrs,1);}},
    {label:'Scheduled',key:'scheduledHrs',render:function(r){return fmt(r.scheduledHrs,1);}},
    {label:'Billed',key:'billedHrs',render:function(r){return fmt(r.billedHrs,1);}},
    {label:'Payable',key:'payableHrs',render:function(r){return fmt(r.payableHrs,1);}},
    {label:'Util %',key:'utilPct',render:function(r){return utilBar(r.utilPct);}},
    {label:'Gap',key:'gap',render:function(r){return r.gap>0?'<span style="color:var(--red)">'+fmt(r.gap,1)+'</span>':'—';}},
    {label:'Capacity',key:'capacityReason'},
    {label:'Long',key:'typeHrs',val:function(r){return r.typeHrs[0];},render:function(r){return r.typeHrs[0]>0?fmt(r.typeHrs[0],1):'—';}},
    {label:'ON',val:function(r){return r.typeHrs[1];},render:function(r){return r.typeHrs[1]>0?fmt(r.typeHrs[1],1):'—';}},
    {label:'Short',val:function(r){return r.typeHrs[2];},render:function(r){return r.typeHrs[2]>0?fmt(r.typeHrs[2],1):'—';}},
    {label:'Live-In',val:function(r){return r.typeHrs[3];},render:function(r){return r.typeHrs[3]>0?fmt(r.typeHrs[3],1):'—';}},
    {label:'PTO',key:'ptoHrs',render:function(r){return r.ptoHrs>0?'<span style="color:var(--purple)">'+fmt(r.ptoHrs,1)+'</span>':'—';}},
    {label:'TS',key:'tsType',render:function(r){return r.tsType>0?'TS'+r.tsType:'—';}},
    {label:'Designation',key:'designation'}
  ];
  var tbl=buildTable(el,cols,D.caregiverDetail,{defaultSort:7,defaultAsc:true,maxHeight:'65vh'});

  function applyFilters(){
    var mkt=$('#flt-mkt').value;
    var type=$('#flt-type').value;
    var search=$('#flt-search').value.toLowerCase();
    var show=$('#flt-show').value;
    var filtered=D.caregiverDetail.filter(function(c){
      if(mkt&&c.market!==mkt)return false;
      if(type&&c.cgType!==type)return false;
      if(search&&c.name.toLowerCase().indexOf(search)<0)return false;
      if(show==='zero'&&c.utilPct>0)return false;
      if(show==='over'&&c.utilPct<=100)return false;
      if(show==='under50'&&c.utilPct>=50)return false;
      return true;
    });
    tbl.setRows(filtered);
  }
  $('#flt-mkt').onchange=applyFilters;
  $('#flt-type').onchange=applyFilters;
  $('#flt-search').oninput=applyFilters;
  $('#flt-show').onchange=applyFilters;
}

// ── DAY BREAKDOWN ──
function renderDayBreakdown(){
  var el=$('#tab-daybreak');
  el.innerHTML='<div class="ts">Week of '+D.weekOf+'</div>'+
    '<div class="filter-bar"><span class="fl">Market</span><select id="flt-day-mkt"><option value="">All</option></select></div>';
  var mkts={};D.dayBreakdown.forEach(function(r){mkts[r.market]=1;});

// ── LONG HOURS & OVERNIGHTS ──
function renderLHON(){
  var el=$('#tab-lhon');
  el.innerHTML='<div class="ts">Week of '+D.weekOf+'</div>'+
    '<div class="filter-bar"><span class="fl">Market</span><select id="flt-lhon-mkt"><option value="">All</option></select>'+
    '<span class="fl">Type</span><select id="flt-lhon-type"><option value="">All</option><option value="Long Hours">Long Hrs</option><option value="Overnight">Overnight</option></select></div>';
  var mkts={};D.longHoursOvernights.forEach(function(r){mkts[r.market]=1;});
  var sel=$('#flt-lhon-mkt');
  MKT_ORDER.forEach(function(m){if(mkts[m])sel.innerHTML+='<option value="'+m+'">'+m+'</option>';});

  var totalLH=D.longHoursOvernights.filter(function(r){return r.type==='Long Hours';}).length;
  var totalON=D.longHoursOvernights.filter(function(r){return r.type==='Overnight';}).length;
  el.innerHTML='<div class="ts">Week of '+D.weekOf+'</div>'+
    '<div class="kpi-row">'+
    kpi('Long Hour Visits',fmt(totalLH),'green')+
    kpi('Overnight Visits',fmt(totalON),'orange')+
    kpi('Total LH/ON Visits',fmt(D.longHoursOvernights.length),'')+
    '</div>'+
    '<div class="filter-bar"><span class="fl">Market</span><select id="flt-lhon-mkt"><option value="">All</option></select>'+
    '<span class="fl">Type</span><select id="flt-lhon-type"><option value="">All</option><option value="Long Hours">Long Hrs</option><option value="Overnight">Overnight</option></select></div>';
  sel=$('#flt-lhon-mkt');
  MKT_ORDER.forEach(function(m){if(mkts[m])sel.innerHTML+='<option value="'+m+'">'+m+'</option>';});

  var cols=[
    {label:'Caregiver',key:'cgName'},
    {label:'Market',key:'market'},
    {label:'Date',key:'date'},
    {label:'Day',key:'day'},
    {label:'Type',key:'type',render:function(r){return typeBadge(r.type);}},
    {label:'Scheduled',key:'scheduledHrs',render:function(r){return fmt(r.scheduledHrs,2);}},
    {label:'Billed',key:'billedHrs',render:function(r){return fmt(r.billedHrs,2);}},
    {label:'Payable',key:'payableHrs',render:function(r){return fmt(r.payableHrs,2);}},
    {label:'Bill Rate',key:'billRate',render:function(r){return r.billRate>0?'$'+fmt(r.billRate,2):'—';}},
    {label:'Pay Rate',key:'payRate',render:function(r){return r.payRate>0?'$'+fmt(r.payRate,2):'—';}},
    {label:'Client',key:'client'},
    {label:'Start',key:'startTime',render:function(r){return r.startTime?new Date(r.startTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—';}},
    {label:'End',key:'endTime',render:function(r){return r.endTime?new Date(r.endTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—';}}
  ];
  var tbl=buildTable(el,cols,D.longHoursOvernights,{defaultSort:2,maxHeight:'65vh'});
  function filterLHON(){
    var m=$('#flt-lhon-mkt').value;
    var t=$('#flt-lhon-type').value;
    tbl.setRows(D.longHoursOvernights.filter(function(r){
      if(m&&r.market!==m)return false;
      if(t&&r.type!==t)return false;
      return true;
    }));
  }
  $('#flt-lhon-mkt').onchange=filterLHON;
  $('#flt-lhon-type').onchange=filterLHON;
}
