<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caregiver Utilization — Tribute OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B1120;--bg2:#111827;--bg3:#1E293B;--bg4:#334155;
  --border:#1E293B;--border2:#334155;
  --text:#E2E8F0;--text2:#94A3B8;--text3:#64748B;
  --orange:#E8541A;--orange-light:#F47A4A;
  --green:#22C55E;--green-bg:rgba(34,197,94,.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,.12);
  --yellow:#EAB308;--yellow-bg:rgba(234,179,8,.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.12);
  --purple:#A855F7;--purple-bg:rgba(168,85,247,.12);
  --navy:#0F2647;--slate:#44546A;
  --r:8px;--rl:12px;
  --shadow:0 4px 24px rgba(0,0,0,.3);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:baseline;gap:6px}
.topbar-tribute{font-family:'DM Serif Display',serif;font-size:20px;color:var(--orange);letter-spacing:-.01em}
.topbar-sub{font-size:11px;color:var(--text3)}
.topbar-back{color:var(--text2);text-decoration:none;font-size:12px;display:flex;align-items:center;gap:4px;transition:color .2s}
.topbar-back:hover{color:var(--orange)}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-bar{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 32px;overflow-x:auto}
.tab-btn{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.content{padding:24px 32px;max-width:1600px;margin:0 auto}
.section{display:none}.section.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.kpi-value{font-size:24px;font-weight:600;color:var(--text)}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.yellow{color:var(--yellow)}.kpi-value.orange{color:var(--orange)}.kpi-value.blue{color:var(--blue)}
.table-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);color:var(--text2);font-weight:500;padding:10px 12px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--border2);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th.asc::after{content:'';display:inline-block;margin-left:4px;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:5px solid var(--orange)}
thead th.desc::after{content:'';display:inline-block;margin-left:4px;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--orange)}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
tbody tr:hover{background:rgba(255,255,255,.03)}
tr.overall-row{background:var(--navy)}
tr.overall-row td{color:#fff;font-weight:600;border-bottom:1px solid rgba(255,255,255,.1)}
tr.type-row td{color:var(--text)}
tr.prn-row td{color:#C49A6C;font-style:italic;background:rgba(238,224,204,.06)}
tr.pto-row td{color:var(--purple);font-style:italic;background:rgba(168,85,247,.04)}
tr.spacer-row td{padding:4px;border:none}
.util-bar{display:flex;align-items:center;gap:6px}
.util-track{width:70px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;flex-shrink:0}
.util-fill{height:100%;border-radius:3px}
.util-pct{font-size:11px;font-weight:500;min-width:36px}
.u-green .util-fill{background:var(--green)}.u-green .util-pct{color:var(--green)}
.u-yellow .util-fill{background:var(--yellow)}.u-yellow .util-pct{color:var(--yellow)}
.u-red .util-fill{background:var(--red)}.u-red .util-pct{color:var(--red)}
.u-over .util-fill{background:var(--orange)}.u-over .util-pct{color:var(--orange)}
.day-chips{display:flex;gap:3px}
.dc{display:inline-flex;align-items:center;justify-content:center;width:26px;height:20px;border-radius:4px;font-size:10px;font-weight:500;border:1px solid var(--border2);color:var(--text3);background:var(--bg)}
.dc.g{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.3)}
.dc.r{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.3)}
.dc.y{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(234,179,8,.3)}
.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;white-space:nowrap}
.type-long{background:var(--green-bg);color:var(--green)}
.type-overnight{background:rgba(249,115,22,.12);color:#F97316}
.type-short{background:var(--yellow-bg);color:var(--yellow)}
.type-livein{background:var(--blue-bg);color:var(--blue)}
.type-prn{background:rgba(238,224,204,.15);color:#C49A6C}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:var(--r);font-size:12px;font-family:inherit}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--orange)}
.fl{font-size:11px;color:var(--text3);margin-right:-8px}
.day-grid{display:grid;gap:16px}
.dmc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.dmh{background:var(--navy);color:#fff;padding:10px 16px;font-size:13px;font-weight:600;display:flex;justify-content:space-between}
.dr{display:grid;grid-template-columns:140px 80px repeat(7,1fr);align-items:center;border-bottom:1px solid var(--border);font-size:12px}
.dr.hdr{background:var(--bg3);font-weight:500;color:var(--text2)}
.dr>div{padding:6px 8px;text-align:center}
.dr>div:first-child,.dr>div:nth-child(2){text-align:left}
.dcl{font-weight:500;font-size:11px}
.dcl.hi{color:var(--red);background:rgba(239,68,68,.06)}
.dcl.mi{color:var(--yellow);background:rgba(234,179,8,.06)}
.dcl.lo{color:var(--green);background:rgba(34,197,94,.06)}
.dcl.em{color:var(--text3)}
/* TS payout badges */
.payout-ok{color:var(--green)}.payout-warn{color:var(--yellow);font-weight:600}.payout-high{color:var(--orange);font-weight:700}
/* Heatmap cells */
.hm-cell{padding:6px;text-align:center;border-radius:4px;font-weight:600;font-size:11px}
.ts{font-size:11px;color:var(--text3);margin-bottom:12px}
/* Travel gap severity */
.gap-low{color:var(--text2)}.gap-med{color:var(--yellow)}.gap-high{color:var(--orange);font-weight:600}
@media(max-width:900px){.content{padding:16px}.tab-bar,.topbar{padding:0 16px}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand"><span class="topbar-tribute">Tribute</span><span class="topbar-sub">Caregiver Utilization</span></div>
  <a href="index.html" class="topbar-back">&larr; Back to Dashboard</a>
</div>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="dash">Dashboard</button>
  <button class="tab-btn" data-tab="summary">Market Summary</button>

</div>
<div id="loading" class="loading-wrap"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">Loading utilization data...</div></div>
<div id="app" class="content" style="display:none">
  <div id="tab-dash" class="section active"><div class="ts" id="ts-dash"></div><div class="kpi-row" id="kpi-dash"></div><div id="heatmap-wrap"></div></div>
  <div id="tab-summary" class="section"><div class="ts" id="ts-summary"></div><div class="kpi-row" id="kpi-summary"></div><div class="table-wrap"><table id="tbl-summary"><thead></thead><tbody></tbody></table></div></div>
  <div id="tab-state" class="section"><div class="ts" id="ts-state"></div><div class="table-wrap"><table id="tbl-state"><thead></thead><tbody></tbody></table></div></div>
  <div id="tab-detail" class="section"><div class="ts" id="ts-detail"></div><div class="filter-bar"><span class="fl">Market</span><select id="flt-mkt"><option value="">All</option></select><span class="fl">Type</span><select id="flt-type"><option value="">All</option></select><span class="fl">Search</span><input id="flt-search" placeholder="Name..." style="width:140px"><span class="fl">Show</span><select id="flt-show"><option value="all">All</option><option value="zero">Zero Util</option><option value="over">Over 100%</option><option value="under50">Under 50%</option></select></div><div class="table-wrap" style="max-height:70vh;overflow-y:auto"><table id="tbl-detail"><thead></thead><tbody></tbody></table></div></div>
  <div id="tab-daybreak" class="section"><div class="ts" id="ts-daybreak"></div><div class="filter-bar"><span class="fl">Market</span><select id="flt-day-mkt"><option value="">All</option></select></div><div class="day-grid" id="day-grid"></div></div>
  <div id="tab-roster" class="section"><div class="ts" id="ts-roster"></div><div class="filter-bar"><span class="fl">Market</span><select id="flt-ros-mkt"><option value="">All</option></select><span class="fl">Day</span><select id="flt-ros-day"><option value="">All</option><option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option><option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option></select></div><div class="table-wrap" style="max-height:70vh;overflow-y:auto"><table id="tbl-roster"><thead></thead><tbody></tbody></table></div></div>
  <div id="tab-ts" class="section"><div class="ts" id="ts-ts"></div><div class="kpi-row" id="kpi-ts"></div><div class="table-wrap" style="max-height:70vh;overflow-y:auto"><table id="tbl-ts"><thead></thead><tbody></tbody></table></div></div>
  <div id="tab-travel" class="section"><div class="ts" id="ts-travel"></div><div class="kpi-row" id="kpi-travel"></div><div class="filter-bar"><span class="fl">Market</span><select id="flt-tt-mkt"><option value="">All</option></select></div><div class="table-wrap" style="max-height:70vh;overflow-y:auto"><table id="tbl-travel"><thead></thead><tbody></tbody></table></div></div>
</div>
<script>
(function(){
'use strict';
var API='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
var MKT_ORDER=['Boston','North of Boston','MetroWest Boston','South of Boston','Chicago','Annapolis','Baltimore','Bethesda','Unknown'];
var ST_ORDER=['Massachusetts','Illinois','Maryland','Unknown'];
var STATE_MAP={'Boston':'Massachusetts','North of Boston':'Massachusetts','MetroWest Boston':'Massachusetts','South of Boston':'Massachusetts','Chicago':'Illinois','Annapolis':'Maryland','Baltimore':'Maryland','Bethesda':'Maryland'};
var TYPE_NAMES=['Long Hours','Overnight','Short Hours','Live-In'];
var DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DF=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ── NOTES PARSING ──
var DAY_ALIASES={0:['su','sun','sunday'],1:['mo','mon','monday'],2:['tu','tue','tuesday'],3:['we','wed','wednesday'],4:['th','thu','thursday'],5:['fr','fri','friday'],6:['sa','sat','saturday']};
var _dr={};
function gdr(d){if(!_dr[d]){_dr[d]=new RegExp('\\b('+DAY_ALIASES[d].join('|')+')\\b','i');}return _dr[d];}
function nmd(n,d){return gdr(d).test(n);}
function nmad(n){for(var d=0;d<7;d++)if(nmd(n,d))return true;return false;}
function parseAvailDays(notes,section){
  var r={},nl=notes.toLowerCase().replace(/ts\s?40\s/g,'').replace(/ts\s?30\s/g,'');
  var clean=notes.replace(/ts\s?40\s/gi,'').replace(/ts\s?30\s/gi,'');
  if(section==='Any'){for(var d=0;d<7;d++)if(nmd(nl,d))r[d]=1.0;return r;}
  var kwMap={'Long Hours':['long hour days','long hours days'],'Overnight':['overnight days','overnights'],'Short Hours':['short hour days','short hours days']};
  var kws=kwMap[section]||[],ss=-1;
  for(var i=0;i<kws.length;i++){var idx=nl.indexOf(kws[i]);if(idx>=0){ss=idx;break;}}
  if(ss<0)return r;
  var eq=clean.indexOf('=',ss);if(eq<0)return r;
  var ns=clean.length;
  ['long hour','overnight','short hour','live-in','live in'].forEach(function(k){var n=nl.indexOf(k,ss+1);if(n>ss&&n<ns)ns=n;});
  var seg=clean.substring(eq+1,ns),sl=seg.toLowerCase();
  var eo=/e\/o\s+(su|sun|sunday|mo|mon|monday|tu|tue|tuesday|we|wed|wednesday|th|thu|thursday|fr|fri|friday|sa|sat|saturday)/gi,m;
  while((m=eo.exec(seg))!==null){for(var d2=0;d2<7;d2++)if(DAY_ALIASES[d2].indexOf(m[1].toLowerCase())>=0){r[d2]=0.5;break;}}
  for(var d3=0;d3<7;d3++)if(nmd(sl,d3)&&!(d3 in r))r[d3]=1.0;
  return r;
}
function ptFromNotes(n){var l=n.toLowerCase();if(l.indexOf('live-in')>=0||l.indexOf('live in')>=0)return 3;if(l.indexOf('long hour')>=0)return 0;if(l.indexOf('overnight')>=0)return 1;return 2;}

// ── PROCESS CAREGIVERS ──
function processCaregivers(raw){
  var rows=[];
  for(var i=0;i<raw.length;i++){
    var cg=raw[i],notes=(cg.availNotes||'').trim(),nl=notes.toLowerCase();
    var market=cg.market||'Unknown',state=cg.state||STATE_MAP[market]||'Unknown';
    var desiredHrs=cg.desiredHrs||0,scheduledHrs=cg.scheduledHrs||0;
    // Primary type from API typeHrs or notes
    var th=cg.typeHrs||[0,0,0,0];
    var maxH=Math.max.apply(null,th),primType=maxH>0?th.indexOf(maxH):ptFromNotes(notes);
    var isLI=nl.indexOf('live-in')>=0||nl.indexOf('live in')>=0;
    var hasHourly=nl.indexOf('long hour')>=0||nl.indexOf('overnight')>=0||nl.indexOf('short hour')>=0;
    var isMixed=isLI&&hasHourly;
    if(scheduledHrs===0&&isMixed&&primType===3){if(nl.indexOf('long hour')>=0)primType=0;else if(nl.indexOf('overnight')>=0)primType=1;else primType=2;}
    var ptName=TYPE_NAMES[primType];
    var availDays,dailyRate;
    if(isLI&&primType===3){availDays={};for(var d=0;d<7;d++)availDays[d]=1.0;dailyRate=24;desiredHrs=168;ptName='Live-In';}
    else if(isLI&&isMixed&&primType!==3){availDays=nl.indexOf('long hour')>=0?parseAvailDays(notes,'Long Hours'):parseAvailDays(notes,'Overnight');dailyRate=12;ptName=nl.indexOf('long hour')>=0?'Live-In / Long Hours':'Live-In / Overnight';}
    else if(primType===0){availDays=parseAvailDays(notes,'Long Hours');dailyRate=12;}
    else if(primType===1){availDays=parseAvailDays(notes,'Overnight');dailyRate=12;}
    else{availDays=parseAvailDays(notes,'Any');dailyRate=0;}
    var remainW=0;for(var dk in availDays)remainW+=availDays[dk];
    var adjCap;
    if(isLI&&!isMixed&&primType!==3)adjCap=scheduledHrs;
    else if(dailyRate>0){var ma=remainW*dailyRate;adjCap=ma>=desiredHrs?Math.min(ma,desiredHrs):ma;adjCap=Math.max(adjCap,scheduledHrs);}
    else adjCap=Math.max(desiredHrs,scheduledHrs);
    adjCap=Math.max(adjCap,0);
    var util=adjCap>0?scheduledHrs/adjCap:null;
    // Per-day
    var dayCap=[0,0,0,0,0,0,0],dayWorked=[0,0,0,0,0,0,0],dayAvail=[0,0,0,0,0,0,0];
    if(dailyRate>0)for(var dd=0;dd<7;dd++){var wt=availDays[dd]||0;if(wt>0){dayCap[dd]=dailyRate*wt;dayAvail[dd]=wt;}}
    // Use dayTypeHrs from proxy if available
    var dth=cg.dayTypeHrs;
    if(dth){for(var dd2=0;dd2<7;dd2++){dayWorked[dd2]=dth[dd2]?dth[dd2][primType]||0:0;if(dayCap[dd2]===0&&dayWorked[dd2]>0&&dailyRate>0){dayCap[dd2]=dailyRate;dayAvail[dd2]=1.0;}}}
    else{var schDays=cg.scheduledDays||[];if(schDays.length>0&&scheduledHrs>0){var hpd=scheduledHrs/schDays.length;for(var sd=0;sd<schDays.length;sd++){dayWorked[schDays[sd]]=parseFloat(hpd.toFixed(1));if(dayCap[schDays[sd]]===0&&dailyRate>0){dayCap[schDays[sd]]=dailyRate;dayAvail[schDays[sd]]=1.0;}}}}
    if(desiredHrs===0&&scheduledHrs===0)continue;
    rows.push({id:cg.id,name:cg.name||'',firstName:cg.firstName||'',lastName:cg.lastName||'',market:market,state:state,svcType:ptName,primType:primType,desiredHrs:desiredHrs,adjCap:adjCap,worked:scheduledHrs,util:util,isLI:isLI,isPRN:desiredHrs===0&&scheduledHrs>0,dayCap:dayCap,dayWorked:dayWorked,dayAvail:dayAvail,notes:notes,gap:cg.gap||0,scheduledDays:cg.scheduledDays||[],tags:cg.tags||'',tsType:cg.tsType||0,ptoHrs:cg.ptoHrs||0,typeHrs:th,hireDate:cg.hireDate||null,status:cg.status||'',designation:cg.designation||''});
  }
  return rows;
}

// ── HELPERS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pct(v){return v!=null?(v*100).toFixed(1)+'%':'\u2014';}
function num(v,d){return(v||0).toFixed(d===undefined?1:d);}
function utilCls(v){if(v==null)return'';if(v>1)return'u-over';if(v>=.85)return'u-green';if(v>=.5)return'u-yellow';return'u-red';}
function utilBar(v){if(v==null)return'<span style="color:var(--text3)">\u2014</span>';var c=utilCls(v),w=Math.min(v*100,100);return'<div class="util-bar '+c+'"><div class="util-track"><div class="util-fill" style="width:'+w+'%"></div></div><span class="util-pct">'+pct(v)+'</span></div>';}
function typeBadge(n){var c='type-short',l=(n||'').toLowerCase();if(l.indexOf('long')>=0)c='type-long';else if(l.indexOf('overnight')>=0)c='type-overnight';else if(l.indexOf('live')>=0)c='type-livein';else if(l.indexOf('prn')>=0)c='type-prn';return'<span class="type-badge '+c+'">'+esc(n)+'</span>';}
function hmColor(v){if(v==null)return'';if(v>=.95)return'background:rgba(239,68,68,.15);color:var(--red)';if(v>=.85)return'background:rgba(234,179,8,.12);color:var(--yellow)';if(v>=.5)return'background:rgba(34,197,94,.1);color:var(--green)';return'background:rgba(59,130,246,.08);color:var(--blue)';}

// ── SUMMARY ──
function buildSummary(rows,kf,ol){
  var gs=[];
  for(var oi=0;oi<ol.length;oi++){
    var key=ol[oi],kr=rows.filter(function(r){return r[kf]===key&&!r.isPRN;});
    if(!kr.length)continue;
    var tc=kr.length,td=kr.reduce(function(s,r){return s+r.desiredHrs;},0),tca=kr.reduce(function(s,r){return s+r.adjCap;},0),tw=kr.reduce(function(s,r){return s+r.worked;},0);
    var twc=kr.reduce(function(s,r){return s+(r.worked>r.adjCap&&r.adjCap>0?Math.min(r.worked,r.adjCap):r.worked);},0);
    var tu=tca>0?twc/tca:null,to=kr.filter(function(r){return r.adjCap>0&&r.worked>r.adjCap;}).length,tz=kr.filter(function(r){return r.adjCap>0&&r.worked===0;}).length;
    gs.push({key:key,type:'overall',svcType:'Active Caregivers',count:tc,desired:td,adjCap:tca,worked:tw,util:tu,over100:to,zeroUtil:tz,working:tc-tz});
    for(var ti=0;ti<4;ti++){
      var tr2=kr.filter(function(r){return r.primType===ti;});if(!tr2.length)continue;
      var tca2=tr2.reduce(function(s,r){return s+r.adjCap;},0),tw2=tr2.reduce(function(s,r){return s+r.worked;},0);
      var twc2=tr2.reduce(function(s,r){return s+(r.worked>r.adjCap&&r.adjCap>0?Math.min(r.worked,r.adjCap):r.worked);},0);
      gs.push({key:'',type:'subtype',svcType:TYPE_NAMES[ti],count:tr2.length,desired:tr2.reduce(function(s,r){return s+r.desiredHrs;},0),adjCap:tca2,worked:tw2,util:tca2>0?twc2/tca2:null,over100:tr2.filter(function(r){return r.adjCap>0&&r.worked>r.adjCap;}).length,zeroUtil:tr2.filter(function(r){return r.adjCap>0&&r.worked===0;}).length,working:tr2.length-tr2.filter(function(r){return r.adjCap>0&&r.worked===0;}).length});
    }
    var pr=rows.filter(function(r){return r[kf]===key&&r.isPRN;});
    gs.push({key:'',type:'prn',svcType:'PRN Worked',count:pr.length,desired:0,adjCap:0,worked:pr.reduce(function(s,r){return s+r.worked;},0),util:null,over100:0,zeroUtil:0,working:pr.length});

  }
  return gs;
}

function dayRow(l,m,c,w,ov){
  var h='<div class="dr'+(ov?' overall-row':'')+'"><div>'+esc(l)+'</div><div>'+m+'</div>';
  for(var d=0;d<7;d++){if(c[d]>0){var u=Math.min(w[d]/c[d],1);h+='<div class="dcl '+(u>=.95?'hi':u>=.85?'mi':'lo')+'">'+(u*100).toFixed(0)+'%</div>';}else h+='<div class="dcl em">\u2014</div>';}
  return h+'</div>';
}
function dayAvailRow(m,a){var h='<div class="dr"><div></div><div>'+m+'</div>';for(var d=0;d<7;d++)h+='<div class="dcl" style="color:var(--text2)">'+num(a[d],1)+'</div>';return h+'</div>';}
function dayUnusedRow(m,mr,types,tf){
  var h='<div class="dr"><div></div><div>'+m+'</div>';
  for(var d=0;d<7;d++){
    var unused=0;mr.forEach(function(r){var inScope=tf===-1?types.indexOf(r.primType)>=0:r.primType===tf;if(inScope&&r.dayAvail[d]>0&&r.dayWorked[d]===0)unused+=r.dayAvail[d];});
    h+='<div class="dcl" style="color:'+(unused>0?'var(--orange)':'var(--text3)')+'">'+(unused>0?num(unused,1):'\u2014')+'</div>';
  }
  return h+'</div>';
}

      document.getElementById('kpi-summary').innerHTML=
        '<div class="kpi"><div class="kpi-label">Active</div><div class="kpi-value">'+active.length+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Utilization</div><div class="kpi-value '+ucl+'">'+pct(ou)+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Hrs Worked</div><div class="kpi-value">'+num(tw,0)+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Capacity</div><div class="kpi-value">'+num(tc,0)+'</div></div>'+
        '<div class="kpi"><div class="kpi-label">Available Gap</div><div class="kpi-value orange">'+num(gap,0)+' hrs</div></div>';
      renderDetail();
      renderDayBreakdown(allRows);
      renderRoster(allRows);
      renderTS(allRows);
      renderTravel(travelGaps);
      // Bind filters
      ['flt-mkt','flt-type','flt-show'].forEach(function(id){document.getElementById(id).addEventListener('change',renderDetail);});
      document.getElementById('flt-search').addEventListener('input',renderDetail);
      document.getElementById('flt-day-mkt').addEventListener('change',function(){renderDayBreakdown(allRows);});
      ['flt-ros-mkt','flt-ros-day'].forEach(function(id){document.getElementById(id).addEventListener('change',function(){renderRoster(allRows);});});
      document.getElementById('flt-tt-mkt').addEventListener('change',function(){renderTravel(travelGaps);});
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
    })
    .catch(function(err){
      document.getElementById('loading').innerHTML='<div style="color:var(--red);font-size:14px">Failed to load data</div><div style="color:var(--text3);font-size:12px">'+esc(err.message)+'</div>';
    });
}
init();
})();
</script>
</body>
</html>
