<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribute — KSF Scheduling Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8541A;--orange-pale:#FDF2ED;--orange-50:#FEF8F5;
  --charcoal:#2C2C2C;--text2:#4A4A4A;--text3:#6B6B6B;--text4:#9B9B9B;
  --gray100:#F5F5F5;--gray200:#EBEBEB;--gray300:#D8D8D8;
  --white:#FFFFFF;--cream:#FAFAF8;
  --green:#3DAA7A;--green-bg:#EAF6F0;--green-text:#1A7A52;
  --red:#E05252;--red-bg:#FDEEEE;--red-text:#8B1F1F;
  --amber:#F59E0B;--amber-bg:#FEF3C7;--amber-text:#7C3E00;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-text:#1E3A8A;
  --shadow:0 1px 4px rgba(44,44,44,0.07),0 1px 2px rgba(44,44,44,0.04);
  --shadow-md:0 4px 16px rgba(44,44,44,0.09),0 2px 6px rgba(44,44,44,0.04);
  --r:8px;--rl:12px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--charcoal);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hdr{background:var(--white);border-bottom:1px solid var(--gray200);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-brand{display:flex;align-items:baseline;gap:6px}
.hdr-title{font-size:16px;font-weight:600;color:var(--orange)}
.hdr-sub{font-size:11px;color:var(--text3)}
.hdr-right{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--text4)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading{text-align:center;padding:60px;color:var(--text4);font-size:13px}
.spin{width:22px;height:22px;border:2px solid var(--gray200);border-top-color:var(--orange);border-radius:50%;animation:sp .75s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.period-bar{background:var(--white);border-bottom:1px solid var(--gray200);padding:10px 32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pbtn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:.5px solid var(--gray300);color:var(--text3);background:var(--gray100);user-select:none}
.pbtn.on{background:var(--charcoal);color:var(--white);border-color:var(--charcoal)}
.nav-tabs{display:flex;border-bottom:1px solid var(--gray200);background:var(--white);padding:0 32px;overflow-x:auto}
.ntab{font-size:12px;font-weight:500;color:var(--text3);padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;user-select:none}
.ntab.on{color:var(--charcoal);border-bottom-color:var(--orange)}
.main{padding:24px 32px;max-width:1300px;margin:0 auto}
.kg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
@media(max-width:900px){.kg,.kg4,.kg3{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kg,.kg4,.kg3{grid-template-columns:1fr 1fr}}
.kpi{background:var(--white);border:.5px solid var(--gray200);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text4);margin-bottom:5px}
.kv{font-size:24px;font-weight:500;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kv.g{color:var(--green)}.kv.r{color:var(--red)}.kv.a{color:var(--amber)}.kv.o{color:var(--orange)}.kv.b{color:var(--blue)}
.ks{font-size:10px;color:var(--text4)}
.ks.good{color:var(--green)}.ks.bad{color:var(--red)}
.fc{background:var(--white);border:.5px solid var(--gray200);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.ct{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:6px 10px;border-bottom:.5px solid var(--gray200);text-align:right;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th:first-child,.tbl th:nth-child(2){text-align:left}
.tbl th:hover{color:var(--orange)}
.tbl td{padding:8px 10px;border-bottom:.5px solid var(--gray100);text-align:right;font-variant-numeric:tabular-nums}
.tbl td:first-child,.tbl td:nth-child(2){text-align:left;font-weight:500}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tfoot td{border-top:.5px solid var(--gray200);font-weight:600;padding:8px 10px;text-align:right;background:var(--gray100)}
.tbl tfoot td:first-child,.tbl tfoot td:nth-child(2){text-align:left}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.bg{background:var(--green-bg);color:var(--green-text)}.br{background:var(--red-bg);color:var(--red-text)}.ba{background:var(--amber-bg);color:var(--amber-text)}.bb{background:var(--blue-bg);color:var(--blue-text)}
.vs{font-size:10px;font-weight:500}
.vs.up{color:var(--green)}.vs.dn{color:var(--red)}.vs.eq{color:var(--text4)}
.bar-wrap{height:8px;background:var(--gray100);border-radius:4px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:4px}
.upload-zone{border:1.5px dashed var(--gray300);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gray100);margin-bottom:14px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--orange);background:var(--orange-50)}
.upload-zone-icon{font-size:28px;margin-bottom:8px}
.upload-zone-title{font-size:13px;font-weight:500;color:var(--charcoal);margin-bottom:4px}
.upload-zone-sub{font-size:11px;color:var(--text4)}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:700px){.upload-grid{grid-template-columns:1fr}}
.upload-status{font-size:11px;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.upload-status.loaded{display:block;background:var(--green-bg);color:var(--green-text)}
.upload-status.error{display:block;background:var(--red-bg);color:var(--red-text)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}
.ftr{border-top:1px solid var(--gray200);padding:14px 32px;display:flex;justify-content:space-between;font-size:10px;color:var(--text4);background:var(--white);margin-top:16px}
</style>
</head>

<div class="hdr">
  <div class="hdr-brand">
    <span class="hdr-title">Tribute</span>
    <span class="hdr-sub">Home Care · KSF Scheduling Dashboard</span>
  </div>
  <div class="hdr-right">

</div>

    <button onclick="setCustom()" style="font-size:11px;padding:4px 12px;border-radius:20px;border:.5px solid var(--gray300);background:var(--gray100);color:var(--charcoal);cursor:pointer">Go</button>
  </div>
</div>

<div class="nav-tabs">
  <div class="ntab on" onclick="setTab('overview',this)">Overview</div>

  <div class="ntab" onclick="setTab('ot',this)">OT & Incentives</div>
  <div class="ntab" onclick="setTab('gm',this)">Gross Margin</div>
</div>

<div class="main">

</div>

function fn(n){return Math.round(n).toLocaleString()}
function fh(n){return parseFloat(n).toFixed(1)+'h'}
function fp(n){return(n*100).toFixed(1)+'%'}
function fm(n){return n>=1000000?'$'+(n/1000000).toFixed(2)+'M':'$'+fn(n)}
function fk(n){return n>=1000?'$'+(n/1000).toFixed(1)+'K':'$'+fn(n)}
function fmtD(d){return d.toISOString().split('T')[0]}
function vsBudget(actual,budget){
  if(!budget)return '';
  var diff=(actual-budget)/budget;
  var pct=(diff*100).toFixed(1);
  if(diff>0.02)return '<span class="vs up">▲ '+pct+'%</span>';
  if(diff<-0.02)return '<span class="vs dn">▼ '+Math.abs(pct)+'%</span>';
  return '<span class="vs eq">~ On budget</span>';
}
function budgBdg(actual,budget){
  if(!budget)return '';
  var ratio=actual/budget;
  if(ratio>=0.95)return '<span class="bdg bg">On target</span>';
  if(ratio>=0.80)return '<span class="bdg ba">Near target</span>';
  return '<span class="bdg br">Below target</span>';
}

function getSunday(wa){
  var d=new Date();d.setDate(d.getDate()-d.getDay()-(wa*7));d.setHours(0,0,0,0);return d;
}
function setWeek(wa,el){
  var s=getSunday(wa),e=new Date(s);e.setDate(s.getDate()+6);
  curStart=fmtD(s);curEnd=fmtD(e);
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  fetchData();
}
function setCustom(){
  var s=document.getElementById('cs').value,e=document.getElementById('ce').value;
  if(!s||!e){alert('Select both dates');return;}
  curStart=s;curEnd=e;
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));
  fetchData();
}
function setTab(t,el){
  curTab=t;
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  if(visitsData)render();
}

async function fetchData(){
  document.getElementById('ct').innerHTML='<div class="loading"><div class="spin"></div>Loading data for '+curStart+' to '+curEnd+'...</div>';
  try{
    var [vr,cr,otr]=await Promise.all([
      fetch(API+'?endpoint=visits&startDate='+curStart+'&endDate='+curEnd),
      fetch(API+'?endpoint=caregivers&fast=true'),
      fetch(API+'?endpoint=ot_costs&startDate='+curStart+'&endDate='+curEnd)
    ]);
    visitsData=vr.ok?await vr.json():null;
    cgData=cr.ok?await cr.json():null;
    otCostData=otr.ok?await otr.json():null;
    document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString();
    render();
  }catch(e){
    document.getElementById('ct').innerHTML='<div style="color:var(--red);padding:20px">Error: '+e.message+'</div>';
  }
}

function render(){
  if(!visitsData)return;
  if(curTab==='overview')renderOverview();
  else if(curTab==='markets')renderMarkets();
  else if(curTab==='openvisits')renderOpenVisits();
  else if(curTab==='budget')renderBudget();
  else if(curTab==='callmetrics')renderCallMetrics();
  else if(curTab==='uber')renderUber();
  else if(curTab==='ot')renderOT();
  else if(curTab==='gm')renderGM();
}

  mkts.forEach(function(m){

    var bRev=bgt?bgt.revenueWeekly:null;

    html+='<td style="color:var(--text3)">'+(bGM?fp(bGM):'—')+'</td>';
    html+='<td>'+(bGM?budgBdg(m.grossMarginPct,bGM):'—')+'</td>';
    html+='</tr>';
  });

function renderUber(){

  // Merge any CSV-uploaded data into UBER_DATA
  if(uberData && uberData.length>0){
    uberData.forEach(function(r){
      var week=r['Week']||r['week']||r['Request Date (Local)']||'';
      var code=(r['Expense Code']||r['expense_code']||'').toUpperCase();
      if(!code.includes('TRIBUTE'))return;
      var mkt=getUberMarket(code);
      var amt=parseFloat(r['Transaction Amount in USD (incl. Taxes)']||r['amount']||0);
      if(!week||!mkt)return;
      if(!UBER_DATA[week])UBER_DATA[week]={};
      if(!UBER_DATA[week][mkt])UBER_DATA[week][mkt]={trips:0,amount:0,cancelled:0};
      UBER_DATA[week][mkt].trips++;
      UBER_DATA[week][mkt].amount=Math.round((UBER_DATA[week][mkt].amount+amt)*100)/100;
    });
    weeks=Object.keys(UBER_DATA).sort();
  }

  // Match curStart to nearest week in UBER_DATA
  function nearestUberWeek(targetDate){
    if(UBER_DATA[targetDate])return targetDate;
    // Find closest week
    var td=new Date(targetDate);
    var best=null,bestDiff=999999;
    weeks.forEach(function(w){
      var diff=Math.abs(new Date(w)-td)/86400000;
      if(diff<bestDiff){bestDiff=diff;best=w;}
    });
    return best;
  }

  var latest=nearestUberWeek(curStart)||weeks[weeks.length-1];
  // Find prev week
  var latestIdx=weeks.indexOf(latest);
  var prev=latestIdx>0?weeks[latestIdx-1]:null;

  function weekTotal(week){
    if(!UBER_DATA[week])return{trips:0,amount:0};
    var trips=0,amount=0;
    Object.values(UBER_DATA[week]).forEach(function(v){trips+=v.trips;amount+=v.amount;});
    return{trips,amount:Math.round(amount*100)/100};
  }

  var latestTot=weekTotal(latest);
  var prevTot=prev?weekTotal(prev):null;

  html+='</div>';

function getUberMarket(code){
  code=code.replace('- TRIBUTE','').replace('-TRIBUTE','').trim();
  var MAP={'BOSTON':'Boston','METRO WEST BOSTON':'MetroWest Boston','METROWEST BOSTON':'MetroWest Boston','NORTH OF BOSTON':'North of Boston','SOUTH OF BOSTON':'South of Boston','BALTIMORE':'Baltimore','ANNAPOLIS':'Annapolis','BETHESDA':'Bethesda','CHICAGO':'Chicago','NORTHERN VIRGINIA':'Northern Virginia','NORTHERN VA':'Northern Virginia'};
  for(var k in MAP){if(code.startsWith(k))return MAP[k];}
  return code;
}

    var totalPayCost, vivGM, dataSource;
    if(ksfReg||ksfOT){
      // KSF actuals — exact Excel data, always use when available
      totalPayCost = ksfReg + ksfOT;
      vivGM = rev - totalPayCost;
      dataSource = 'KSF '+ksfWeekToUse;
    } else if(otMkt && otMkt.totalCost){
      // Live Viv — only when no KSF data (current week)
      totalPayCost = otMkt.totalCost;
      vivGM = rev - totalPayCost;
      dataSource = 'Live Viv';
    } else {
      // Last resort: budget estimate
      totalPayCost = rev*(1-(bgt.grossMarginPct||0.40));
      vivGM = rev-totalPayCost;
      dataSource = 'Budget est.';
    }

    var ts=getActual(mktName,'TS Admin (Actual)',ksfWeekToUse)||0;
    var guar=getActual(mktName,'4 Week Guaranteed Admin (Actual) ',ksfWeekToUse)||0;
    var inc=getActual(mktName,'Incentives (Actual)',ksfWeekToUse)||0;
    var uberWeeks=Object.keys(UBER_DATA).sort();
    // Find nearest Uber week to selected week
    var td=new Date(curStart);
    var nearestUber=uberWeeks.reduce(function(best,w){
      return Math.abs(new Date(w)-td)<Math.abs(new Date(best)-td)?w:best;
    },uberWeeks[uberWeeks.length-1]);
    var uber=getUber(mktName,nearestUber);

    var schedGM=vivGM-ts-guar-inc-uber;
    var schedGMPct=rev>0?schedGM/rev:0;
    var budgetGMPct=bgt.grossMarginPct||0;
    return{market:mktName,state:STATE_MAP[mktName]||'',rev,
      totalPayCost,ksfOT,ksfReg,vivGM,vivGMPct:rev>0?vivGM/rev:0,
      ts,guar,inc,uber,
      schedGM,schedGMPct,budgetGMPct,
      dataSource};
  }

  var curMkts=GEOS.map(currentGM).filter(Boolean).filter(function(m){return m.rev>0;});
  var curTotRev=curMkts.reduce(function(s,m){return s+m.rev;},0);
  var curTotPayCost=curMkts.reduce(function(s,m){return s+m.totalPayCost;},0);
  var curTotTS=curMkts.reduce(function(s,m){return s+m.ts;},0);
  var curTotGuar=curMkts.reduce(function(s,m){return s+m.guar;},0);
  var curTotInc=curMkts.reduce(function(s,m){return s+m.inc;},0);
  var curTotUber=curMkts.reduce(function(s,m){return s+m.uber;},0);
  var curTotVivGM=curMkts.reduce(function(s,m){return s+m.vivGM;},0);
  var curTotGM=curMkts.reduce(function(s,m){return s+m.schedGM;},0);
  var curTotGMPct=curTotRev>0?curTotGM/curTotRev:0;
  var liveCount=curMkts.filter(function(m){return m.dataSource==='Live Viv';}).length;

  var html='';

  // Banner
  var gmOk=curTotGMPct>=0.40;
  html+='<div style="background:'+(gmOk?'var(--green-bg)':'var(--red-bg)')+';border-left:3px solid '+(gmOk?'var(--green)':'var(--red)')+';border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px">';
  html+='<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:'+(gmOk?'var(--green)':'var(--red)')+';margin-bottom:4px">Scheduling Gross Margin — '+curStart+' to '+curEnd+'</div>';
  html+='Company GM: <strong>'+fp(curTotGMPct)+'</strong> — Revenue minus pay cost (from Viv), Tribute Secure, Incentives, and Ubers. Pay cost is pulled live from Viv visit data and includes regular pay + OT. '+(gmOk?'On track vs. budget targets.':'Below budget targets — review cost drivers.');
  html+='</div>';

  // KPIs
  var dataNote=liveCount+'/'+curMkts.length+' markets live from Viv'+(liveCount<curMkts.length?' · '+( curMkts.length-liveCount)+' estimated':'');
  html+='<div class="kg">';
  html+='<div class="kpi"><div class="kl">Revenue</div><div class="kv o">'+fm(curTotRev)+'</div><div class="ks">This week · '+dataNote+'</div></div>';
  var ksfSources=curMkts.filter(function(m){return m.dataSource&&m.dataSource.indexOf('KSF')>-1;}).length;
  html+='<div class="kpi"><div class="kl">Pay Cost (Reg + OT)</div><div class="kv r">'+fm(curTotPayCost)+'</div><div class="ks">'+fp(curTotRev>0?curTotPayCost/curTotRev:0)+' of rev · '+ksfSources+'/'+curMkts.length+' from KSF</div></div>';
  html+='<div class="kpi"><div class="kl">Tribute Secure + Inc + Uber</div><div class="kv a">'+fm(curTotTS+curTotGuar+curTotInc+curTotUber)+'</div><div class="ks">Additional cost items</div></div>';
  html+='<div class="kpi"><div class="kl">Viv GM (before extras)</div><div class="kv b">'+fp(curTotRev>0?curTotVivGM/curTotRev:0)+'</div><div class="ks">Rev minus pay cost only</div></div>';
  html+='<div class="kpi"><div class="kl">Scheduling GM</div><div class="kv '+(curTotGMPct>=0.40?'g':'r')+'">'+fp(curTotGMPct)+'</div><div class="ks">'+fm(curTotGM)+' after all costs</div></div>';
  html+='</div>';

  // ── BY MARKET TABLE ──
  function gmRow(m, indent){
    var ind=indent?'padding-left:20px':'';
    var vs=m.schedGMPct-m.budgetGMPct;
    var vsCls=vs>=0?'up':'dn'; var vsStr=(vs>=0?'▲':'▼')+' '+fp(Math.abs(vs));
    return '<tr>'+
      '<td style="'+ind+'">'+(indent?'<span style="color:var(--text3)">'+m.market+'</span>':m.market)+'</td>'+
      '<td style="color:var(--text3);font-weight:normal">'+(indent?'':m.state)+'</td>'+
      '<td>'+fk(m.rev)+'</td>'+
      '<td style="color:var(--red)">'+fk(m.totalPayCost)+'<div style="font-size:9px;color:var(--text4)">'+(m.ksfReg?'Reg '+fk(m.ksfReg)+' · OT '+fk(m.ksfOT):fp(m.rev>0?m.totalPayCost/m.rev:0)+' of rev')+' · '+m.dataSource+'</div></td>'+
      '<td style="color:var(--amber)">'+fk(m.ts+m.guar)+'</td>'+
      '<td style="color:var(--amber)">'+fk(m.inc)+'</td>'+
      '<td style="color:var(--orange)">'+fk(m.uber)+'</td>'+
      '<td><span class="bdg '+(m.schedGMPct>=m.budgetGMPct?'bg':'br')+'">'+fp(m.schedGMPct)+'</span></td>'+
      '<td style="color:var(--text3)">'+fp(m.budgetGMPct)+'</td>'+
      '<td><span class="vs '+vsCls+'">'+vsStr+'</span></td>'+
      '</tr>';
  }

  // State subtotals
  function stateRows(stateName){
    var sMkts=curMkts.filter(function(m){return m.state===stateName;});
    if(!sMkts.length)return '';
    var sRev=sMkts.reduce(function(s,m){return s+m.rev;},0);
    var sOT=sMkts.reduce(function(s,m){return s+m.totalPayCost;},0);
    var sTS=sMkts.reduce(function(s,m){return s+m.ts+m.guar;},0);
    var sInc=sMkts.reduce(function(s,m){return s+m.inc+m.uber;},0);
    var sGMPct=sRev>0?sGM/sRev:0;
    var sGM=sMkts.reduce(function(s,m){return s+m.schedGM;},0);
    var sGMPct=sRev>0?sGM/sRev:0;
    var html='<tr style="background:var(--gray100)">'+
      '<td colspan="2"><strong>'+stateName+'</strong></td>'+
      '<td><strong>'+fk(sRev)+'</strong></td>'+

      '<td style="color:var(--amber)"><strong>'+fk(sTS)+'</strong></td>'+
      '<td style="color:var(--amber)"><strong>'+fk(sMkts.reduce(function(s,m){return s+m.inc;},0))+'</strong></td>'+
      '<td style="color:var(--orange)"><strong>'+fk(sMkts.reduce(function(s,m){return s+m.uber;},0))+'</strong></td>'+
      '<td><strong><span class="bdg '+(sGMPct>=0.40?'bg':'br')+'">'+fp(sGMPct)+'</span></strong></td>'+
      '<td></td><td></td></tr>';
    sMkts.forEach(function(m){html+=gmRow(m,true);});
    return html;
  }

  html+='<div class="fc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html+='<div class="ct" style="margin:0">Gross margin by market — '+curStart+' to '+curEnd+'</div>';
  html+='<div style="font-size:10px;color:var(--text4)">Pay data from KSF week of '+ksfWeekToUse+(ksfWeekToUse!==curStart?' (nearest to selected)':' ✓')+'</div>';
  html+='</div>';
  html+='<table class="tbl"><thead><tr><th>Market</th><th>State</th><th>Revenue</th><th>Hourly Pay Cost</th><th>Tribute Secure</th><th>Incentives</th><th>Ubers</th><th>Sched GM %</th><th>Budget GM</th><th>vs Budget</th></tr></thead><tbody>';
  STATES.forEach(function(st){html+=stateRows(st);});
  html+='</tbody><tfoot><tr><td>Company Total</td><td></td><td>'+fm(curTotRev)+'</td><td style="color:var(--red)">'+fm(curTotPayCost)+'</td><td style="color:var(--amber)">'+fm(curTotTS+curTotGuar)+'</td><td style="color:var(--amber)">'+fm(curTotInc+curTotUber)+'</td><td><span class="bdg '+(curTotGMPct>=0.40?'bg':'br')+'">'+fp(curTotGMPct)+'</span></td><td>~42%</td><td></td></tr></tfoot>';
  html+='</table></div>';

  // ── HISTORICAL WEEKLY GM TREND (from KSF actuals) ──
  var histWeeks=Array.from(allOTDates).sort().slice(-12);
  html+='<div class="fc"><div class="ct">Historical weekly gross margin — last 12 weeks from KSF</div>';
  html+='<table class="tbl"><thead><tr><th>Week</th><th>Revenue</th><th>OT</th><th>Tribute Secure</th><th>Incentives</th><th>Ubers</th><th>Total Cost</th><th>GM $</th><th>GM %</th><th>Budget</th></tr></thead><tbody>';
  histWeeks.forEach(function(week){
    var wRev=GEOS.reduce(function(s,g){return s+getActual(g,'Hourly Revenue',week);},0);
    var wOT=GEOS.reduce(function(s,g){return s+getActual(g,'Hourly OT',week);},0);
    var wTS=GEOS.reduce(function(s,g){return s+getActual(g,'TS Admin (Actual)',week);},0);
    var wGuar=GEOS.reduce(function(s,g){return s+getActual(g,'4 Week Guaranteed Admin (Actual) ',week);},0);
    var wInc=GEOS.reduce(function(s,g){return s+getActual(g,'Incentives (Actual)',week);},0);
    var wUber=Object.values(UBER_DATA[week]||{}).reduce(function(s,v){return s+(v.amount||0);},0);
    if(!wRev&&!wOT)return;
    var wCost=wOT+wTS+wGuar+wInc+wUber;
    var wGM=wRev-wCost;
    var wGMPct=wRev>0?wGM/wRev:0;
    html+='<tr>';
    html+='<td>'+week+'</td>';
    html+='<td>'+fm(wRev)+'</td>';
    html+='<td style="color:var(--red)">'+fm(wOT)+'</td>';
    html+='<td style="color:'+((wTS+wGuar)>1000?'var(--amber)':'inherit')+'">'+fm(wTS+wGuar)+'</td>';
    html+='<td>'+fm(wInc)+'</td>';
    html+='<td>$'+(wUber?wUber.toFixed(0):'—')+'</td>';
    html+='<td><strong>'+fm(wCost)+'</strong></td>';
    html+='<td><strong>'+fm(wGM)+'</strong></td>';
    html+='<td><span class="bdg '+(wGMPct>=0.40?'bg':wGMPct>=0.35?'ba':'br')+'">'+fp(wGMPct)+'</span></td>';
    html+='<td style="color:var(--text3)">~42%</td>';
    html+='</tr>';
  });

  // ── COST BREAKDOWN WATERFALL (visual) ──
  html+='<div class="fc"><div class="ct">Cost breakdown — current week</div>';
  var items=[
    {label:'Revenue',amt:curTotRev,color:'var(--green)',isRev:true},
    {label:'Pay Cost (Reg + OT)',amt:curTotPayCost,color:'var(--red)',pct:curTotRev>0?curTotPayCost/curTotRev:0},
    {label:'Tribute Secure',amt:curTotTS+curTotGuar,color:'var(--amber)',pct:curTotRev>0?(curTotTS+curTotGuar)/curTotRev:0},

    {label:'Incentives',amt:curTotInc,color:'var(--orange)',pct:curTotRev>0?curTotInc/curTotRev:0},
    {label:'Ubers',amt:curTotUber,color:'var(--orange)',pct:curTotRev>0?curTotUber/curTotRev:0},
    {label:'Scheduling GM',amt:curTotGM,color:curTotGMPct>=0.40?'var(--green)':'var(--red)',isGM:true},
  ];
  items.forEach(function(item){
    var barW=Math.round(Math.abs(item.amt)/curTotRev*100);
    html+='<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--gray100)">';
    html+='<div style="font-size:12px;'+(item.isRev||item.isGM?'font-weight:600':'font-weight:normal;color:var(--text2)')+';width:160px;flex-shrink:0">'+item.label+'</div>';
    html+='<div style="flex:1;height:16px;background:var(--gray100);border-radius:3px;overflow:hidden">';
    html+='<div style="height:100%;width:'+barW+'%;background:'+item.color+';border-radius:3px;opacity:'+(item.isRev?1:0.75)+'"></div></div>';
    html+='<div style="font-size:12px;font-weight:500;width:90px;text-align:right;color:'+item.color+'">'+fm(Math.round(item.amt))+'</div>';
    html+='<div style="font-size:11px;color:var(--text4);width:55px;text-align:right">'+fp(Math.abs(item.amt)/curTotRev)+'</div>';
    html+='</div>';
  });
  html+='</div>';

  document.getElementById('ct').innerHTML=html;
}

// ── CSV HANDLING ──────────────────────────────────────────────────
function loadCSV(input, type){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows=parseCSV(e.target.result);
      if(type==='call'){callData=rows;showStatus('callStatus','✓ Loaded '+rows.length+' rows from '+file.name,'loaded');}
      else if(type==='uber'){
        // Parse full Uber CSV — skip metadata rows, filter to TRIBUTE only
        uberData=rows;
        var tributeRows=rows.filter(function(r){
          var code=(r['Expense Code']||'').toUpperCase().trim();
          return code.endsWith('TRIBUTE');
        });
        showStatus('uberStatus','✓ Loaded '+rows.length+' total rows — '+tributeRows.length+' Tribute-paid trips added','loaded');
      }
      else if(type==='ot'){
        rows.forEach(function(r){
          var geo=r['Market']||r['market'];
          var week=r['Week']||r['week'];
          var ot=parseFloat(r['OT Amount']||r['ot_amount']||0);
          var inc=parseFloat(r['Incentives Amount']||r['incentives_amount']||0);
          var ts=parseFloat(r['TS Admin Amount']||r['ts_admin']||0);
          var guar=parseFloat(r['Guaranteed Amount']||r['guaranteed']||0);
          if(geo&&week){
            if(!ACTUALS[geo])ACTUALS[geo]={};
            var m=ACTUALS[geo];
            if(!m['Hourly OT'])m['Hourly OT']={};
            if(!m['Incentives (Actual)'])m['Incentives (Actual)']={};
            if(!m['TS Admin (Actual)'])m['TS Admin (Actual)']={};
            if(!m['4 Week Guaranteed Admin (Actual) '])m['4 Week Guaranteed Admin (Actual) ']={};
            if(ot)m['Hourly OT'][week]=ot;
            if(inc)m['Incentives (Actual)'][week]=inc;
            if(ts)m['TS Admin (Actual)'][week]=ts;
            if(guar)m['4 Week Guaranteed Admin (Actual) '][week]=guar;
          }
        });
        showStatus('otStatus','✓ Loaded '+rows.length+' rows — actuals updated','loaded');
      }
      render();
    }catch(err){
      showStatus(type+'Status','Error parsing CSV: '+err.message,'error');
    }
  };
  reader.readAsText(file);
}

function parseCSV(text){
  var lines=text.trim().split('\n');
  var headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(function(line){
    var vals=line.match(/(".*?"|[^,]+)(?=,|$)/g)||line.split(',');
    var obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  });
}

function showStatus(id, msg, cls){
  var el=document.getElementById(id);
  if(el){el.textContent=msg;el.className='upload-status '+cls;}
}
