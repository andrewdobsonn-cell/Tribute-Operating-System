<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tribute · Lead Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#E8732A;--orange-lt:#FFF3EC;--orange-mid:#F5924A;
  --green:#1B7A3E;--green-bg:#EBF7F0;
  --red:#C62828;--red-bg:#FFEBEE;
  --amber:#B45309;--amber-bg:#FEF3C7;
  --blue:#1E40AF;--blue-bg:#EFF6FF;
  --purple:#6D28D9;--purple-bg:#F5F3FF;
  --charcoal:#111827;--text2:#374151;--text3:#6B7280;--text4:#9CA3AF;
  --gray50:#F9FAFB;--gray100:#F3F4F6;--gray200:#E5E7EB;--gray300:#D1D5DB;
  --r:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--gray50);color:var(--charcoal);font-size:13px;}
.hd{background:#fff;border-bottom:1px solid var(--gray200);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;flex-wrap:wrap;}
.logo{font-weight:700;font-size:15px;}.logo em{color:var(--orange);font-style:normal;}
.badge{background:var(--orange-lt);color:var(--orange);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
#genAt{font-size:11px;color:var(--text4);font-family:var(--mono);}
.hd-right{margin-left:auto;display:flex;gap:8px;}
.btn{font-size:11px;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;border:1px solid var(--gray200);background:#fff;color:var(--text2);font-family:var(--font);}
.btn:hover{background:var(--gray100);}
.btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);}
.tabs{background:#fff;border-bottom:1px solid var(--gray200);padding:0 24px;display:flex;overflow-x:auto;}
.tab{font-size:12px;font-weight:500;color:var(--text3);padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab.on{color:var(--charcoal);border-bottom-color:var(--orange);}
.tab:hover{color:var(--charcoal);}
.main{padding:20px 24px;max-width:1800px;}
.filters{background:#fff;border:1px solid var(--gray200);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.filters label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
.filters select,.filters input{font-size:12px;padding:5px 10px;border:1px solid var(--gray200);border-radius:6px;background:#fff;color:var(--charcoal);font-family:var(--font);}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--orange);}
.fsep{width:1px;height:24px;background:var(--gray200);}
.filter-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:auto;}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--gray200);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gray200);}
.kpi.green::before{background:var(--green);}
.kpi.red::before{background:var(--red);}
.kpi.amber::before{background:var(--amber);}
.kpi.blue::before{background:var(--blue);}
.kpi.orange::before{background:var(--orange);}
.kpi.purple::before{background:var(--purple);}
.kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px;}
.kv{font-size:24px;font-weight:700;color:var(--charcoal);line-height:1;font-family:var(--mono);}
.kv.sm{font-size:18px;}.ks{font-size:10px;color:var(--text3);margin-top:4px;}
.card{background:#fff;border:1px solid var(--gray200);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.card-head{padding:12px 16px;border-bottom:1px solid var(--gray200);display:flex;align-items:center;gap:8px;}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}
.card-sub{font-size:11px;color:var(--text4);margin-left:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:8px 14px;text-align:left;border-bottom:1px solid var(--gray200);background:var(--gray50);white-space:nowrap;cursor:pointer;user-select:none;}
.tbl th.ns{cursor:default;}
.tbl th .si{color:var(--text4);margin-left:3px;}
.tbl td{padding:8px 14px;border-bottom:.5px solid var(--gray100);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:#FAFAFA;}
.tbl tfoot td{font-weight:700;background:var(--gray100);border-top:1px solid var(--gray200);}
.stage{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
.s-won{background:var(--green-bg);color:var(--green);}
.s-utf{background:var(--red-bg);color:var(--red);}
.s-lost{background:var(--gray100);color:var(--text3);}
.s-qualified{background:var(--blue-bg);color:var(--blue);}
.s-progress{background:var(--amber-bg);color:var(--amber);}
.s-turndown{background:var(--purple-bg);color:var(--purple);}
.bar-row{display:flex;align-items:center;gap:10px;padding:6px 16px;border-bottom:.5px solid var(--gray100);}
.bar-row:last-child{border-bottom:none;}
.bar-label{font-size:12px;color:var(--charcoal);width:180px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:var(--gray100);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:11px;color:var(--text3);font-family:var(--mono);width:80px;text-align:right;flex-shrink:0;}
.funnel-step{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:.5px solid var(--gray100);}
.funnel-step:last-child{border-bottom:none;}
.funnel-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.funnel-info{flex:1;}.funnel-name{font-size:12px;font-weight:600;}.funnel-desc{font-size:10px;color:var(--text3);margin-top:1px;}
.funnel-num{font-size:20px;font-weight:700;font-family:var(--mono);}
.funnel-pct{font-size:10px;color:var(--text3);font-family:var(--mono);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.donut-wrap{display:flex;align-items:center;gap:20px;padding:16px;}
.donut-legend{flex:1;}
.legend-item{display:flex;align-items:center;gap:8px;padding:3px 0;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.legend-label{font-size:12px;color:var(--text2);flex:1;}
.legend-val{font-size:12px;font-family:var(--mono);font-weight:600;}
.legend-pct{font-size:10px;color:var(--text3);font-family:var(--mono);width:36px;text-align:right;}
.gap-callout{background:linear-gradient(135deg,#FFF3EC,#FFE8D6);border:1.5px solid var(--orange);border-radius:var(--r);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;}
.gap-callout .gap-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--orange);}
.gap-callout .gap-val{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--charcoal);}
.gap-callout .gap-sub{font-size:11px;color:var(--text3);}
.hiring-card{background:#fff;border:1px solid var(--gray200);border-radius:var(--r);padding:16px;margin-bottom:12px;border-left:4px solid var(--gray300);}
.hiring-card.high{border-left-color:var(--orange);}
.hiring-card.med{border-left-color:var(--amber);}
.hiring-card.low{border-left-color:var(--gray300);}
.hc-title{font-size:13px;font-weight:700;color:var(--charcoal);margin-bottom:8px;}
.hc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.hc-stat{background:var(--gray50);border-radius:6px;padding:8px 10px;}
.hc-stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:3px;}
.hc-stat-val{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--charcoal);}
.hc-action{font-size:12px;color:var(--green);font-weight:600;margin-top:6px;}
.heatmap-cell{text-align:center;padding:8px 6px;font-size:12px;font-weight:600;font-family:var(--mono);min-width:70px;}
.placeholder{background:var(--gray50);border:1px dashed var(--gray300);border-radius:var(--r);padding:20px;text-align:center;color:var(--text3);font-style:italic;font-size:12px;margin-bottom:14px;}
.placeholder strong{display:block;font-style:normal;font-weight:600;color:var(--text2);margin-bottom:4px;}
.z{color:var(--text4);}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--gray200);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{background:var(--orange-lt);border-left:3px solid var(--orange);border-radius:var(--r);padding:12px 16px;font-size:12px;margin-bottom:16px;}
.err{background:var(--red-bg);border-left:3px solid var(--red);border-radius:var(--r);padding:12px 16px;color:var(--red);font-size:12px;}
.empty{text-align:center;padding:40px;color:var(--text3);}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr;}.hc-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="hd">
  <div class="logo">Tribute <em>·</em> Lead Intelligence</div>
  <span class="badge">HubSpot + Viv</span>
  <span id="genAt"></span>
  <div class="hd-right">
    <button class="btn" onclick="hardRefresh()">⟳ Force Refresh</button>
    <button class="btn primary" onclick="exportCSV()">↓ Export</button>
  </div>
</div>
<div class="tabs">
  <div class="tab on" onclick="setTab('funnel',this)">Lead Funnel</div>
  <div class="tab" onclick="setTab('revenue',this)">Revenue &amp; Gaps</div>
  <div class="tab" onclick="setTab('demand',this)">Schedule Demand</div>
  <div class="tab" onclick="setTab('sources',this)">Referral Sources</div>
  <div class="tab" onclick="setTab('markets',this)">By Market</div>
  <div class="tab" onclick="setTab('lost',this)">Lost Analysis</div>
  <div class="tab" onclick="setTab('hiring',this)">Hiring Signals</div>
  <div class="tab" onclick="setTab('supply',this)">Supply &amp; Demand</div>
  <div class="tab" onclick="setTab('lifecycle',this)">Client Lifecycle</div>
  <div class="tab" onclick="setTab('community',this)">Community</div>
  <div class="tab" onclick="setTab('refquality',this)">Referral Quality</div>
  <div class="tab" onclick="setTab('deals',this)">All Deals</div>
</div>
<div class="main" id="ct">
  <div class="loading-msg"><span class="spin"></span>&nbsp; Loading HubSpot data — first load may take 30–60 seconds...</div>
</div>

<script>
var API='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
var curTab='funnel';
var hsData=null;
var filters={market:'all',state:'all',company:'all',vivCommunity:'all',source:'all',stage:'all',dateFrom:'',dateTo:'',search:''};
var sortCol='createDate',sortDir=-1;
var activeOnlyRevenue=false;

var STAGE_LABELS={'qualifiedtobuy':'Qualified','contractsent':'Contract Sent','closedwon':'Closed Won','closedlost':'Lost: Client Decision','3665246':'Lost: Unable to Fill','12704675':'Turndown','143971688':'Unable to Fill (Returning)'};
var STAGE_CLASS={'qualifiedtobuy':'s-qualified','contractsent':'s-progress','closedwon':'s-won','closedlost':'s-lost','3665246':'s-utf','12704675':'s-turndown','143971688':'s-utf'};
var SL_LABELS={'A':'Short Hours (≤4h)','B':'Long Day (8–12h)','C':'Standard (4–8h)','D':'Complex/Extended','Live-In':'Live-In'};
var SL_ORDER=['A','B','C','D','Live-In'];
var COLORS=['#E8732A','#1E40AF','#1B7A3E','#C62828','#6D28D9','#B45309','#0891B2','#BE185D','#065F46','#92400E'];

function getVivRev(deal){
  // Only use Viv revenue for Closed Won deals — avoid false matches on lost leads
  if(deal.isClosedWon && deal.viv && deal.viv.weeklyRevenue) return deal.viv.weeklyRevenue;
  if(deal.isClosedWon && deal.viv && deal.viv.billRate && deal.viv.billedHoursWeekly) return Math.round(deal.viv.billRate * deal.viv.billedHoursWeekly);
  return deal.amount || 0;
}
function getVivCommunity(deal){
  // Get community from Viv if matched, fall back to HubSpot locationOfCare
  if(deal.viv && deal.viv.community) return deal.viv.community;
  return deal.locationOfCare || 'Private Home';
}

function getStartDate(deal){
  // Prefer Viv start date over HubSpot start date
  if(deal.viv && deal.viv.startDate) return deal.viv.startDate.split('T')[0];
  return (deal.startDate||'').split('T')[0];
}

function getClientName(deal){
  // Prefer Viv name (clean First Last format) over HubSpot name
  if(deal.viv && deal.viv.clientName) return deal.viv.clientName;
  return deal.clientName || deal.dealName || '';
}

function getVivStatus(deal){
  // Show Viv status for Closed Won deals with any match
  // ID matches are high confidence, name matches are medium confidence
  if(!deal.viv) return null;
  if(!deal.isClosedWon) return null;
  return deal.viv.isActive ? 'Active' : 'Ended';
}

function getStateFromMarket(m){
  var m2=(m||'').toUpperCase().trim();
  if(['BOS','MWB','NB','SOB','SB','NBOS','BOSTON','METROWEST BOSTON','NORTH OF BOSTON','SOUTH OF BOSTON'].some(function(x){return m2===x||m2.indexOf(x)===0;}))return'Massachusetts';
  if(['BAL','ANN','BETH','BET','BALTIMORE','ANNAPOLIS','BETHESDA'].some(function(x){return m2===x||m2.indexOf(x)===0;}))return'Maryland';
  if(['CHI','CHICAGO'].some(function(x){return m2===x||m2.indexOf(x)===0;}))return'Illinois';
  if(['NVA','NOVA','NORTHERN VIRGINIA'].some(function(x){return m2===x||m2.indexOf(x)===0;}))return'Virginia';
  if(['NNJ','NORTHERN NEW JERSEY'].some(function(x){return m2===x||m2.indexOf(x)===0;}))return'New Jersey';
  return'';
}

function setTab(t,el){curTab=t;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});if(el)el.classList.add('on');render();}
function loading(msg){document.getElementById('ct').innerHTML='<div class="loading-msg"><span class="spin"></span>&nbsp; '+(msg||'Loading...')+'</div>';}
function showErr(msg){document.getElementById('ct').innerHTML='<div class="err">'+msg+'</div>';}
function fmt(n){return(n||0).toLocaleString();}
function fmtRev(n){if(!n||n===0)return'<span class="z">$—</span>';return'$'+(n).toLocaleString();}
function fmtRevPlain(n){if(!n||n===0)return'$—';return'$'+(n).toLocaleString();}
function fmtAnn(n){if(!n)return'~$0';return'~$'+(n*52).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function primaryReason(r){return(r||'Not specified').split(';')[0].split(',')[0].trim()||'Not specified';}

function hardRefresh(){fetch(API+'?endpoint=refresh_cache&keys=hubspot_deals').then(function(){loadData();});}

var supplyData=null;

function loadData(){
  loading('Loading HubSpot + Viv data — first load may take 30–60 seconds...');
  var today=new Date();
  var sd=today.toISOString().split('T')[0];
  var ed=new Date(today.getTime()+28*86400000).toISOString().split('T')[0];
  // Step 1: fetch hubspot_deals first to check viv match count
  fetch(API+'?endpoint=hubspot_deals')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.error){showErr(d.error);return;}
      // If no Viv matches, rebuild viv_client_map automatically then refetch
      if(!d.vivMatchCount||d.vivMatchCount===0){
        loading('Building Viv client map — first time setup, please wait ~2 minutes...');
        // Run all 18 batches sequentially
        var buildNext=function(skip){
          return fetch(API+'?endpoint=build_viv_map&skip='+skip)
            .then(function(r){return r.json();})
            .then(function(b){
              loading('Building Viv map: '+b.totalProcessed+'/'+b.totalClients+' clients ('+b.hsIdMatches+' matches found)...');
              if(!b.done&&b.nextSkip){return buildNext(b.nextSkip);}
              return b;
            });
        };
        return buildNext(0).then(function(){
          // Clear and refetch hubspot_deals with fresh map
          loading('Viv map built — loading dashboard data...');
          return fetch(API+'?endpoint=refresh_cache&keys=hubspot_deals')
            .then(function(){return fetch(API+'?endpoint=hubspot_deals').then(function(r){return r.json();});});
        });
      }
      return d;
    })
    .then(function(d){
      if(!d||d.error){showErr(d?d.error:'Load failed');return;}
      hsData=d;
      // Fetch supply data in parallel
      return Promise.all([
        fetch(API+'?endpoint=open_visits&startDate='+sd+'&endDate='+ed).then(function(r){return r.json();}).catch(function(){return null;}),
        fetch(API+'?endpoint=open_booking_sets').then(function(r){return r.json();}).catch(function(){return null;}),
        fetch(API+'?endpoint=caregivers&fast=true').then(function(r){return r.json();}).catch(function(){return null;}),
        fetch(API+'?endpoint=clients').then(function(r){return r.json();}).catch(function(){return null;})
      ]).then(function(supply){
        supplyData={openVisits:supply[0],bookingSets:supply[1],caregivers:supply[2],clients:supply[3]};
        if(d.generatedAt){
          var matchTxt='';
          if(d.vivMatchCount){matchTxt=' · '+d.vivMatchCount+' Viv matches';if(d.vivIdMatches||d.vivNameMatches)matchTxt+=' ('+(d.vivIdMatches||0)+' ID, '+(d.vivNameMatches||0)+' name)';}
          document.getElementById('genAt').textContent=new Date(d.generatedAt).toLocaleString()+matchTxt;
        }
        render();
      });
    })
    .catch(function(e){showErr('Error: '+e.message);});
}


function getFiltered(){
  if(!hsData||!hsData.deals)return[];
  return hsData.deals.filter(function(d){
    if(filters.market!=='all'&&d.market!==filters.market)return false;
    if(filters.stage!=='all'&&d.stage!==filters.stage)return false;
    if(filters.source!=='all'&&d.leadSource!==filters.source)return false;
    if(filters.state!=='all'&&getStateFromMarket(d.market)!==filters.state)return false;
    if(filters.company!=='all'&&d.locationOfCare!==filters.company)return false;
    if(filters.vivCommunity!=='all'&&(!d.viv||d.viv.community!==filters.vivCommunity))return false;
    if(filters.dateFrom&&d.createDate<filters.dateFrom)return false;
    if(filters.dateTo&&d.createDate>filters.dateTo+'T99')return false;
    if(filters.search){var q=filters.search.toLowerCase();if((d.clientName||'').toLowerCase().indexOf(q)<0&&(d.dealName||'').toLowerCase().indexOf(q)<0&&(d.referredBy||'').toLowerCase().indexOf(q)<0)return false;}
    return true;
  });
}

function buildFilterBar(){
  if(!hsData)return'';
  var deals=hsData.deals||[];
  var markets=[...new Set(deals.map(function(d){return d.market;}).filter(Boolean))].sort();
  var sources=[...new Set(deals.map(function(d){return d.leadSource;}).filter(Boolean))].sort();
  var states=[...new Set(deals.map(function(d){return getStateFromMarket(d.market);}).filter(Boolean))].sort();
  var companies=[...new Set(deals.map(function(d){return d.locationOfCare;}).filter(Boolean))].sort();
  var filtered=getFiltered();
  var html='<div class="filters">';
  html+='<label>State</label><select onchange="filters.state=this.value;render()"><option value="all">All States</option>';
  states.forEach(function(s){html+='<option value="'+s+'"'+(filters.state===s?' selected':'')+'>'+s+'</option>';});
  html+='</select>';
  html+='<label>Market</label><select onchange="filters.market=this.value;render()"><option value="all">All Markets</option>';
  markets.forEach(function(m){html+='<option value="'+m+'"'+(filters.market===m?' selected':'')+'>'+m+'</option>';});
  html+='</select>';
  html+='<label>Stage</label><select onchange="filters.stage=this.value;render()"><option value="all">All Stages</option>';
  Object.keys(STAGE_LABELS).forEach(function(k){html+='<option value="'+k+'"'+(filters.stage===k?' selected':'')+'>'+STAGE_LABELS[k]+'</option>';});
  html+='</select>';
  html+='<label>Lead Source</label><select onchange="filters.source=this.value;render()"><option value="all">All Sources</option>';
  sources.forEach(function(s){html+='<option value="'+s+'"'+(filters.source===s?' selected':'')+'>'+s+'</option>';});
  html+='</select>';
  html+='<label>Location</label><select onchange="filters.company=this.value;render()"><option value="all">All</option>';
  companies.forEach(function(s){html+='<option value="'+s+'"'+(filters.company===s?' selected':'')+'>'+s+'</option>';});
  html+='</select>';
  // Viv community filter (from matched records)
  var vivCommunities=[...new Set(deals.filter(function(d){return d.viv&&d.viv.community;}).map(function(d){return d.viv.community;}).filter(Boolean))].sort();
  if(vivCommunities.length){
    html+='<label>Viv Community</label><select onchange="filters.vivCommunity=this.value;render()"><option value="all">All</option>';
    vivCommunities.forEach(function(s){html+='<option value="'+s+'"'+(filters.vivCommunity===s?' selected':'')+'>'+s+'</option>';});
    html+='</select>';
  }
  html+='<div class="fsep"></div>';
  html+='<label>From</label><input type="date" value="'+filters.dateFrom+'" onchange="filters.dateFrom=this.value;render()">';
  html+='<label>To</label><input type="date" value="'+filters.dateTo+'" onchange="filters.dateTo=this.value;render()">';
  html+='<div class="fsep"></div>';
  html+='<input type="text" placeholder="Search..." value="'+esc(filters.search)+'" oninput="filters.search=this.value;render()" style="min-width:160px">';
  html+='<span class="filter-count">'+filtered.length+' / '+deals.length+' deals</span>';

function buildDonut(items,total){
  var size=160,cx=80,cy=80,r=60,inner=36,paths='',startAngle=-Math.PI/2;
  items.forEach(function(item){
    if(!item.n)return;
    var angle=(item.n/total)*2*Math.PI,endAngle=startAngle+angle;
    var x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    var x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
    var xi1=cx+inner*Math.cos(startAngle),yi1=cy+inner*Math.sin(startAngle);
    var xi2=cx+inner*Math.cos(endAngle),yi2=cy+inner*Math.sin(endAngle);
    var large=angle>Math.PI?1:0;
    paths+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+inner+' '+inner+' 0 '+large+' 0 '+xi1+' '+yi1+' Z" fill="'+item.color+'" opacity="0.9"/>';
    startAngle=endAngle;
  });
  var html='<div class="donut-wrap"><svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths;
  html+='<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">'+total+'</text>';
  html+='<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="9" fill="#9CA3AF">TOTAL</text></svg>';
  html+='<div class="donut-legend">';
  items.forEach(function(item){
    var pct=total>0?(item.n/total*100).toFixed(1):0;
    html+='<div class="legend-item"><div class="legend-dot" style="background:'+item.color+'"></div><div class="legend-label">'+esc(item.label)+'</div><div class="legend-val">'+item.n+'</div><div class="legend-pct">'+pct+'%</div></div>';
  });
  html+='</div></div>';
  return html;
}

// ── TAB: CLIENT LIFECYCLE ────────────────────────────────────────────────────
function renderLifecycle(){
  var d=getFiltered();
  var won=d.filter(function(x){return x.isClosedWon;});
  var vivMatched=won.filter(function(x){return x.viv;});
  var active=vivMatched.filter(function(x){return x.viv.isActive;});
  var ended=vivMatched.filter(function(x){return !x.viv.isActive;});
  var noMatch=won.filter(function(x){return !x.viv;});

  // Days active calculation for ID-matched clients with start dates
  var durations=vivMatched.filter(function(x){return x.startDate;}).map(function(x){
    var start=new Date(x.startDate);
    var end=x.viv&&!x.viv.isActive&&x.closeDate?new Date(x.closeDate):new Date();
    return Math.max(0,Math.round((end-start)/86400000));
  });
  var avgDuration=durations.length?Math.round(durations.reduce(function(s,n){return s+n;},0)/durations.length):0;
  var medDuration=durations.length?durations.sort(function(a,b){return a-b;})[Math.floor(durations.length/2)]:0;

  // Revenue by active vs ended
  var activeRev=active.reduce(function(s,x){return s+getVivRev(x);},0);
  var endedRev=ended.reduce(function(s,x){return s+getVivRev(x);},0);

  // Tenure buckets
  var buckets={'<30 days':0,'30–90 days':0,'90–180 days':0,'180–365 days':0,'1–2 years':0,'2+ years':0};
  durations.forEach(function(d){
    if(d<30)buckets['<30 days']++;
    else if(d<90)buckets['30–90 days']++;
    else if(d<180)buckets['90–180 days']++;
    else if(d<365)buckets['180–365 days']++;
    else if(d<730)buckets['1–2 years']++;
    else buckets['2+ years']++;
  });

  // Churn by lead source
  var srcChurn={};
  vivMatched.forEach(function(x){
    var src=x.leadSource||'Unknown';
    if(!srcChurn[src])srcChurn[src]={active:0,ended:0,totalRev:0};
    if(x.viv.isActive)srcChurn[src].active++;else srcChurn[src].ended++;
    srcChurn[src].totalRev+=getVivRev(x);
  });

  // Churn by market
  var mktChurn={};
  vivMatched.forEach(function(x){
    var m=x.market||'Unknown';
    if(!mktChurn[m])mktChurn[m]={active:0,ended:0,totalRev:0};
    if(x.viv.isActive)mktChurn[m].active++;else mktChurn[m].ended++;
    mktChurn[m].totalRev+=getVivRev(x);
  });

  var html=buildFilterBar();
  html+='<div class="kgrid">';
  html+='<div class="kpi green"><div class="kl">Closed Won</div><div class="kv">'+fmt(won.length)+'</div><div class="ks">Total converted leads</div></div>';
  var totalVivActive=supplyData&&supplyData.clients&&(supplyData.clients.totals||supplyData.clients.summary)?
    (supplyData.clients.totals?supplyData.clients.totals.active:supplyData.clients.summary.active):null;
  html+='<div class="kpi green"><div class="kl">Active from Leads</div><div class="kv">'+fmt(active.length)+'</div><div class="ks">HubSpot-sourced, on service</div></div>';
  html+='<div class="kpi blue"><div class="kl">Total Active (Viv)</div><div class="kv">'+(totalVivActive!==null?fmt(totalVivActive):'—')+'</div><div class="ks">All active clients in Viv</div></div>';
  html+='<div class="kpi"><div class="kl">Ended Clients</div><div class="kv">'+fmt(ended.length)+'</div><div class="ks">No longer on service</div></div>';
  html+='<div class="kpi blue"><div class="kl">Viv Matched</div><div class="kv">'+fmt(vivMatched.length)+'</div><div class="ks">'+fmt(noMatch.length)+' unmatched</div></div>';
  html+='<div class="kpi green"><div class="kl">Active Weekly Rev</div><div class="kv sm">'+fmtRevPlain(activeRev)+'</div><div class="ks">From active converted clients</div></div>';
  html+='<div class="kpi blue"><div class="kl">Avg Client Tenure</div><div class="kv">'+avgDuration+'d</div><div class="ks">Median: '+medDuration+'d</div></div>';
  html+='</div>';

  html+='<div class="grid2">';

  // Tenure buckets
  html+='<div class="card"><div class="card-head"><span class="card-title">Client Tenure Distribution</span><span class="card-sub">'+durations.length+' clients with start dates</span></div>';
  var maxBucket=Math.max.apply(null,Object.values(buckets).concat([1]));
  Object.keys(buckets).forEach(function(b){
    var n=buckets[b];
    html+='<div class="bar-row"><div class="bar-label">'+b+'</div>';
    html+='<div class="bar-track"><div class="bar-fill" style="width:'+(n/maxBucket*100).toFixed(0)+'%;background:var(--blue)"></div></div>';
    html+='<div class="bar-val">'+n+'</div></div>';
  });
  html+='</div>';

  // Active vs ended donut
  var lifeItems=[{label:'Active',n:active.length,color:'#1B7A3E'},{label:'Ended',n:ended.length,color:'#6B7280'},{label:'No Viv Match',n:noMatch.length,color:'#E5E7EB'}].filter(function(x){return x.n>0;});
  html+='<div class="card"><div class="card-head"><span class="card-title">Active vs. Ended</span></div>'+buildDonut(lifeItems,won.length)+'</div>';
  html+='</div>';

  // Retention by market
  var mkts=Object.keys(mktChurn).sort(function(a,b){return(mktChurn[b].active+mktChurn[b].ended)-(mktChurn[a].active+mktChurn[a].ended);});
  html+='<div class="card"><div class="card-head"><span class="card-title">Retention by Market</span></div>';
  html+='<table class="tbl"><thead><tr><th class="ns">Market</th><th class="ns">Active</th><th class="ns">Ended</th><th class="ns">Retention%</th><th class="ns">Active Weekly Rev</th></tr></thead><tbody>';
  mkts.forEach(function(m){
    var r=mktChurn[m];var tot=r.active+r.ended;
    var ret=tot>0?(r.active/tot*100).toFixed(1):0;
    html+='<tr><td><strong>'+esc(m)+'</strong></td>';
    html+='<td style="color:var(--green);font-weight:600">'+r.active+'</td>';
    html+='<td style="color:var(--text3)">'+r.ended+'</td>';
    html+='<td>'+ret+'%</td>';
    html+='<td style="color:var(--green)">'+fmtRevPlain(r.totalRev)+'</td></tr>';
  });
  html+='</tbody></table></div>';

  // Retention by lead source
  var srcs=Object.keys(srcChurn).sort(function(a,b){return(srcChurn[b].active+srcChurn[b].ended)-(srcChurn[a].active+srcChurn[a].ended);});
  html+='<div class="card"><div class="card-head"><span class="card-title">Retention by Lead Source</span></div>';
  html+='<table class="tbl"><thead><tr><th class="ns">Lead Source</th><th class="ns">Active</th><th class="ns">Ended</th><th class="ns">Retention%</th><th class="ns">Total Weekly Rev</th></tr></thead><tbody>';
  srcs.forEach(function(s){
    var r=srcChurn[s];var tot=r.active+r.ended;
    var ret=tot>0?(r.active/tot*100).toFixed(1):0;
    html+='<tr><td>'+esc(s)+'</td>';
    html+='<td style="color:var(--green);font-weight:600">'+r.active+'</td>';
    html+='<td style="color:var(--text3)">'+r.ended+'</td>';
    html+='<td>'+ret+'%</td>';
    html+='<td style="color:var(--green)">'+fmtRevPlain(r.totalRev)+'</td></tr>';
  });
  html+='</tbody></table></div>';

  document.getElementById('ct').innerHTML=html;
}

// ── TAB: COMMUNITY ────────────────────────────────────────────────────────────
function renderCommunity(){
  var d=getFiltered();
  var byCommunity={};
  d.forEach(function(x){
    var loc=getVivCommunity(x)||'Unknown';
    if(!byCommunity[loc])byCommunity[loc]={total:0,won:0,utf:0,turndown:0,lost:0,activeClients:0,totalRev:0,utfRev:0,lostReasons:{}};
    byCommunity[loc].total++;
    if(x.isClosedWon){
      byCommunity[loc].won++;
      if(x.viv&&x.viv.isActive)byCommunity[loc].activeClients++;
      byCommunity[loc].totalRev+=getVivRev(x);
    }
    if(x.stage==='3665246'||x.stage==='143971688'){byCommunity[loc].utf++;byCommunity[loc].utfRev+=x.amount||0;}
    if(x.stage==='12704675')byCommunity[loc].turndown++;
    if(x.stage==='closedlost')byCommunity[loc].lost++;
    var lr=primaryReason(x.utfReason||x.turndownReason||x.lostReason);
    if(lr&&lr!=='Not specified'){byCommunity[loc].lostReasons[lr]=(byCommunity[loc].lostReasons[lr]||0)+1;}
  });

  var communities=Object.keys(byCommunity).sort(function(a,b){return byCommunity[b].total-byCommunity[a].total;});

  var html=buildFilterBar();
  html+='<div class="card"><div class="card-head"><span class="card-title">Community Performance</span><span class="card-sub">'+communities.length+' locations</span></div>';
  html+='<div style="overflow-x:auto"><table class="tbl"><thead><tr>';
  html+='<th class="ns">Location of Care</th><th class="ns">Leads</th><th class="ns">Won</th><th class="ns">Conv%</th><th class="ns">Active</th><th class="ns">UTF</th><th class="ns">UTF%</th><th class="ns">Active Weekly Rev</th><th class="ns">Ann. Lost Rev</th><th class="ns">Top Lost Reason</th>';
  html+='</tr></thead><tbody>';
  communities.forEach(function(loc){
    var r=byCommunity[loc];
    var conv=r.total>0?(r.won/r.total*100).toFixed(1):0;
    var utfP=r.total>0?(r.utf/r.total*100).toFixed(1):0;
    var topReason=Object.keys(r.lostReasons).sort(function(a,b){return r.lostReasons[b]-r.lostReasons[a];})[0]||'—';
    html+='<tr>';
    html+='<td><strong>'+esc(loc)+'</strong></td>';
    html+='<td>'+r.total+'</td>';
    html+='<td style="color:var(--green);font-weight:600">'+r.won+'</td>';
    html+='<td>'+conv+'%</td>';
    html+='<td style="color:var(--green)">'+r.activeClients+'</td>';
    html+='<td style="color:var(--red)">'+r.utf+'</td>';
    html+='<td>'+utfP+'%</td>';
    html+='<td style="color:var(--green)">'+fmtRevPlain(r.totalRev)+'</td>';
    html+='<td style="color:var(--red)">'+fmtAnn(r.utfRev)+'</td>';
    html+='<td style="color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(topReason)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';

  document.getElementById('ct').innerHTML=html;
}

// ── TAB: REFERRAL QUALITY ─────────────────────────────────────────────────────
function renderRefQuality(){
  var d=getFiltered();
  var bySource={};
  d.forEach(function(x){
    var src=x.leadSource||'Unknown';
    if(!bySource[src])bySource[src]={leads:0,won:0,utf:0,activeClients:0,totalRev:0,utfRev:0,wonRevDeals:0,startDates:[]};
    bySource[src].leads++;
    if(x.isClosedWon){
      bySource[src].won++;
      var rev=getVivRev(x);
      bySource[src].totalRev+=rev;
      if(rev>0)bySource[src].wonRevDeals++;
      if(x.viv&&x.viv.isActive)bySource[src].activeClients++;
      if(x.startDate)bySource[src].startDates.push(new Date(x.startDate));
    }
    if(x.stage==='3665246'||x.stage==='143971688'){bySource[src].utf++;bySource[src].utfRev+=x.amount||0;}
  });

  var srcs=Object.keys(bySource).sort(function(a,b){return bySource[b].totalRev-bySource[a].totalRev;});

  var html=buildFilterBar();

  // Top KPIs
  var topRevSrc=srcs[0]||'—';
  var topConvSrc=srcs.slice().sort(function(a,b){
    var ca=bySource[a].leads>5?(bySource[a].won/bySource[a].leads):0;
    var cb=bySource[b].leads>5?(bySource[b].won/bySource[b].leads):0;
    return cb-ca;
  })[0]||'—';

  html+='<div class="grid2">';

  // Revenue quality table
  html+='<div class="card"><div class="card-head"><span class="card-title">Referral Source Quality — Revenue</span></div>';
  html+='<table class="tbl"><thead><tr><th class="ns">Source</th><th class="ns">Leads</th><th class="ns">Won</th><th class="ns">Conv%</th><th class="ns">Active</th><th class="ns">Retention%</th><th class="ns">Total Weekly Rev</th><th class="ns">Avg Rev/Client</th></tr></thead><tbody>';
  srcs.forEach(function(s){
    var r=bySource[s];
    var conv=r.leads>0?(r.won/r.leads*100).toFixed(1):0;
    var ret=r.won>0?(r.activeClients/r.won*100).toFixed(1):0;
    var avg=r.wonRevDeals>0?Math.round(r.totalRev/r.wonRevDeals):0;
    html+='<tr><td>'+esc(s)+'</td><td>'+r.leads+'</td>';
    html+='<td style="color:var(--green);font-weight:600">'+r.won+'</td>';
    html+='<td>'+conv+'%</td>';
    html+='<td style="color:var(--green)">'+r.activeClients+'</td>';
    html+='<td>'+ret+'%</td>';
    html+='<td style="color:var(--green);font-weight:600">'+fmtRevPlain(r.totalRev)+'</td>';
    html+='<td>'+fmtRevPlain(avg)+'</td></tr>';
  });
  html+='</tbody></table></div>';

  // Operational fit table
  html+='<div class="card"><div class="card-head"><span class="card-title">Referral Source Fit — Staffing</span></div>';
  html+='<table class="tbl"><thead><tr><th class="ns">Source</th><th class="ns">Leads</th><th class="ns">UTF</th><th class="ns">UTF%</th><th class="ns">Ann. Lost Rev</th><th class="ns">Turndown</th></tr></thead><tbody>';
  var srcsByUtf=srcs.slice().sort(function(a,b){
    var ua=bySource[a].leads>0?bySource[a].utf/bySource[a].leads:0;
    var ub=bySource[b].leads>0?bySource[b].utf/bySource[b].leads:0;
    return ub-ua;
  });
  srcsByUtf.forEach(function(s){
    var r=bySource[s];
    var utfP=r.leads>0?(r.utf/r.leads*100).toFixed(1):0;
    html+='<tr><td>'+esc(s)+'</td><td>'+r.leads+'</td>';
    html+='<td style="color:var(--red)">'+r.utf+'</td>';
    html+='<td style="color:var(--red)">'+utfP+'%</td>';
    html+='<td style="color:var(--red)">'+fmtAnn(r.utfRev)+'</td>';
    var td=d.filter(function(x){return(x.leadSource||'Unknown')===s&&x.stage==='12704675';}).length;
    html+='<td>'+td+'</td></tr>';
  });
  html+='</tbody></table></div>';
  html+='</div>';

  // Summary callout
  if(topRevSrc!=='—'){
    var tr=bySource[topRevSrc];
    html+='<div class="gap-callout" style="background:linear-gradient(135deg,#EBF7F0,#D1FAE5);border-color:var(--green)"><div><div class="gap-label" style="color:var(--green)">Top Revenue Source</div><div class="gap-val">'+esc(topRevSrc)+'</div><div class="gap-sub">'+fmtRevPlain(tr.totalRev)+'/week · '+tr.won+' clients won · '+(tr.won>0?(tr.activeClients/tr.won*100).toFixed(0):0)+'% retention</div></div></div>';
  }

  document.getElementById('ct').innerHTML=html;
}


// ── TAB: SUPPLY & DEMAND ──────────────────────────────────────────────────────
function renderSupply(){
  var d=getFiltered();
  var html=buildFilterBar();

  // Demand side from HubSpot
  var utf=d.filter(function(x){return x.stage==='3665246'||x.stage==='143971688';});
  var utfByMkt={};
  utf.forEach(function(x){
    var m=x.market||'Unknown';
    if(!utfByMkt[m])utfByMkt[m]={count:0,rev:0,slBreakdown:{}};
    utfByMkt[m].count++;utfByMkt[m].rev+=x.amount||0;
    var sl=x.serviceLevel||'C';
    utfByMkt[m].slBreakdown[sl]=(utfByMkt[m].slBreakdown[sl]||0)+1;
  });

  // Supply side from Viv
  var openVisits=supplyData&&supplyData.openVisits;
  var bookingSets=supplyData&&supplyData.bookingSets;
  var caregivers=supplyData&&supplyData.caregivers;

  // KPIs
  var totalUtf=utf.length;
  var totalUtfRev=utf.reduce(function(s,x){return s+(x.amount||0);},0);
  var openVisitCount=openVisits&&openVisits.openVisits?openVisits.openVisits.length:0;
  var openBsCount=bookingSets&&bookingSets.total?bookingSets.total:0;
  var activeCgs=caregivers&&caregivers.totals?caregivers.totals.active:0;

  html+='<div class="kgrid">';
  html+='<div class="kpi red"><div class="kl">Unmet Demand (UTF)</div><div class="kv">'+fmt(totalUtf)+'</div><div class="ks">'+fmtAnn(totalUtfRev)+' annualized lost</div></div>';
  html+='<div class="kpi amber"><div class="kl">Open Visits (28d)</div><div class="kv">'+fmt(openVisitCount)+'</div><div class="ks">Unfilled shifts next 28 days</div></div>';
  html+='<div class="kpi amber"><div class="kl">Open Booking Sets</div><div class="kv">'+fmt(openBsCount)+'</div><div class="ks">Recurring unassigned slots</div></div>';
  html+='<div class="kpi blue"><div class="kl">Active Caregivers</div><div class="kv">'+fmt(activeCgs)+'</div><div class="ks">Currently hired in Viv</div></div>';
  html+='</div>';

  html+='<div class="grid2">';

  // Demand by market (UTF)
  html+='<div class="card"><div class="card-head"><span class="card-title">Demand Gap by Market (UTF Leads)</span></div>';
  html+='<table class="tbl"><thead><tr><th class="ns">Market</th><th class="ns">UTF Leads</th><th class="ns">Ann. Lost Rev</th><th class="ns">Top Schedule Need</th></tr></thead><tbody>';
  Object.keys(utfByMkt).sort(function(a,b){return utfByMkt[b].rev-utfByMkt[a].rev;}).forEach(function(m){
    var r=utfByMkt[m];
    var topSl=Object.keys(r.slBreakdown).sort(function(a,b){return r.slBreakdown[b]-r.slBreakdown[a];})[0]||'—';
    html+='<tr><td><strong>'+esc(m)+'</strong></td>';
    html+='<td style="color:var(--red)">'+r.count+'</td>';
    html+='<td style="color:var(--red)">'+fmtAnn(r.rev)+'</td>';
    html+='<td><span class="stage s-utf">'+esc(topSl)+'</span> '+esc(SL_LABELS[topSl]||'')+'</td></tr>';
  });
  html+='</tbody></table></div>';

  // Open booking sets by market
  if(bookingSets&&bookingSets.bookingSets&&bookingSets.bookingSets.length){
    var bsByMkt={};
    bookingSets.bookingSets.forEach(function(bs){
      var m=bs.market||'Unknown';
      if(!bsByMkt[m])bsByMkt[m]={total:0,overnight:0,long:0,short:0,livein:0};
      bsByMkt[m].total+=bs.openVisitCount||0;
      if(bs.shiftTypes){
        if(bs.shiftTypes.overnight)bsByMkt[m].overnight+=bs.openVisitCount||0;
        if(bs.shiftTypes.long)bsByMkt[m].long+=bs.openVisitCount||0;
        if(bs.shiftTypes.short)bsByMkt[m].short+=bs.openVisitCount||0;
        if(bs.shiftTypes.livein)bsByMkt[m].livein+=bs.openVisitCount||0;
      }
    });
    html+='<div class="card"><div class="card-head"><span class="card-title">Open Recurring Slots by Market (Viv)</span></div>';
    html+='<table class="tbl"><thead><tr><th class="ns">Market</th><th class="ns">Open Slots</th><th class="ns">Overnight</th><th class="ns">Long Day</th><th class="ns">Short</th><th class="ns">Live-In</th></tr></thead><tbody>';
    Object.keys(bsByMkt).sort(function(a,b){return bsByMkt[b].total-bsByMkt[a].total;}).forEach(function(m){
      var r=bsByMkt[m];
      html+='<tr><td><strong>'+esc(m)+'</strong></td>';
      html+='<td style="font-weight:600">'+r.total+'</td>';
      html+='<td style="color:var(--purple)">'+r.overnight+'</td>';
      html+='<td style="color:var(--blue)">'+r.long+'</td>';
      html+='<td style="color:var(--text3)">'+r.short+'</td>';
      html+='<td style="color:var(--amber)">'+r.livein+'</td></tr>';
    });
    html+='</tbody></table></div>';
  } else {
    html+='<div class="card"><div class="card-head"><span class="card-title">Open Recurring Slots (Viv)</span></div><div class="empty">No open booking set data available</div></div>';
  }
  html+='</div>';

  // UTF by service level vs open booking set shift types — the core match
  html+='<div class="card"><div class="card-head"><span class="card-title">Demand vs. Supply — Schedule Type Alignment</span><span class="card-sub">UTF demand (HubSpot) vs. open slots (Viv)</span></div>';
  html+='<table class="tbl"><thead><tr><th class="ns">Schedule Type</th><th class="ns">HubSpot UTF Leads</th><th class="ns">Ann. Lost Rev</th><th class="ns">Viv Open Slots</th><th class="ns">Gap Assessment</th></tr></thead><tbody>';
  var vivSlots={overnight:0,long:0,short:0,livein:0};
  if(bookingSets&&bookingSets.bookingSets){
    bookingSets.bookingSets.forEach(function(bs){
      if(bs.shiftTypes){
        if(bs.shiftTypes.overnight)vivSlots.overnight+=bs.openVisitCount||0;
        if(bs.shiftTypes.long)vivSlots.long+=bs.openVisitCount||0;
        if(bs.shiftTypes.short)vivSlots.short+=bs.openVisitCount||0;
        if(bs.shiftTypes.livein)vivSlots.livein+=bs.openVisitCount||0;
      }
    });
  }
  var slToViv={A:'short',B:'long',C:'long','Live-In':'livein'};
  var slUtfData={};
  utf.forEach(function(x){var sl=x.serviceLevel||'C';if(!slUtfData[sl])slUtfData[sl]={count:0,rev:0};slUtfData[sl].count++;slUtfData[sl].rev+=x.amount||0;});
  SL_ORDER.filter(function(sl){return slUtfData[sl];}).forEach(function(sl){
    var u=slUtfData[sl];
    var vivKey=slToViv[sl]||'long';
    var slots=vivSlots[vivKey]||0;
    var gap=u.count>slots?'⚠ High demand':'✓ Manageable';
    var gapColor=u.count>slots?'var(--red)':'var(--green)';
    html+='<tr><td><strong>'+sl+'</strong> <span style="color:var(--text3);font-size:11px">'+esc(SL_LABELS[sl]||'')+'</span></td>';
    html+='<td style="color:var(--red)">'+u.count+'</td>';
    html+='<td style="color:var(--red)">'+fmtAnn(u.rev)+'</td>';
    html+='<td style="color:var(--amber)">'+slots+'</td>';
    html+='<td style="color:'+gapColor+';font-weight:600">'+gap+'</td></tr>';
  });
  html+='</tbody></table></div>';

  // Caregiver summary if available
  if(caregivers&&caregivers.byState){
    html+='<div class="card"><div class="card-head"><span class="card-title">Caregiver Workforce by State (Viv)</span></div>';
    html+='<table class="tbl"><thead><tr><th class="ns">State</th><th class="ns">Active</th><th class="ns">Total</th><th class="ns">Active Rate</th></tr></thead><tbody>';
    (caregivers.byState||[]).forEach(function(s){
      var rate=s.total>0?(s.active/s.total*100).toFixed(1):0;
      html+='<tr><td><strong>'+esc(s.state)+'</strong></td>';
      html+='<td style="color:var(--green);font-weight:600">'+s.active+'</td>';
      html+='<td>'+s.total+'</td>';
      html+='<td>'+rate+'%</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  document.getElementById('ct').innerHTML=html;
}

function exportCSV(){
  var d=getFiltered();
  var rows=[['Client Name','Deal Name','Stage','Market','State','Service Level','Lead Source','Referred By','Location of Care','UTF Reason','Turndown Reason','Lost Reason','Est. Weekly Revenue','Owner','Created Date','Close Date','Start Date']];
  d.forEach(function(x){rows.push([x.clientName,x.dealName,x.stageLabel,x.market,getStateFromMarket(x.market),x.serviceLevel,x.leadSource,x.referredBy,x.locationOfCare,x.utfReason,x.turndownReason,x.lostReason,x.amount?'$'+x.amount:'',x.ownerName,(x.createDate||'').split('T')[0],(x.closeDate||'').split('T')[0],getStartDate(x)]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='Tribute_Leads_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function render(){
  if(!hsData){loading('Loading...');return;}
  if(curTab==='funnel')renderFunnel();
  else if(curTab==='revenue')renderRevenue();
  else if(curTab==='demand')renderDemand();
  else if(curTab==='sources')renderSources();
  else if(curTab==='markets')renderMarkets();
  else if(curTab==='lost')renderLost();
  else if(curTab==='hiring')renderHiring();
  else if(curTab==='supply')renderSupply();
  else if(curTab==='lifecycle')renderLifecycle();
  else if(curTab==='community')renderCommunity();
  else if(curTab==='refquality')renderRefQuality();
  else if(curTab==='deals')renderDeals();
}

loadData();
</script>
