<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribute &mdash; Client Census</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#ededea;--text:#1a1a18;--text2:#6b6b67;--text3:#9e9c96;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--green:#1D9E75;--amber:#EF9F27;--red:#E24B4A;--blue:#185FA5;--green-bg:#E1F5EE;--amber-bg:#FAEEDA;--red-bg:#FCEBEB;--green-text:#0F6E56;--amber-text:#633806;--red-text:#791F1F;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#232320;--bg3:#2c2c29;--text:#e8e6e0;--text2:#9e9c96;--text3:#6b6b67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);--green-bg:#04342C;--amber-bg:#412402;--red-bg:#501313;--green-text:#9FE1CB;--amber-text:#FAC775;--red-text:#F09595}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:16px 20px;max-width:1100px;margin:0 auto;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;margin-bottom:0;flex-wrap:wrap;gap:10px}
.logo{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.title{font-size:26px;font-weight:600;letter-spacing:-0.02em;line-height:1.1;margin-top:2px}
.sub{font-size:11px;color:var(--text3);margin-top:4px}
.hdr-r{text-align:right}
.hdr-date{font-size:15px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.hdr-meta{font-size:11px;color:var(--text3);margin-top:2px}
.hdr-rule{height:2px;border-radius:1px;margin:12px 0 16px 0;background:var(--border2);transition:background 0.4s ease}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
.adot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px}
.spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:var(--red-bg);color:var(--red-text);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px}
.period-bar{display:flex;gap:0;margin-bottom:16px;flex-wrap:wrap;align-items:center;row-gap:8px}
.period-label{font-size:11px;color:var(--text3);margin-right:6px}
.pbtn{font-size:11px;font-weight:500;padding:5px 11px;border-radius:0;cursor:pointer;border:0.5px solid var(--border2);border-right:none;color:var(--text2);background:transparent;user-select:none;white-space:nowrap;transition:all .12s}
.pbtn:first-of-type{border-radius:6px 0 0 6px}
.pbtn.last-preset{border-radius:0 6px 6px 0;border-right:0.5px solid var(--border2)}
.pbtn.on{background:var(--bg3);color:var(--text);font-weight:600}
.custom-range{display:flex;gap:6px;align-items:center;margin-left:12px}
.custom-range input{font-size:11px;padding:4px 8px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text)}
.custom-range button{font-size:11px;padding:4px 10px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{font-size:12px;font-weight:500;color:var(--text2);padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap;user-select:none;transition:color .15s}
.tab.on{color:var(--text);border-bottom-color:var(--text)}
.tab:hover:not(.on){color:var(--text)}
.banner{background:transparent;border:none;padding:12px 0 16px 0;border-bottom:0.5px solid var(--border);margin-bottom:20px}
.bl{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.banner-insight{font-size:15px;font-weight:400;color:var(--text);line-height:1.55;max-width:820px}
.banner-signal{font-weight:600}
.banner-signal.g{color:var(--green)}.banner-signal.a{color:var(--amber)}.banner-signal.r{color:var(--red)}
.kg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
@media(max-width:800px){.kg,.kg4{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:500px){.kg,.kg4{grid-template-columns:repeat(2,minmax(0,1fr))}}
.kpi{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:0.5px solid transparent}
.kpi.primary{background:var(--bg);border:0.5px solid var(--border2)}
.kpi.primary .kv{font-size:28px;font-weight:600;letter-spacing:-0.02em}
.kpi.status-green{border-left:3px solid var(--green)}
.kpi.status-amber{border-left:3px solid var(--amber)}
.kpi.status-red{border-left:3px solid var(--red)}
.kl{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;letter-spacing:0}
.kv{font-size:24px;font-weight:500;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.ks{font-size:11px;color:var(--text3)}
.kv.g{color:var(--green)}.kv.a{color:var(--amber)}.kv.r{color:var(--red)}.kv.b{color:var(--blue)}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.tc{grid-template-columns:1fr}}
.card,.fc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:18px 20px;margin-bottom:12px}
.tc .card{margin-bottom:0}
.ct{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.01em;margin-bottom:14px}
.cn{font-size:11px;color:var(--text3);line-height:1.5;margin-top:10px;border-top:.5px solid var(--border);padding-top:8px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:600;color:var(--text2);padding:7px 10px;border-bottom:.5px solid var(--border2);text-align:right;letter-spacing:0.04em;text-transform:uppercase}
.tbl th:first-child{text-align:left;font-size:11px;font-weight:600;text-transform:none;letter-spacing:0}
.tbl td{padding:12px 10px;border-bottom:.5px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tfoot td{border-top:.5px solid var(--border2);font-weight:500;padding:9px 10px;text-align:right}
.tbl tfoot td:first-child{text-align:left}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.bg{background:var(--green-bg);color:var(--green-text)}.ba{background:var(--amber-bg);color:var(--amber-text)}.br{background:var(--red-bg);color:var(--red-text)}
.mbr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border)}
.mbr:last-child{border-bottom:none}
.mbl{font-size:12px;color:var(--text);width:150px;flex-shrink:0}
.mbt{flex:1;height:14px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px}
.mbv{font-size:12px;font-weight:500;width:36px;text-align:right;flex-shrink:0}
.mbv2{font-size:11px;color:var(--text3);width:90px;text-align:right;flex-shrink:0}
.etbl{width:100%;border-collapse:collapse;font-size:13px}
.etbl td{padding:9px 0;border-bottom:.5px solid var(--border)}
.etbl td:last-child{text-align:right;font-variant-numeric:tabular-nums}
.etbl tr:last-child td{border-bottom:none}
.ftr{margin-top:32px;padding-top:14px;border-top:.5px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="logo">Tribute Home Care</div>
    <div class="title">Client Census</div>
    <div class="sub" id="sl"><span class="adot"></span>Loading...</div>
  </div>
  <div class="hdr-r"><div class="hdr-date" id="hr"></div></div>
</div>
<div class="hdr-rule" id="hdrRule"></div>
<div class="period-bar">
  <span class="period-label">Period:</span>
  <div class="pbtn on" onclick="setPeriod('month',this)">This month</div>
  <div class="pbtn" onclick="setPeriod('last_month',this)">Last month</div>
  <div class="pbtn" onclick="setPeriod('ytd',this)">Year to date</div>
  <div class="pbtn" onclick="setPeriod('last_year',this)">Last year</div>
  <div class="pbtn" onclick="setPeriod('q1',this)">Q1</div>
  <div class="pbtn" onclick="setPeriod('q2',this)">Q2</div>
  <div class="pbtn" onclick="setPeriod('q3',this)">Q3</div>
  <div class="pbtn last-preset" onclick="setPeriod('q4',this)">Q4</div>
</div>
<div class="period-bar" style="margin-top:-8px">
  <span class="period-label">Month:</span>
  <button class="pbtn" onclick="stepMonth(-1)" style="border-radius:6px 0 0 6px;border-right:none">&#8592; Prev</button>
  <select id="monthSel" onchange="setMonthFromSelect()" style="font-size:11px;padding:5px 8px;border-radius:0;border:.5px solid var(--border2);border-right:none;background:var(--bg2);color:var(--text);cursor:pointer"></select>
  <button class="pbtn" onclick="stepMonth(1)" id="nextBtn" style="border-radius:0 6px 6px 0;border-right:.5px solid var(--border2)">Next &#8594;</button>
  <div class="custom-range">
    <input type="date" id="cs">
    <span style="font-size:11px;color:var(--text3)">to</span>
    <input type="date" id="ce">
    <button onclick="setCustom()">Go</button>
  </div>
</div>
<div class="tabs">
  <div class="tab on" onclick="setTab('co',this)">Company</div>
  <div class="tab" onclick="setTab('ma',this)">Massachusetts</div>
  <div class="tab" onclick="setTab('il',this)">Illinois</div>
  <div class="tab" onclick="setTab('md',this)">Maryland</div>
</div>
<div id="ct"><div class="loading"><div class="spin"></div>Loading client census...</div></div>
<div class="ftr"><span>Tribute Home Care LLC &middot; Client Census</span><span id="ga"></span></div>
<script>
var API='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
var data=null,curTab='co',curPeriod='month',curStart=null,curEnd=null;
var navYear=new Date().getFullYear(),navMonth=new Date().getMonth();
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var STATE_MARKETS={ma:['Boston','MetroWest Boston','North of Boston','South of Boston'],il:['Chicago'],md:['Baltimore','Annapolis','Bethesda']};
var STATE_NAMES={ma:'Massachusetts',il:'Illinois',md:'Maryland'};
function fp(n){return(n*100).toFixed(1)+'%'} function fn(n){return Math.round(n).toLocaleString()} function gc(v){return v>0?'var(--green)':v<0?'var(--red)':'var(--text2)'} function fmtDate(d){return d.toISOString().split('T')[0]}
function mkTd(content,color,bold){ var s=''; if(color)s+='color:'+color+';'; if(bold)s+='font-weight:500;'; return s?'<td style="'+s+'">'+content+'</td>':'<td>'+content+'</td>'; }
function netStr(a,b){var n=a-b;return(n>0?'+':'')+n} function netTd(a,b){var n=a-b;return mkTd((n>0?'+':'')+n,gc(n),true)}
function buildMonthSelector(){ var sel=document.getElementById('monthSel'); var now=new Date(); sel.innerHTML=''; for(var i=0;i<24;i++){ var d=new Date(now.getFullYear(),now.getMonth()-i,1); var opt=document.createElement('option'); opt.value=d.getFullYear()+'-'+d.getMonth(); opt.textContent=MONTHS[d.getMonth()]+' '+d.getFullYear(); if(d.getFullYear()===navYear&&d.getMonth()===navMonth)opt.selected=true; sel.appendChild(opt); } }
function setMonthFromSelect(){ var sel=document.getElementById('monthSel'); var parts=sel.value.split('-'); navYear=parseInt(parts[0]); navMonth=parseInt(parts[1]); loadNavMonth(); }
function stepMonth(dir){ navMonth+=dir; if(navMonth>11){navMonth=0;navYear++;} if(navMonth<0){navMonth=11;navYear--;} var now=new Date(); if(navYear>now.getFullYear()||(navYear===now.getFullYear()&&navMonth>now.getMonth())){ navYear=now.getFullYear();navMonth=now.getMonth(); } buildMonthSelector(); loadNavMonth(); }
function loadNavMonth(){ var start=new Date(navYear,navMonth,1); var end=new Date(navYear,navMonth+1,0); curPeriod='custom'; curStart=fmtDate(start); curEnd=fmtDate(end); document.querySelectorAll('.pbtn').forEach(function(x){x.classList.remove('on')}); var now=new Date(); document.getElementById('nextBtn').disabled=(navYear===now.getFullYear()&&navMonth===now.getMonth()); fetchData(); }
function getDateRange(period){ var now=new Date(); var y=now.getFullYear(); var m=now.getMonth(); switch(period){ case 'month': return{start:new Date(y,m,1),end:new Date(y,m+1,0)}; case 'last_month': return{start:new Date(y,m-1,1),end:new Date(y,m,0)}; case 'ytd': return{start:new Date(y,0,1),end:now}; case 'last_year': return{start:new Date(y-1,0,1),end:new Date(y-1,11,31)}; case 'q1': return{start:new Date(y,0,1),end:new Date(y,2,31)}; case 'q2': return{start:new Date(y,3,1),end:new Date(y,5,30)}; case 'q3': return{start:new Date(y,6,1),end:new Date(y,8,30)}; case 'q4': return{start:new Date(y,9,1),end:new Date(y,11,31)}; default: return{start:new Date(y,m,1),end:new Date(y,m+1,0)}; } }
function periodLabel(){ if(curPeriod==='custom'&&curStart&&curEnd){ var s=new Date(curStart+'T12:00:00'); var e=new Date(curEnd+'T12:00:00'); if(s.getDate()===1&&e.getDate()===new Date(e.getFullYear(),e.getMonth()+1,0).getDate()){ return MONTHS[s.getMonth()]+' '+s.getFullYear(); } return curStart+' to '+curEnd; } var labels={month:'This month',last_month:'Last month',ytd:'Year to date',last_year:'Last year',q1:'Q1 '+new Date().getFullYear(),q2:'Q2 '+new Date().getFullYear(),q3:'Q3 '+new Date().getFullYear(),q4:'Q4 '+new Date().getFullYear()}; return labels[curPeriod]||curPeriod; }
function setHdrRule(netChange){ var rule=document.getElementById('hdrRule'); if(!rule)return; rule.style.background=netChange>0?'var(--green)':netChange<-5?'var(--red)':'var(--amber)'; }
async function fetchData(){ buildMonthSelector(); var start,end; if(curPeriod==='custom'&&curStart&&curEnd){start=curStart;end=curEnd;} else{var dr=getDateRange(curPeriod);start=fmtDate(dr.start);end=fmtDate(dr.end);} document.getElementById('sl').innerHTML='<span class="adot"></span>Loading...'; document.getElementById('ct').innerHTML='<div class="loading"><div class="spin"></div>Loading client census for '+periodLabel()+'...</div>'; try{ var res=await fetch(API+'?endpoint=clients&startDate='+start+'&endDate='+end); if(!res.ok)throw new Error('HTTP '+res.status); data=await res.json(); document.getElementById('sl').innerHTML='<span class="dot"></span>Live &middot; Viv Technologies &middot; Updated '+new Date().toLocaleTimeString(); document.getElementById('hr').innerHTML='<div class="hdr-date">'+fn(data.totals.active)+' active clients</div><div class="hdr-meta">'+fn(data.totals.total)+' ever served &middot; 8 markets</div>'; document.getElementById('ga').textContent='Period: '+periodLabel()+' &middot; Generated: '+new Date(data.generatedAt).toLocaleString(); render(); }catch(e){ document.getElementById('ct').innerHTML='<div class="err">Error: '+e.message+'</div>'; } }
function setPeriod(p,el){ curPeriod=p; document.querySelectorAll('.pbtn').forEach(function(x){x.classList.remove('on')}); el.classList.add('on'); fetchData(); }
function setCustom(){ var s=document.getElementById('cs').value; var e=document.getElementById('ce').value; if(!s||!e){alert('Please select both dates');return;} curPeriod='custom';curStart=s;curEnd=e; document.querySelectorAll('.pbtn').forEach(function(x){x.classList.remove('on')}); fetchData(); }
function setTab(t,el){ curTab=t; document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')}); el.classList.add('on'); if(data)render(); }
function render(){ if(!data)return; if(curTab==='co')renderCompany(); else renderState(curTab); }
function getStateMarkets(abbr){ return (STATE_MARKETS[abbr]||[]).map(function(m){ return data.byMarket.find(function(x){return x.market===m})||{market:m,state:STATE_NAMES[abbr],total:0,active:0,newThisMonth:0,newLastMonth:0,discharged:0,dischargedThisMonth:0,onHold:0}; }); }
function renderCompany(){ var t=data.totals; var pl=periodLabel(); var net=t.netChangeThisMonth; setHdrRule(net); var maxA=Math.max.apply(null,data.byMarket.map(function(m){return m.active})); var mktBars=''; data.byMarket.forEach(function(m){ var bw=maxA>0?Math.round(m.active/maxA*100):0; mktBars+='<div class="mbr"><div class="mbl">'+m.market+'</div><div class="mbt"><div class="mbf" style="width:'+bw+'%;background:var(--blue)"></div></div><div class="mbv">'+fn(m.active)+'</div><div class="mbv2">'+fp(t.active>0?m.active/t.active:0)+' of total</div></div>'; }); var tblRows=''; data.byMarket.forEach(function(m){ tblRows+='<tr>'+mkTd(m.market+'<div style="font-size:10px;color:var(--text3)">'+m.state+'</div>')+mkTd(fn(m.active),'var(--green)')+mkTd(fn(m.newThisMonth))+mkTd(fn(m.dischargedThisMonth),'var(--red)')+netTd(m.newThisMonth,m.dischargedThisMonth)+mkTd(fn(m.onHold),'var(--amber)')+'</tr>'; });
  var netDir=net>0?'Growing':net<-5?'Declining':net<0?'Watch':'Stable';
  var statusClass=net>0?'g':net<-5?'r':'a';
  var html='<div class="banner"><div class="bl">Company &mdash; '+pl+'</div><div class="banner-insight"><span class="banner-signal '+statusClass+'">'+netDir+'</span> &mdash; <strong>'+fn(t.active)+'</strong> active clients across 8 markets. Net change: <strong>'+(net>0?'+':'')+net+'</strong> ('+fn(t.newThisMonth)+' new, '+fn(t.dischargedThisMonth)+' discharged).'+(t.onHold>0?' '+fn(t.onHold)+' clients on hold or in transition.':'')+ '</div></div>';
  html+='<div class="kg">';
  html+='<div class="kpi primary"><div class="kl">Active Clients</div><div class="kv g">'+fn(t.active)+'</div><div class="ks">Currently receiving care</div></div>';
  html+='<div class="kpi"><div class="kl">New This Period</div><div class="kv b">'+fn(t.newThisMonth)+'</div><div class="ks">vs '+fn(t.newLastMonth)+' prior period</div></div>';
  html+='<div class="kpi"><div class="kl">Discharged</div><div class="kv '+(t.dischargedThisMonth>t.newThisMonth?'r':'a')+'">'+fn(t.dischargedThisMonth)+'</div><div class="ks">This period</div></div>';
  html+='<div class="kpi '+( net>0?'status-green':net<-5?'status-red':'status-amber')+'"><div class="kl">Net Change</div><div class="kv '+(net>0?'g':net<0?'r':'a')+'">'+(net>0?'+':'')+net+'</div><div class="ks">New minus discharged</div></div>';
  html+='<div class="kpi"><div class="kl">On Hold</div><div class="kv a">'+fn(t.onHold)+'</div><div class="ks">Hospitalized / transitioning</div></div>';
  html+='</div>';
  html+='<div class="fc"><div class="ct">Active clients by market &mdash; '+pl+'</div>'+mktBars+'</div>';
  html+='<div class="fc"><div class="ct">All markets &mdash; '+pl+'</div>';
  html+='<table class="tbl"><thead><tr><th>Market</th><th>Active</th><th>New</th><th>Discharged</th><th>Net</th><th>On Hold</th></tr></thead><tbody>'+tblRows+'</tbody>';
  html+='<tfoot><tr>'+mkTd('Total')+mkTd(fn(t.active),'var(--green)')+mkTd(fn(t.newThisMonth))+mkTd(fn(t.dischargedThisMonth),'var(--red)')+netTd(t.newThisMonth,t.dischargedThisMonth)+mkTd(fn(t.onHold),'var(--amber)')+'</tr></tfoot></table>';
  html+='<div class="cn">New = clients who started care this period. Discharged = clients who ended care this period. Active = currently receiving care.</div></div>';
  document.getElementById('ct').innerHTML=html; }
function renderState(abbr){ var stateName=STATE_NAMES[abbr]; var markets=getStateMarkets(abbr); var pl=periodLabel(); var stateActive=markets.reduce(function(s,m){return s+m.active},0); var stateNew=markets.reduce(function(s,m){return s+m.newThisMonth},0); var stateNewLast=markets.reduce(function(s,m){return s+m.newLastMonth},0); var stateDisch=markets.reduce(function(s,m){return s+m.dischargedThisMonth},0); var stateHold=markets.reduce(function(s,m){return s+m.onHold},0); var stateNet=stateNew-stateDisch; var t=data.totals; setHdrRule(stateNet); var maxA=Math.max.apply(null,markets.map(function(m){return m.active})); var mktBars=''; markets.forEach(function(m){ var bw=maxA>0?Math.round(m.active/maxA*100):0; mktBars+='<div class="mbr"><div class="mbl">'+m.market+'</div><div class="mbt"><div class="mbf" style="width:'+bw+'%;background:var(--blue)"></div></div><div class="mbv">'+fn(m.active)+'</div><div class="mbv2">'+fp(stateActive>0?m.active/stateActive:0)+' of state</div></div>'; }); var tblRows=''; markets.forEach(function(m){ tblRows+='<tr>'+mkTd(m.market)+mkTd(fn(m.active),'var(--green)')+mkTd(fn(m.newThisMonth))+mkTd(fn(m.dischargedThisMonth),'var(--red)')+netTd(m.newThisMonth,m.dischargedThisMonth)+mkTd(fn(m.onHold),'var(--amber)')+'</tr>'; });
  var netDir=stateNet>0?'Growing':stateNet<-3?'Declining':stateNet<0?'Watch':'Stable';
  var statusClass=stateNet>0?'g':stateNet<-3?'r':'a';
  var html='<div class="banner"><div class="bl">'+stateName+' &mdash; '+pl+'</div><div class="banner-insight"><span class="banner-signal '+statusClass+'">'+netDir+'</span> &mdash; <strong>'+fn(stateActive)+'</strong> active clients. Net: '+(stateNet>0?'+':'')+stateNet+' ('+fn(stateNew)+' new, '+fn(stateDisch)+' discharged). '+fp(t.active>0?stateActive/t.active:0)+' of company census.</div></div>';
  html+='<div class="kg4">';
  html+='<div class="kpi primary"><div class="kl">Active Clients</div><div class="kv g">'+fn(stateActive)+'</div><div class="ks">'+fp(t.active>0?stateActive/t.active:0)+' of company</div></div>';
  html+='<div class="kpi"><div class="kl">New This Period</div><div class="kv b">'+fn(stateNew)+'</div><div class="ks">vs '+fn(stateNewLast)+' prior period</div></div>';
  html+='<div class="kpi"><div class="kl">Discharged</div><div class="kv '+(stateDisch>stateNew?'r':'a')+'">'+fn(stateDisch)+'</div><div class="ks">This period</div></div>';
  html+='<div class="kpi '+( stateNet>0?'status-green':stateNet<-3?'status-red':'status-amber')+'"><div class="kl">Net Change</div><div class="kv '+(stateNet>0?'g':stateNet<0?'r':'a')+'">'+(stateNet>0?'+':'')+stateNet+'</div><div class="ks">New minus discharged</div></div>';
  html+='</div>';
  html+='<div class="tc">';
  html+='<div class="card"><div class="ct">Active clients by market</div>'+mktBars+'</div>';
  html+='<div class="card"><div class="ct">Period vs prior period</div><table class="etbl">';
  html+='<tr><td>New clients this period</td><td style="color:var(--green);font-weight:500">'+fn(stateNew)+'</td></tr>';
  html+='<tr><td>New clients prior period</td><td style="color:var(--text2)">'+fn(stateNewLast)+'</td></tr>';
  html+='<tr><td>Change in intake</td><td style="color:'+gc(stateNew-stateNewLast)+';font-weight:500">'+netStr(stateNew,stateNewLast)+'</td></tr>';
  html+='<tr><td>Discharged this period</td><td style="color:var(--red);font-weight:500">'+fn(stateDisch)+'</td></tr>';
  html+='<tr><td>Net census change</td><td style="color:'+gc(stateNet)+';font-weight:500">'+(stateNet>0?'+':'')+stateNet+'</td></tr>';
  html+='</table></div></div>';
  html+='<div class="fc"><div class="ct">Market detail &mdash; '+stateName+' &mdash; '+pl+'</div>';
  html+='<table class="tbl"><thead><tr><th>Market</th><th>Active</th><th>New</th><th>Discharged</th><th>Net</th><th>On Hold</th></tr></thead><tbody>'+tblRows+'</tbody>';
  html+='<tfoot><tr>'+mkTd(stateName)+mkTd(fn(stateActive),'var(--green)')+mkTd(fn(stateNew))+mkTd(fn(stateDisch),'var(--red)')+netTd(stateNew,stateDisch)+mkTd(fn(stateHold),'var(--amber)')+'</tr></tfoot></table></div>';
  document.getElementById('ct').innerHTML=html; }
fetchData();
</script>
