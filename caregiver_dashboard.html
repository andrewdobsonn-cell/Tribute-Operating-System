<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tribute — Caregiver Engine</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#ededea;--text:#1a1a18;--text2:#6b6b67;--text3:#9e9c96;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);--green:#1D9E75;--amber:#EF9F27;--red:#E24B4A;--blue:#185FA5;--green-bg:#E1F5EE;--amber-bg:#FAEEDA;--red-bg:#FCEBEB;--green-text:#0F6E56;--amber-text:#633806;--red-text:#791F1F;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#232320;--bg3:#2c2c29;--text:#e8e6e0;--text2:#9e9c96;--text3:#6b6b67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);--green-bg:#04342C;--amber-bg:#412402;--red-bg:#501313;--green-text:#9FE1CB;--amber-text:#FAC775;--red-text:#F09595}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1100px;margin:0 auto;font-size:14px;line-height:1.5}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:.5px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:10px}
.logo{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.title{font-size:22px;font-weight:500;margin-top:3px}
.sub{font-size:11px;color:var(--text3);margin-top:2px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
.adot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px}
.spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:var(--red-bg);color:var(--red-text);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{font-size:12px;font-weight:500;color:var(--text2);padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;white-space:nowrap;user-select:none}
.tab.on{color:var(--text);border-bottom-color:var(--text)}
.banner{border-radius:var(--r);padding:12px 16px;margin-bottom:16px;border-left:3px solid var(--green);background:var(--bg2);font-size:13px;line-height:1.6}
.banner.w{border-left-color:var(--amber)}.banner.r{border-left-color:var(--red)}
.bl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:4px}
.bl.w{color:var(--amber)}.bl.r{color:var(--red)}
.kg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kg4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
@media(max-width:800px){.kg,.kg4{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:500px){.kg,.kg4{grid-template-columns:repeat(2,minmax(0,1fr))}}
.kpi{background:var(--bg2);border-radius:var(--r);padding:14px 16px}
.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:6px}
.kv{font-size:24px;font-weight:500;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums}
.ks{font-size:11px;color:var(--text3)}
.kv.g{color:var(--green)}.kv.a{color:var(--amber)}.kv.r{color:var(--red)}.kv.b{color:var(--blue)}
.kt{font-size:11px;margin-top:4px}
.kt.up{color:var(--green)}.kt.dn{color:var(--red)}.kt.fl{color:var(--text3)}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.tc{grid-template-columns:1fr}}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.ct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:12px}
.cn{font-size:11px;color:var(--text3);line-height:1.5;margin-top:10px;border-top:.5px solid var(--border);padding-top:8px;font-style:italic}
.fc{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);padding:7px 10px;border-bottom:.5px solid var(--border2);text-align:right}
.tbl th:first-child{text-align:left}
.tbl td{padding:9px 10px;border-bottom:.5px solid var(--border);text-align:right;font-variant-numeric:tabular-nums}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tfoot td{border-top:.5px solid var(--border2);font-weight:500;padding:9px 10px;text-align:right}
.tbl tfoot td:first-child{text-align:left}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.bg{background:var(--green-bg);color:var(--green-text)}.ba{background:var(--amber-bg);color:var(--amber-text)}.br{background:var(--red-bg);color:var(--red-text)}
.mbr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border)}
.mbr:last-child{border-bottom:none}
.mbl{font-size:12px;color:var(--text);width:130px;flex-shrink:0}
.mbt{flex:1;height:14px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px}
.mbv{font-size:12px;font-weight:500;width:36px;text-align:right;flex-shrink:0}
.mbv2{font-size:11px;color:var(--text3);width:80px;text-align:right;flex-shrink:0}
.hi{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:var(--r);margin-bottom:6px}
.rb{height:24px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:8px}
.ra{background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.rt{background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)}
.ftr{margin-top:32px;padding-top:14px;border-top:.5px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="logo">Tribute Home Care</div>
    <div class="title">Caregiver Engine</div>
    <div class="sub" id="sl"><span class="adot"></span>Loading full caregiver data... (30-60 sec)</div>
  </div>
  <div style="text-align:right;font-size:11px;color:var(--text3)" id="hr"></div>
</div>
<div class="tabs">
  <div class="tab on" onclick="setTab('overview',this)">Overview</div>
  <div class="tab" onclick="setTab('churn',this)">Churn & Retention</div>
  <div class="tab" onclick="setTab('hiring',this)">Hiring Activity</div>
  <div class="tab" onclick="setTab('tenure',this)">Tenure & Stability</div>
</div>
<div id="ct"><div class="loading"><div class="spin"></div>Loading caregiver data...<br><span style="font-size:11px;margin-top:8px;display:block;color:var(--text3)">Pulling 1,499 caregiver records from Viv. Takes 30-60 seconds.</span></div></div>
<div class="ftr"><span>Tribute Home Care LLC &middot; Caregiver Engine</span><span id="ga"></span></div>
<script>
var API='https://tribute-api-prod-bkc4hfcwf3f2f6bf.centralus-01.azurewebsites.net/api/vivProxy';
var data=null,curTab='overview';

function fp(n){return(n*100).toFixed(1)+'%'}
function fn(n){return Math.round(n).toLocaleString()}
function tr(c,p){return c>p?'&#9650;':c<p?'&#9660;':'&mdash;'}
function trc(c,p,h){if(h===undefined)h=true;if(c===p)return 'fl';return(c>p)===h?'up':'dn'}
function gc(v){return v>0?'var(--green)':v<0?'var(--red)':'var(--text2)'}
function badgeCls(r){return r>=0.35?'bg':r>=0.2?'ba':'br'}
function churnBadge(r){return r<=0.05?'bg':r<=0.08?'ba':'br'}
function mkTd(content,color,bold){
  var s='';
  if(color)s+='color:'+color+';';
  if(bold)s+='font-weight:500;';
  return s?'<td style="'+s+'">'+content+'</td>':'<td>'+content+'</td>';
}

async function init(){
  try{
    var res=await fetch(API+'?endpoint=caregivers');
    if(!res.ok)throw new Error('HTTP '+res.status);
    data=await res.json();
    document.getElementById('sl').innerHTML='<span class="dot"></span>Live &middot; Viv Technologies &middot; Updated '+new Date().toLocaleTimeString();
    document.getElementById('hr').innerHTML=fn(data.totals.active)+' active caregivers<br><span style="color:var(--text3)">'+fn(data.totals.total)+' ever hired &middot; 3 states</span>';
    document.getElementById('ga').textContent='Generated: '+new Date(data.generatedAt).toLocaleString();
    render();
  }catch(e){
    document.getElementById('ct').innerHTML='<div class="err">Error: '+e.message+'</div>';
  }
}

function setTab(t,el){
  curTab=t;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});
  el.classList.add('on');
  if(data)render();
}

function render(){
  if(!data)return;
  if(curTab==='overview')renderOverview();
  else if(curTab==='churn')renderChurn();
  else if(curTab==='hiring')renderHiring();
  else renderTenure();
}

function renderOverview(){
  var t=data.totals;
  var retRate=t.retentionRate||(t.total>0?t.active/t.total:0);
  var churnAnn=(t.churnRateThisMonth||0)*12;
  var aw=Math.round(retRate*100);
  var bc=churnAnn>0.8?'r':churnAnn>0.6?'w':'';

  var stateRows='';
  data.byState.forEach(function(s){
    var ret=s.total>0?s.active/s.total:0;
    var bw=Math.round(ret*100);
    var col=ret>=0.4?'var(--green)':ret>=0.25?'var(--amber)':'var(--red)';
    stateRows+='<div class="mbr"><div class="mbl">'+s.state+'</div><div class="mbt"><div class="mbf" style="width:'+bw+'%;background:'+col+'"></div></div><div class="mbv" style="color:'+col+'">'+fn(s.active)+'</div><div class="mbv2">'+fp(ret)+' active</div></div>';
  });

  var tblRows='';
  data.byState.forEach(function(s){
    var net=s.newHiresThisMonth-s.terminationsThisMonth;
    tblRows+=mkTd(s.state)+mkTd(fn(s.newHiresThisMonth),'var(--green)')+mkTd(fn(s.terminationsThisMonth),'var(--red)')+mkTd((net>0?'+':'')+net,gc(net),true);
    tblRows='<tr>'+tblRows+'</tr>';
    tblRows='';
    tblRows+='<tr>'+mkTd(s.state)+mkTd(fn(s.newHiresThisMonth),'var(--green)')+mkTd(fn(s.terminationsThisMonth),'var(--red)')+mkTd((net>0?'+':'')+net,gc(net),true)+'</tr>';
  });

  var html='';
  html+='<div class="banner '+bc+'"><div class="bl '+bc+'">'+new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</div>';
  html+=fn(t.active)+' active caregivers. Net change this month: <strong>'+(t.netChangeThisMonth>0?'+':'')+t.netChangeThisMonth+'</strong> ('+fn(t.newHiresThisMonth)+' hired, '+fn(t.terminationsThisMonth)+' terminated). Monthly churn: '+fp(t.churnRateThisMonth)+' &mdash; '+fp(churnAnn)+' annualized.</div>';

  html+='<div class="kg">';
  html+='<div class="kpi"><div class="kl">Active Caregivers</div><div class="kv g">'+fn(t.active)+'</div><div class="ks">of '+fn(t.total)+' ever hired</div></div>';
  html+='<div class="kpi"><div class="kl">Net Change (MTD)</div><div class="kv '+(t.netChangeThisMonth>0?'g':t.netChangeThisMonth<0?'r':'a')+'">'+(t.netChangeThisMonth>0?'+':'')+t.netChangeThisMonth+'</div><div class="ks">'+fn(t.newHiresThisMonth)+' in &middot; '+fn(t.terminationsThisMonth)+' out</div></div>';
  html+='<div class="kpi"><div class="kl">Monthly Churn</div><div class="kv '+(t.churnRateThisMonth<=0.05?'g':t.churnRateThisMonth<=0.08?'a':'r')+'">'+fp(t.churnRateThisMonth)+'</div><div class="kt '+trc(t.churnRateThisMonth,t.churnRateLastMonth,false)+'">'+tr(t.churnRateThisMonth,t.churnRateLastMonth)+' vs '+fp(t.churnRateLastMonth)+' last mo</div></div>';
  html+='<div class="kpi"><div class="kl">Median Tenure</div><div class="kv '+(t.medianTenureDays>=180?'g':t.medianTenureDays>=90?'a':'r')+'">'+(t.medianTenureDays?Math.round(t.medianTenureDays/30)+'mo':'&mdash;')+'</div><div class="ks">'+(t.medianTenureDays?t.medianTenureDays+' days':'')+'</div></div>';
  html+='<div class="kpi"><div class="kl">Avg Tenure</div><div class="kv b">'+(t.avgTenureDays?Math.round(t.avgTenureDays/30)+'mo':'&mdash;')+'</div><div class="ks">'+(t.avgTenureDays?t.avgTenureDays+' days avg':'')+'</div></div>';
  html+='</div>';

  var tblRows2='';
  data.byState.forEach(function(s){
    var net=s.newHiresThisMonth-s.terminationsThisMonth;
    tblRows2+='<tr>'+mkTd(s.state)+mkTd(fn(s.newHiresThisMonth),'var(--green)')+mkTd(fn(s.terminationsThisMonth),'var(--red)')+mkTd((net>0?'+':'')+net,gc(net),true)+'</tr>';
  });
  var netTotal=t.newHiresThisMonth-t.terminationsThisMonth;

  html+='<div class="tc">';
  html+='<div class="card"><div class="ct">Active caregivers by state</div>'+stateRows+'</div>';
  html+='<div class="card"><div class="ct">This month vs last month</div>';
  html+='<table class="tbl"><thead><tr><th>State</th><th>Hired</th><th>Terminated</th><th>Net</th></tr></thead>';
  html+='<tbody>'+tblRows2+'</tbody>';
  html+='<tfoot><tr>'+mkTd('Total')+mkTd(fn(t.newHiresThisMonth),'var(--green)')+mkTd(fn(t.terminationsThisMonth),'var(--red)')+mkTd((netTotal>0?'+':'')+netTotal,gc(netTotal),true)+'</tr></tfoot></table>';
  html+='<div class="cn">Last month: '+fn(t.newHiresLastMonth)+' hired, '+fn(t.terminationsLastMonth)+' terminated, net '+(t.newHiresLastMonth-t.terminationsLastMonth>0?'+':'')+(t.newHiresLastMonth-t.terminationsLastMonth)+'.</div>';
  html+='</div></div>';

  html+='<div class="fc"><div class="ct">Workforce retention</div>';
  html+='<div class="rb"><div class="ra" style="width:'+aw+'%">'+(aw>15?fn(t.active)+' active ('+fp(retRate)+')':'')+'</div><div class="rt" style="width:'+(100-aw)+'%">'+(100-aw>15?fn(t.terminated)+' terminated':'')+'</div></div>';
  html+='<div style="font-size:11px;color:var(--text3)">'+fp(retRate)+' of all '+fn(t.total)+' ever hired are still active &middot; Industry: 20-35% cumulative retention is normal for home care</div></div>';

  document.getElementById('ct').innerHTML=html;
}

function renderChurn(){
  var t=data.totals;
  var annThis=t.churnRateThisMonth*12;
  var html='';

  html+='<div class="banner '+(annThis>0.8?'r':annThis>0.6?'w':'')+'"><div class="bl '+(annThis>0.8?'r':annThis>0.6?'w':'')+'">Churn analysis</div>';
  html+='Monthly churn is '+fp(t.churnRateThisMonth)+' this month vs '+fp(t.churnRateLastMonth)+' last month &mdash; annualized '+fp(annThis)+'. '+(annThis<=0.65?'Within':'Above')+' the 60-80% home care benchmark.</div>';

  html+='<div class="kg4">';
  html+='<div class="kpi"><div class="kl">Churn This Month</div><div class="kv '+(t.churnRateThisMonth<=0.05?'g':t.churnRateThisMonth<=0.08?'a':'r')+'">'+fp(t.churnRateThisMonth)+'</div><div class="ks">'+fn(t.terminationsThisMonth)+' terminations</div></div>';
  html+='<div class="kpi"><div class="kl">Churn Last Month</div><div class="kv '+(t.churnRateLastMonth<=0.05?'g':t.churnRateLastMonth<=0.08?'a':'r')+'">'+fp(t.churnRateLastMonth)+'</div><div class="ks">'+fn(t.terminationsLastMonth)+' terminations</div></div>';
  html+='<div class="kpi"><div class="kl">Annualized Rate</div><div class="kv '+(annThis<=0.5?'g':annThis<=0.7?'a':'r')+'">'+fp(annThis)+'</div><div class="ks">Industry avg 60-80%</div></div>';
  html+='<div class="kpi"><div class="kl">Trend</div><div class="kv '+(t.churnRateThisMonth<t.churnRateLastMonth?'g':t.churnRateThisMonth>t.churnRateLastMonth?'r':'a')+'">'+(t.churnRateThisMonth<t.churnRateLastMonth?'Down':t.churnRateThisMonth>t.churnRateLastMonth?'Up':'Flat')+'</div><div class="ks">'+fp(Math.abs(t.churnRateThisMonth-t.churnRateLastMonth))+' '+(t.churnRateThisMonth<t.churnRateLastMonth?'improvement':'increase')+'</div></div>';
  html+='</div>';

  var rows='';
  data.byState.forEach(function(s){
    var ct=s.active>0?s.terminationsThisMonth/(s.active+s.terminationsThisMonth):0;
    var cl=s.active>0?s.terminationsLastMonth/(s.active+s.terminationsLastMonth):0;
    var trendCol=ct<cl?'var(--green)':ct>cl?'var(--red)':'var(--text2)';
    var trendTxt=ct<cl?'Better':ct>cl?'Worse':'Same';
    rows+='<tr>'+mkTd(s.state)+mkTd(fn(s.active))+'<td style="color:var(--red)">'+fn(s.terminationsThisMonth)+'</td><td><span class="bdg '+churnBadge(ct)+'">'+fp(ct)+'</span></td><td style="color:var(--text2)">'+fn(s.terminationsLastMonth)+'</td><td><span class="bdg '+churnBadge(cl)+'">'+fp(cl)+'</span></td><td style="color:'+trendCol+'">'+trendTxt+'</td></tr>';
  });

  html+='<div class="fc"><div class="ct">Churn by state</div>';
  html+='<table class="tbl"><thead><tr><th>State</th><th>Active</th><th>Term This Mo.</th><th>Rate This Mo.</th><th>Term Last Mo.</th><th>Rate Last Mo.</th><th>Trend</th></tr></thead>';
  html+='<tbody>'+rows+'</tbody></table>';
  html+='<div class="cn">Green &le;5%/month &middot; Amber 5-8% &middot; Red &gt;8%</div></div>';

  document.getElementById('ct').innerHTML=html;
}

function renderHiring(){
  var t=data.totals;
  var html='';

  html+='<div class="banner '+(t.newHiresThisMonth<t.newHiresLastMonth?'w':'')+'"><div class="bl '+(t.newHiresThisMonth<t.newHiresLastMonth?'w':'')+'">'+new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</div>';
  html+=fn(t.newHiresThisMonth)+' new hires this month vs '+fn(t.newHiresLastMonth)+' last month. Net headcount: '+(t.netChangeThisMonth>0?'+':'')+t.netChangeThisMonth+'.</div>';

  html+='<div class="kg4">';
  html+='<div class="kpi"><div class="kl">New Hires This Month</div><div class="kv g">'+fn(t.newHiresThisMonth)+'</div><div class="kt '+trc(t.newHiresThisMonth,t.newHiresLastMonth)+'">'+tr(t.newHiresThisMonth,t.newHiresLastMonth)+' vs '+fn(t.newHiresLastMonth)+' last mo</div></div>';
  html+='<div class="kpi"><div class="kl">Terminations This Month</div><div class="kv r">'+fn(t.terminationsThisMonth)+'</div><div class="kt '+trc(t.terminationsThisMonth,t.terminationsLastMonth,false)+'">'+tr(t.terminationsThisMonth,t.terminationsLastMonth)+' vs '+fn(t.terminationsLastMonth)+' last mo</div></div>';
  html+='<div class="kpi"><div class="kl">Net Headcount</div><div class="kv '+(t.netChangeThisMonth>0?'g':t.netChangeThisMonth<0?'r':'a')+'">'+(t.netChangeThisMonth>0?'+':'')+t.netChangeThisMonth+'</div><div class="ks">MTD change</div></div>';
  html+='<div class="kpi"><div class="kl">Hire:Term Ratio</div><div class="kv '+(t.newHiresThisMonth>=t.terminationsThisMonth?'g':'r')+'">'+(t.terminationsThisMonth>0?(t.newHiresThisMonth/t.terminationsThisMonth).toFixed(1):'n/a')+':1</div><div class="ks">Hires per termination</div></div>';
  html+='</div>';

  var hireRows='',termRows='';
  data.byState.forEach(function(s){
    var hd=s.newHiresThisMonth-s.newHiresLastMonth;
    hireRows+='<tr>'+mkTd(s.state)+mkTd(fn(s.newHiresThisMonth),'var(--green)',true)+mkTd(fn(s.newHiresLastMonth),'var(--text2)')+mkTd((hd>0?'+':'')+hd,gc(hd))+'</tr>';
    var td2=s.terminationsThisMonth-s.terminationsLastMonth;
    termRows+='<tr>'+mkTd(s.state)+mkTd(fn(s.terminationsThisMonth),'var(--red)',true)+mkTd(fn(s.terminationsLastMonth),'var(--text2)')+mkTd((td2>0?'+':'')+td2,td2<0?'var(--green)':td2>0?'var(--red)':'var(--text2)')+'</tr>';
  });
  var hd2=t.newHiresThisMonth-t.newHiresLastMonth;
  var td3=t.terminationsThisMonth-t.terminationsLastMonth;

  html+='<div class="tc">';
  html+='<div class="card"><div class="ct">Hires by state</div><table class="tbl"><thead><tr><th>State</th><th>This Mo.</th><th>Last Mo.</th><th>Change</th></tr></thead><tbody>'+hireRows+'</tbody><tfoot><tr>'+mkTd('Total')+mkTd(fn(t.newHiresThisMonth),'var(--green)')+mkTd(fn(t.newHiresLastMonth),'var(--text2)')+mkTd((hd2>0?'+':'')+hd2,gc(hd2))+'</tr></tfoot></table></div>';
  html+='<div class="card"><div class="ct">Terminations by state</div><table class="tbl"><thead><tr><th>State</th><th>This Mo.</th><th>Last Mo.</th><th>Change</th></tr></thead><tbody>'+termRows+'</tbody><tfoot><tr>'+mkTd('Total')+mkTd(fn(t.terminationsThisMonth),'var(--red)')+mkTd(fn(t.terminationsLastMonth),'var(--text2)')+mkTd((td3>0?'+':'')+td3,td3<0?'var(--green)':td3>0?'var(--red)':'var(--text2)')+'</tr></tfoot></table></div>';
  html+='</div>';

  if(data.recentHires&&data.recentHires.length>0){
    html+='<div class="fc"><div class="ct">Recent hires this month</div>';
    data.recentHires.forEach(function(h){
      var status=h.status==='active'||h.status==='hired'?'active':'inactive';
      html+='<div class="hi"><div><div style="font-size:12px;font-weight:500">'+h.name+'</div><div style="font-size:11px;color:var(--text3)">'+h.market+' &middot; '+h.state+'</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--text2)">'+h.hireDate+'</div><span class="bdg '+(status==='active'?'bg':'ba')+'" style="margin-top:3px;display:inline-block">'+status+'</span></div></div>';
    });
    html+='<div class="cn">Showing up to 30 most recent hires this month.</div></div>';
  }

  document.getElementById('ct').innerHTML=html;
}

function renderTenure(){
  var t=data.totals;
  var avgM=t.avgTenureDays?Math.round(t.avgTenureDays/30):null;
  var medM=t.medianTenureDays?Math.round(t.medianTenureDays/30):null;
  var retRate=t.retentionRate||(t.total>0?t.active/t.total:0);
  var html='';

  var bc=t.medianTenureDays&&t.medianTenureDays<90?'r':t.medianTenureDays&&t.medianTenureDays<180?'w':'';
  html+='<div class="banner '+bc+'"><div class="bl '+bc+'">Tenure &amp; stability</div>';
  html+=(medM?'Median tenure is <strong>'+t.medianTenureDays+' days ('+medM+' months)</strong>. Half of caregivers who leave do so within '+medM+' months. Average tenure is '+(t.avgTenureDays||'N/A')+' days ('+avgM+' months).':'No tenure data available.')+'</div>';

  html+='<div class="kg4">';
  html+='<div class="kpi"><div class="kl">Median Tenure</div><div class="kv '+(t.medianTenureDays>=180?'g':t.medianTenureDays>=90?'a':'r')+'">'+(medM?medM+'mo':'&mdash;')+'</div><div class="ks">'+(t.medianTenureDays?t.medianTenureDays+' days':'')+'</div></div>';
  html+='<div class="kpi"><div class="kl">Average Tenure</div><div class="kv b">'+(avgM?avgM+'mo':'&mdash;')+'</div><div class="ks">'+(t.avgTenureDays?t.avgTenureDays+' days avg':'')+'</div></div>';
  html+='<div class="kpi"><div class="kl">Early Attrition Risk</div><div class="kv '+(!t.medianTenureDays?'a':t.medianTenureDays<90?'r':t.medianTenureDays<180?'a':'g')+'">'+(!t.medianTenureDays?'&mdash;':t.medianTenureDays<90?'High':t.medianTenureDays<180?'Medium':'Low')+'</div><div class="ks">Based on median tenure</div></div>';
  html+='<div class="kpi"><div class="kl">Cumulative Retention</div><div class="kv '+(retRate>=0.35?'g':retRate>=0.2?'a':'r')+'">'+fp(retRate)+'</div><div class="ks">'+fn(t.active)+' of '+fn(t.total)+' ever hired</div></div>';
  html+='</div>';

  var rows='';
  data.byState.forEach(function(s){
    var ret=s.total>0?s.active/s.total:0;
    rows+='<tr>'+mkTd(s.state)+mkTd(fn(s.active),'var(--green)')+mkTd(fn(s.terminated),'var(--red)')+mkTd(fn(s.total))+'<td><span class="bdg '+badgeCls(ret)+'">'+fp(ret)+'</span></td></tr>';
  });

  html+='<div class="tc">';
  html+='<div class="card"><div class="ct">Tenure vs industry benchmark</div>';
  html+='<table class="tbl"><tbody>';
  html+='<tr><td>Median tenure (Tribute)</td><td style="font-weight:500;text-align:right">'+(medM?medM+' months':'&mdash;')+'</td></tr>';
  html+='<tr><td>Average tenure (Tribute)</td><td style="font-weight:500;text-align:right">'+(avgM?avgM+' months':'&mdash;')+'</td></tr>';
  html+='<tr><td>Industry median (home care)</td><td style="color:var(--text2);text-align:right">6-9 months</td></tr>';
  html+='<tr><td>Tribute vs industry</td><td style="font-weight:500;text-align:right;color:'+(medM&&medM>=6?'var(--green)':'var(--amber)')+'">'+( medM?(medM>=6?'At or above':'Below benchmark'):'&mdash;')+'</td></tr>';
  html+='<tr><td>Annualized churn</td><td style="font-weight:500;text-align:right">'+fp(t.churnRateThisMonth*12)+'</td></tr>';
  html+='</tbody></table></div>';

  html+='<div class="card"><div class="ct">Retention by state</div>';
  html+='<table class="tbl"><thead><tr><th>State</th><th>Active</th><th>Terminated</th><th>Total</th><th>Retention</th></tr></thead>';
  html+='<tbody>'+rows+'</tbody>';
  html+='<tfoot><tr>'+mkTd('Total')+mkTd(fn(t.active),'var(--green)')+mkTd(fn(t.terminated),'var(--red)')+mkTd(fn(t.total))+'<td><span class="bdg '+badgeCls(retRate)+'">'+fp(retRate)+'</span></td></tr></tfoot></table></div>';
  html+='</div>';

  document.getElementById('ct').innerHTML=html;
}

init();
</script>
</body>
</html>
